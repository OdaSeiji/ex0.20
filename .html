<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>金型診断（Die Diagnosis）</title>
    <!-- <link rel="stylesheet" href="./css/common.css" /> -->

    <style>
      body {
        padding: 20px;
        font-family: sans-serif;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      h2 {
        margin-top: 30px;
      }
      .card {
        border: 1px solid #ccc;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 8px;
        background: #fafafa;
      }
      .row {
        display: flex;
        gap: 20px;
        margin-bottom: 10px;
      }
      .row label {
        width: 150px;
        font-weight: bold;
      }
      .thumb {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border: 1px solid #ccc;
        margin-right: 10px;
      }
      .file-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .btn {
        padding: 8px 16px;
        margin-right: 10px;
      }
      textarea {
        width: 100%;
        height: 80px;
      }
      input[type="text"],
      input[type="date"],
      select {
        width: 200px;
      }

      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .die-number-box {
        font-size: 1.2rem;
        font-weight: bold;
        background: #eef5ff;
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid #c7dfff;
        color: #003f8c;
      }

      .die-label {
        color: #333;
      }

      .die-value {
        color: #005bbb;
      }

      .btn-back {
        background-color: #6c8ebf;
        color: white;
        padding: 6px 14px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn-back:hover {
        background-color: #56729a;
      }
    </style>
  </head>

  <body>
    <!-- ■■■■■■■■■■■■■■■■■■■■■ -->

    <!-- <div style="text-align: right; margin-bottom: 10px" > -->
    <div class="lang-buttons">
      <button onclick="applyLanguage('ja')">日本語</button>
      <button onclick="applyLanguage('vi')">Tiếng Việt</button>
    </div>

    <!-- ★ タイトルと型番を横並びにする -->
    <div class="header-row">
      <h1 data-key="title_diagnosis">🩺 金型診断（Die Diagnosis）</h1>

      <div class="right-area">
        <div class="die-number-box">
          <span class="die-label">型番：</span>
          <span id="dieNumber" class="die-value"></span>
        </div>

        <!-- ★ 戻るボタン -->
        <button class="btn-back" onclick="goBackToList()">← 一覧へ戻る</button>
      </div>
    </div>

    <input type="hidden" id="press_id" />

    <!-- ============================= -->
    <!-- ① 測定情報 -->
    <!-- ============================= -->
    <div class="card">
      <h2 data-key="sec_inspection">■ 測定情報（読み取り専用）</h2>

      <div class="row">
        <label data-key="label_ins_date">測定日：</label
        ><span id="ins_date"></span>
      </div>
      <div class="row">
        <label data-key="label_ins_staff">測定者：</label
        ><span id="ins_staff"></span>
      </div>
      <div class="row">
        <label data-key="label_ins_dim">寸法結果：</label
        ><span id="ins_dim"></span>
      </div>
      <div class="row">
        <label data-key="label_ins_shape">形状結果：</label
        ><span id="ins_shape"></span>
      </div>
      <div class="row">
        <label data-key="label_ins_overall">総合結果：</label
        ><span id="ins_overall"></span>
      </div>
      <div class="row">
        <label data-key="label_ins_memo">メモ：</label
        ><span id="ins_memo"></span>
      </div>

      <h3 data-key="sec_ins_files">■ 測定時の添付ファイル</h3>
      <div id="inspection_files" class="file-list"></div>
    </div>

    <!-- ============================= -->
    <!-- ② 押出指示条件 -->
    <!-- ============================= -->
    <div class="card">
      <h2 data-key="sec_directive">■ 押出指示条件（t_press_directive）</h2>

      <div class="row">
        <label>billet_size：</label><span id="dir_billet_size"></span>
      </div>
      <div class="row">
        <label>billet_length：</label><span id="dir_billet_length"></span>
      </div>
      <div class="row">
        <label>ram_speed：</label><span id="dir_ram_speed"></span>
      </div>
      <div class="row">
        <label>billet_temperature：</label><span id="dir_billet_temp"></span>
      </div>
      <div class="row">
        <label>taper_heating：</label><span id="dir_taper"></span>
      </div>
      <div class="row">
        <label>die_temperature：</label><span id="dir_die_temp"></span>
      </div>
      <div class="row">
        <label>stretch_ratio：</label><span id="dir_stretch"></span>
      </div>
      <div class="row">
        <label>discard_thickness：</label><span id="dir_discard"></span>
      </div>
    </div>

    <!-- ============================= -->
    <!-- ③ 押出実績 -->
    <!-- ============================= -->
    <div class="card">
      <h2 data-key="sec_press">■ 押出実績（t_press）</h2>

      <div class="row">
        <label data-key="label_press_date">押出日：</label
        ><span id="press_date"></span>
      </div>
      <div class="row">
        <label>billet_size：</label><span id="press_billet_size"></span>
      </div>
      <div class="row">
        <label>billet_length：</label><span id="press_billet_length"></span>
      </div>
      <div class="row">
        <label>ram_speed：</label><span id="press_ram_speed"></span>
      </div>
      <div class="row">
        <label>die_temperature：</label><span id="press_die_temp"></span>
      </div>
      <div class="row">
        <label>stretch_ratio：</label><span id="press_stretch"></span>
      </div>
    </div>

    <!-- ============================= -->
    <!-- ④ 診断入力 -->
    <!-- ============================= -->
    <div class="card">
      <h2 data-key="sec_diagnosis">■ 診断情報（入力）</h2>

      <div class="row">
        <label data-key="label_diag_date">診断日：</label>
        <input type="date" id="diag_date" />
      </div>

      <div class="row">
        <label data-key="label_diag_staff">診断者：</label>
        <select id="diag_staff"></select>
      </div>

      <h3 data-key="sec_judgement">■ 判定</h3>
      <div class="row">
        <label data-key="label_dim_judge">寸法判定：</label>
        <label><input type="radio" name="dim_judge" value="OK" /> OK</label>
        <label><input type="radio" name="dim_judge" value="NG" /> NG</label>
      </div>

      <div class="row">
        <label data-key="label_shape_judge">形状判定：</label>
        <label><input type="radio" name="shape_judge" value="OK" /> OK</label>
        <label><input type="radio" name="shape_judge" value="NG" /> NG</label>
      </div>

      <div class="row">
        <label data-key="label_overall_judge">総合判定：</label>
        <label><input type="radio" name="overall_judge" value="OK" /> OK</label>
        <label><input type="radio" name="overall_judge" value="NG" /> NG</label>
      </div>

      <h3 data-key="sec_ng_action">■ NG 対応（必須）</h3>
      <div class="row">
        <label></label>
        <label
          ><input type="radio" name="ng_action" value="1" />
          <span data-key="ng_1">様子を見る</span></label
        >
        <label
          ><input type="radio" name="ng_action" value="2" />
          <span data-key="ng_2">修理</span></label
        >
        <label
          ><input type="radio" name="ng_action" value="3" />
          <span data-key="ng_3">修理 + 条件変更</span></label
        >
        <label
          ><input type="radio" name="ng_action" value="4" />
          <span data-key="ng_4">条件変更のみ</span></label
        >
      </div>

      <div id="condition_change_block" style="display: none">
        <h3 data-key="sec_condition_change">■ 条件変更内容</h3>
        <textarea id="condition_change"></textarea>
      </div>

      <h3 data-key="sec_diag_memo">■ メモ</h3>
      <textarea id="diag_memo"></textarea>

      <h3 data-key="sec_diag_files">■ 添付ファイル（任意）</h3>
      <input type="file" id="diag_files" multiple />

      <!-- ▼ サムネイル表示エリア -->
      <div id="diag_file_preview" class="file-list"></div>
    </div>

    <!-- ============================= -->
    <!-- ボタン -->
    <!-- ============================= -->
    <div>
      <!-- 通常モード：診断内容の保存 -->
      <button class="btn" id="saveBtn" onclick="saveDiagnosis()">保存</button>

      <!-- 承認モード：承認ボタン（最初は非表示） -->
      <button
        class="btn"
        id="approveBtn"
        style="display: none"
        onclick="approveDiagnosis()"
      >
        承認する
      </button>

      <!-- 修理画面へ（診断結果がNGで修理必要な場合のみ表示） -->
      <button class="btn" id="btn_fix" style="display: none" onclick="goFix()">
        修理画面へ進む
      </button>

      <!-- 次回押出条件へ（診断結果が3 or 4 の場合のみ表示） -->
      <button
        class="btn"
        id="btn_next"
        style="display: none"
        onclick="goNext()"
      >
        次回押出条件へ進む
      </button>

      <!-- ■■■■■■■■■■■■■■■■■■■■■ -->

      <!-- ============================= -->
      <!-- 画像モーダル -->
      <!-- ============================= -->
      <div
        id="imgModal"
        class="modal"
        style="
          display: none;
          position: fixed;
          z-index: 9999;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.7);
          justify-content: center;
          align-items: center;
        "
      >
        <span
          id="modalClose"
          style="
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            font-weight: bold;
          "
          >&times;</span
        >

        <img
          id="modalImg"
          style="
            max-width: 90%;
            max-height: 90%;
            border: 4px solid white;
            border-radius: 8px;
          "
        />
      </div>
    </div>

    <script>
      const dict = {
        ja: {
          title_diagnosis: "🩺 金型診断（Die Diagnosis）",
          sec_inspection: "■ 測定情報（読み取り専用）",
          label_ins_date: "測定日：",
          label_ins_staff: "測定者：",
          label_ins_dim: "寸法結果：",
          label_ins_shape: "形状結果：",
          label_ins_overall: "総合結果：",
          label_ins_memo: "メモ：",
          sec_ins_files: "■ 測定時の添付ファイル",

          sec_directive: "■ 押出指示条件（t_press_directive）",
          sec_press: "■ 押出実績（t_press）",
          label_press_date: "押出日：",

          sec_diagnosis: "■ 診断情報（入力）",
          label_diag_date: "診断日：",
          label_diag_staff: "診断者：",

          sec_judgement: "■ 判定",
          label_dim_judge: "寸法判定：",
          label_shape_judge: "形状判定：",
          label_overall_judge: "総合判定：",

          sec_ng_action: "■ NG 対応（必須）",
          ng_1: "様子を見る",
          ng_2: "修理",
          ng_3: "修理 + 条件変更",
          ng_4: "条件変更のみ",

          sec_condition_change: "■ 条件変更内容",
          // sec_repair_required: "■ 修理の要否",
          // label_repair_required: "修理が必要",

          sec_approval: "■ 承認ステータス",
          label_status: "状態：",
          label_approver: "承認者：",
          label_approval_date: "承認日：",
          label_reject_reason: "却下理由：",

          sec_diag_memo: "■ メモ",
          sec_diag_files: "■ 添付ファイル（任意）",

          btn_save: "保存",
          btn_fix: "修理画面へ進む",
          btn_next: "次回押出条件へ進む",
        },

        vi: {
          title_diagnosis: "🩺 Chẩn đoán khuôn (Die Diagnosis)",
          sec_inspection: "■ Thông tin đo (Chỉ đọc)",
          label_ins_date: "Ngày đo:",
          label_ins_staff: "Người đo:",
          label_ins_dim: "Kết quả kích thước:",
          label_ins_shape: "Kết quả hình dạng:",
          label_ins_overall: "Kết quả tổng thể:",
          label_ins_memo: "Ghi chú:",
          sec_ins_files: "■ Tệp đính kèm khi đo",

          sec_directive: "■ Điều kiện chỉ thị ép (t_press_directive)",
          sec_press: "■ Thực tế ép (t_press)",
          label_press_date: "Ngày ép:",

          sec_diagnosis: "■ Thông tin chẩn đoán (Nhập)",
          label_diag_date: "Ngày chẩn đoán:",
          label_diag_staff: "Người chẩn đoán:",

          sec_judgement: "■ Đánh giá",
          label_dim_judge: "Đánh giá kích thước:",
          label_shape_judge: "Đánh giá hình dạng:",
          label_overall_judge: "Đánh giá tổng thể:",

          sec_ng_action: "■ Xử lý NG (Bắt buộc)",
          ng_1: "Theo dõi thêm",
          ng_2: "Sửa chữa",
          ng_3: "Sửa chữa + Thay đổi điều kiện",
          ng_4: "Chỉ thay đổi điều kiện",

          sec_condition_change: "■ Nội dung thay đổi điều kiện",
          sec_repair_required: "■ Cần sửa chữa",
          label_repair_required: "Cần sửa chữa",

          sec_approval: "■ Trạng thái phê duyệt",
          label_status: "Trạng thái:",
          label_approver: "Người phê duyệt:",
          label_approval_date: "Ngày phê duyệt:",
          label_reject_reason: "Lý do từ chối:",

          sec_diag_memo: "■ Ghi chú",
          sec_diag_files: "■ Tệp đính kèm (Tùy chọn)",

          btn_save: "Lưu",
          btn_fix: "Chuyển đến màn hình sửa chữa",
          btn_next: "Chuyển đến điều kiện ép tiếp theo",
        },
      };

      /* ------------------------------
         URL パラメータ取得
      ------------------------------ */
      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      const pressId = getParam("press_id");
      document.getElementById("press_id").value = pressId;

      // ★ 承認モード判定（ここに追加）
      const mode = getParam("mode"); // "approval" のとき承認モード

      /* ------------------------------
        初期ロード
      ------------------------------ */
      window.onload = function () {
        const lang = localStorage.getItem("lang") || "ja";
        applyLanguage(lang);

        loadStaffList();
        loadDiagnosisData();

        // ★ 承認モードなら入力欄をロックして承認ボタンを表示
        if (mode === "approval") {
          enableApprovalMode();
        }
      };

      /* ------------------------------
         診断データ取得
      ------------------------------ */
      function loadDiagnosisData() {
        fetch(
          `./php/die_progress_php/get_diagnosis_data.php?press_id=${pressId}`,
        )
          .then((res) => res.json())
          .then((data) => {
            console.log("Diagnosis Data:", data);
            fillInspection(data.inspection, data.inspection_files);
            fillDirective(data.directive);

            /* ★ ここで型番をセットするのが最適 */
            document.getElementById("dieNumber").textContent =
              data.press.die_number;

            fillPress(data.press);
            fillDiagnosis(data.diagnosis);
          });
      }

      /* ------------------------------
        測定情報
      ------------------------------ */

      function fillInspection(ins, files) {
        if (!ins) return;

        document.getElementById("ins_date").textContent = ins.inspection_date;
        document.getElementById("ins_staff").textContent = ins.staff_name;
        document.getElementById("ins_dim").textContent = ins.dimension_result;
        document.getElementById("ins_shape").textContent = ins.shape_result;
        document.getElementById("ins_overall").textContent = ins.overall_result;
        document.getElementById("ins_memo").textContent = ins.memo || "";

        const area = document.getElementById("inspection_files");
        area.innerHTML = "";

        files.forEach((f) => {
          const ext = f.file_path.split(".").pop().toLowerCase();
          let html = "";

          // 画像ファイル → モーダル表示
          if (["jpg", "jpeg", "png", "gif"].includes(ext)) {
            html = `
        <img 
          src="../uploads/inspection/${ins.id}/${f.file_path}" 
          class="thumb"
          onclick="openModal('../uploads/inspection/${ins.id}/${f.file_path}')"
        >
      `;
          }
          // その他ファイル → 通常リンク
          else {
            html = `
        <a href="../uploads/inspection/${ins.id}/${f.file_path}" target="_blank">
          📄 ${f.file_path}
        </a>
      `;
          }

          area.innerHTML += html;
        });
      }

      /* ------------------------------
         押出指示
      ------------------------------ */
      function fillDirective(d) {
        if (!d) return;
        document.getElementById("dir_billet_size").textContent = d.billet_size;
        document.getElementById("dir_billet_length").textContent =
          d.billet_length;
        document.getElementById("dir_ram_speed").textContent = d.ram_speed;
        document.getElementById("dir_billet_temp").textContent =
          d.billet_temperature;
        document.getElementById("dir_taper").textContent =
          d.billet_taper_heating;
        document.getElementById("dir_die_temp").textContent = d.die_temperature;
        document.getElementById("dir_stretch").textContent = d.stretch_ratio;
        document.getElementById("dir_discard").textContent =
          d.discard_thickness;
      }

      /* ------------------------------
        押出実績
      ------------------------------ */
      function fillPress(p) {
        if (!p) return;
        document.getElementById("press_date").textContent = p.press_date_at;
        document.getElementById("press_billet_size").textContent =
          p.billet_size;
        document.getElementById("press_billet_length").textContent =
          p.billet_length;
        document.getElementById("press_ram_speed").textContent =
          p.no1_0200_ram_speed;
        document.getElementById("press_die_temp").textContent =
          p.actual_die_temperature;
        document.getElementById("press_stretch").textContent = p.stretch_ratio;
      }

      /* ------------------------------
        診断情報（既存データ）
      ------------------------------ */
      function fillDiagnosis(d) {
        if (!d) {
          document.getElementById("diag_date").valueAsDate = new Date();
          return;
        }

        document.getElementById("diag_date").value =
          d.diagnosis_date?.substring(0, 10);
        document.getElementById("diag_staff").value = d.diagnosis_staff || "";

        document.querySelector(
          `input[name="dim_judge"][value="${d.dimension_judgement}"]`,
        ).checked = true;
        document.querySelector(
          `input[name="shape_judge"][value="${d.shape_judgement}"]`,
        ).checked = true;
        document.querySelector(
          `input[name="overall_judge"][value="${d.overall_judgement}"]`,
        ).checked = true;

        document.querySelector(
          `input[name="ng_action"][value="${d.ng_action}"]`,
        ).checked = true;

        if (d.ng_action == 3 || d.ng_action == 4) {
          document.getElementById("condition_change_block").style.display =
            "block";
          document.getElementById("condition_change").value =
            d.condition_change || "";
        }

        // document.getElementById("repair_required").checked =
        //   d.repair_required == 1;

        document.querySelector(
          `input[name="approval_status"][value="${d.approval_status}"]`,
        ).checked = true;

        document.getElementById("approver_id").value = d.approver_id || "";
        document.getElementById("approval_date").value =
          d.approval_date?.substring(0, 10) || "";
        document.getElementById("reject_reason").value = d.reject_reason || "";
        document.getElementById("diag_memo").value = d.memo || "";
      }

      /* ------------------------------
         診断保存
      ------------------------------ */
      function saveDiagnosis() {
        const press_id = document.getElementById("press_id").value;

        // 判定
        const dim_judge = document.querySelector(
          'input[name="dim_judge"]:checked',
        )?.value;
        const shape_judge = document.querySelector(
          'input[name="shape_judge"]:checked',
        )?.value;
        const overall_judge = document.querySelector(
          'input[name="overall_judge"]:checked',
        )?.value;

        // NG 対応
        const ng_action = document.querySelector(
          'input[name="ng_action"]:checked',
        )?.value;

        // 入力チェック
        if (!dim_judge || !shape_judge || !overall_judge) {
          alert("判定（OK/NG）をすべて選択してください");
          return;
        }
        if (!ng_action) {
          alert("NG 対応を選択してください");
          return;
        }

        // 条件変更欄
        const condition_change =
          ng_action == 3 || ng_action == 4
            ? document.getElementById("condition_change").value
            : "";

        // // 修理要否
        // const repair_required = document.getElementById("repair_required")
        //   .checked
        //   ? 1
        //   : 0;

        // POST データ作成
        const formData = new FormData();
        formData.append("press_id", press_id);
        formData.append(
          "diagnosis_date",
          document.getElementById("diag_date").value,
        );
        formData.append(
          "diagnosis_staff",
          document.getElementById("diag_staff").value,
        );
        formData.append("dimension_judgement", dim_judge);
        formData.append("shape_judgement", shape_judge);
        formData.append("overall_judgement", overall_judge);
        formData.append("ng_action", ng_action);
        formData.append("condition_change", condition_change);
        // formData.append("repair_required", repair_required);
        formData.append("memo", document.getElementById("diag_memo").value);

        // 添付ファイル（任意）
        const files = document.getElementById("diag_files").files;
        for (let i = 0; i < files.length; i++) {
          formData.append("diag_files[]", files[i]); // ← 修正ポイント
        }

        // 保存実行
        fetch("./php/die_progress_php/save_diagnosis.php", {
          method: "POST",
          body: formData,
        })
          .then((res) => res.json())
          .then((result) => {
            console.log("save result:", result);

            if (result.status === "ok") {
              alert("診断を保存しました");
              location.href = "die_progress_list.html"; // ← ここだけでOK
            } else {
              alert("保存に失敗しました: " + result.message);
            }
          })
          .catch((err) => {
            console.error(err);
            alert("通信エラーが発生しました");
          });
      }

      /* ------------------------------
         修理画面へ
      ------------------------------ */
      function goFix() {
        location.href = `die_fix_plan.html?press_id=${pressId}`;
      }

      /* ------------------------------
       次回押出条件へ
      ------------------------------ */
      function goNext() {
        alert("次回押出条件画面は未実装です");
      }

      // ------------------------------
      // モーダルを開く
      // ------------------------------
      function openModal(src) {
        const modal = document.getElementById("imgModal");
        const modalImg = document.getElementById("modalImg");

        modalImg.src = src;
        modal.style.display = "flex";
      }

      // ------------------------------
      // モーダルを閉じる
      // ------------------------------
      document.getElementById("modalClose").onclick = function () {
        document.getElementById("imgModal").style.display = "none";
      };

      // 背景クリックでも閉じる
      document.getElementById("imgModal").onclick = function (e) {
        if (e.target.id === "imgModal") {
          document.getElementById("imgModal").style.display = "none";
        }
      };

      // ------------------------------
      // 翻訳
      // ------------------------------
      function applyLanguage(lang) {
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          if (dict[lang][key]) {
            el.textContent = dict[lang][key];
          }
        });
        localStorage.setItem("lang", lang);
      }

      // ------------------------------
      // staff listを読み込ませる
      // ------------------------------
      function loadStaffList() {
        fetch("./php/die_progress_php/get_staff_list.php")
          .then((res) => res.json())
          .then((list) => {
            const sel = document.getElementById("diag_staff");
            sel.innerHTML = "";

            list.forEach((st) => {
              const opt = document.createElement("option");
              opt.value = st.id;
              opt.textContent = st.staff_name;
              sel.appendChild(opt);
            });
          })
          .catch((err) => console.error("staff load error:", err));
      }

      // ------------------------------
      // 読み込みファイルのサムネイル表示
      // ------------------------------
      document
        .getElementById("diag_files")
        .addEventListener("change", function (e) {
          const area = document.getElementById("diag_file_preview");
          area.innerHTML = "";

          Array.from(e.target.files).forEach((file) => {
            const ext = file.name.split(".").pop().toLowerCase();
            const url = URL.createObjectURL(file);

            let html = "";

            if (["jpg", "jpeg", "png", "gif"].includes(ext)) {
              html = `
        <img src="${url}" class="thumb"
             onclick="openModal('${url}')">
      `;
            } else {
              html = `
        <div>📄 ${file.name}</div>
      `;
            }

            area.innerHTML += html;
          });
        });

      /* ------------------------------
         承認モード（mode=approval）処理
      ------------------------------ */
      function enableApprovalMode() {
        // ① すべての入力欄を読み取り専用にする
        document.querySelectorAll("input, textarea, select").forEach((el) => {
          el.setAttribute("disabled", true);
        });

        // ② 保存ボタンを非表示にする（存在する場合のみ）
        const saveBtn = document.getElementById("saveBtn");
        if (saveBtn) {
          saveBtn.style.display = "none";
        }

        // ③ 承認ボタンを表示する
        const approveBtn = document.getElementById("approveBtn");
        if (approveBtn) {
          approveBtn.style.display = "block";
        }

        // ④ タイトルなどに「承認モード」を表示したい場合（任意）
        const title = document.getElementById("pageTitle");
        if (title) {
          title.textContent += "（承認モード）";
        }
      }

      /* ------------------------------
        承認ボタン押下 → 承認処理へ
      ------------------------------ */
      function approveDiagnosis() {
        // ① 最終確認（誤操作防止）
        if (!confirm("この診断内容を承認しますか？")) {
          return;
        }

        // ② 承認処理用 PHP へ遷移
        //    press_id を渡すだけでOK（承認モードなので PIN は不要）
        location.href = `./php/die_progress_php/approve_diagnosis.php?press_id=${pressId}`;
      }

      /* ------------------------------
        戻るボタンの処理
      ------------------------------ */
      function goBackToList() {
        location.href = "die_progress_list.html";
      }
    </script>
  </body>
</html>
