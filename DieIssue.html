<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issue一覧（Dashboard）</title>
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/DieIssue.css" />

    <style></style>
  </head>

  <body>
    <header>
      <div>金型不具合一覧（Issue Dashboard）</div>
      <button class="primary" onclick="location.href = 'issue_new.html'">
        ＋ 新規申請
      </button>
    </header>

    <div class="container">
      <div class="table-card">
        <table id="issueTable">
          <tr>
            <th>
              <div class="th-flex">
                <span>金型番号</span>
                <input
                  type="text"
                  class="search-box"
                  placeholder="検索…"
                  onkeyup="filterTable()"
                />
              </div>
            </th>
            <th>タイトル</th>
            <th>申請者</th>
            <th>修理担当者</th>
            <th>ステータス</th>
            <th>最終更新</th>
          </tr>

          <tr
            class="row-click"
            onclick="location.href = 'issue_detail.html?id=CP9663R'"
          >
            <td>CP9663R</td>
            <td>寸法不安定</td>
            <td>佐藤</td>
            <td>田中</td>
            <td class="status-pending">承認待ち</td>
            <td>2026/04/11</td>
          </tr>

          <tr
            class="row-click"
            onclick="location.href = 'issue_detail.html?id=CP8821L'"
          >
            <td>CP8821L</td>
            <td>バリ発生</td>
            <td>山田</td>
            <td>田中</td>
            <td class="status-repairing">修理中</td>
            <td>2026/04/10</td>
          </tr>

          <tr
            class="row-click"
            onclick="location.href = 'issue_detail.html?id=CP7710F'"
          >
            <td>CP7710F</td>
            <td>ウェルド不良</td>
            <td>佐藤</td>
            <td>鈴木</td>
            <td class="status-complete-request">完了承認待ち</td>
            <td>2026/04/08</td>
          </tr>
        </table>
      </div>
    </div>

    <script>
      function filterTable() {
        const input = document.querySelector(".search-box").value.toUpperCase();
        const rows = document.querySelectorAll("#issueTable tr.row-click");

        rows.forEach((row) => {
          const dieNumber = row.cells[0].innerText.toUpperCase();
          row.style.display = dieNumber.includes(input) ? "" : "none";
        });
      }
    </script>
  </body>
</html>
