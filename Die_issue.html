<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>New Issue Registration</title>
    <link rel="stylesheet" href="die_issue.css" />
  </head>

  <body>
    <header>New Issue Registration</header>

    <div class="container">
      <div class="card">
        <h2>Basic Information</h2>

        <!-- ▼ Select2-style Die Number input -->
        <label>Die Number</label>
        <div class="select2box">
          <input
            type="text"
            id="dieInput"
            placeholder="Type to search..."
            autocomplete="off"
          />
          <div id="dieList" class="select2list"></div>
        </div>

        <label>Issue Title</label>
        <input
          type="text"
          id="issueTitle"
          placeholder="e.g., Dimensional instability"
        />

        <label>Issue Description</label>
        <textarea
          id="issueDesc"
          rows="4"
          placeholder="Describe the issue in detail"
        ></textarea>

        <label>Before Photo</label>
        <input type="file" id="fileInput" multiple />

        <!-- ▼ Preview area for uploaded images/files -->
        <div id="preview" class="preview-area"></div>
      </div>

      <div class="card">
        <h2>Assignment</h2>

        <!-- Applicant is automatically determined, so removed -->

        <!-- ▼ Select2-style Assignee input -->
        <label>Assignee</label>
        <div class="select2box">
          <input
            type="text"
            id="assigneeInput"
            placeholder="Type to search..."
            autocomplete="off"
          />
          <div id="assigneeList" class="select2list"></div>
        </div>
      </div>

      <div class="bottom-area">
        <button class="primary">Submit</button>
      </div>
    </div>

    <script>
      /* ---------------------------------------------
   Check if file is an image (extension-based)
   This avoids MIME type issues on Apache + Chrome
--------------------------------------------- */
      function isImageFile(file) {
        const name = file.name.toLowerCase();
        return (
          name.endsWith(".jpg") ||
          name.endsWith(".jpeg") ||
          name.endsWith(".png") ||
          name.endsWith(".gif") ||
          name.endsWith(".bmp") ||
          name.endsWith(".webp") ||
          name.endsWith(".heic")
        );
      }

      /* ---------------------------------------------
   Image preview handling (add, display, delete)
--------------------------------------------- */
      document.addEventListener("DOMContentLoaded", () => {
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");
        let fileList = [];

        // Add new files to the list
        fileInput.addEventListener("change", () => {
          fileList = fileList.concat(Array.from(fileInput.files));
          renderPreview();
        });

        // Render preview thumbnails
        function renderPreview() {
          preview.innerHTML = "";

          fileList.forEach((file, index) => {
            const item = document.createElement("div");
            item.className = "preview-item";

            // Click to delete file
            item.addEventListener("click", () => {
              if (confirm("Do you want to delete this file?")) {
                fileList.splice(index, 1);
                renderPreview();
              }
            });

            // Display image thumbnail or file name
            if (isImageFile(file)) {
              const img = document.createElement("img");
              img.src = URL.createObjectURL(file);
              img.onload = () => URL.revokeObjectURL(img.src);
              item.appendChild(img);
            } else {
              item.textContent = file.name;
            }

            preview.appendChild(item);
          });
        }

        /* ---------------------------------------------
     Select2-style Die Number (prefix search)
     Data source: ./php/die_issue_php/get_die_numbers.php
  --------------------------------------------- */
        const dieInput = document.getElementById("dieInput");
        const dieListBox = document.getElementById("dieList");
        let dieList = [];

        // Load die numbers from PHP
        fetch("./php/die_issue_php/get_die_numbers.php")
          .then((res) => res.json())
          .then((list) => {
            dieList = list;
          });

        // Filter by prefix match
        dieInput.addEventListener("input", () => {
          const keyword = dieInput.value.toLowerCase();
          const filtered = dieList.filter((d) =>
            d.toLowerCase().startsWith(keyword),
          );

          dieListBox.innerHTML = "";
          filtered.forEach((die) => {
            const item = document.createElement("div");
            item.className = "select2item";
            item.textContent = die;

            item.addEventListener("click", () => {
              dieInput.value = die;
              dieListBox.style.display = "none";
            });

            dieListBox.appendChild(item);
          });

          dieListBox.style.display = filtered.length ? "block" : "none";
        });

        /* ---------------------------------------------
     Select2-style Assignee (prefix search)
     Data source: ./php/die_issue_php/get_staff_names.php
  --------------------------------------------- */
        const assigneeInput = document.getElementById("assigneeInput");
        const assigneeListBox = document.getElementById("assigneeList");
        let staffList = [];

        // Load staff names from PHP
        fetch("./php/die_issue_php/get_staff_names.php")
          .then((res) => res.json())
          .then((list) => {
            staffList = list;
          });

        // Filter by prefix match
        assigneeInput.addEventListener("input", () => {
          const keyword = assigneeInput.value.toLowerCase();
          const filtered = staffList.filter((s) =>
            s.toLowerCase().startsWith(keyword),
          );

          assigneeListBox.innerHTML = "";
          filtered.forEach((name) => {
            const item = document.createElement("div");
            item.className = "select2item";
            item.textContent = name;

            item.addEventListener("click", () => {
              assigneeInput.value = name;
              assigneeListBox.style.display = "none";
            });

            assigneeListBox.appendChild(item);
          });

          assigneeListBox.style.display = filtered.length ? "block" : "none";
        });

        /* ---------------------------------------------
     Close dropdowns when clicking outside
  --------------------------------------------- */
        document.addEventListener("click", (e) => {
          if (!e.target.closest(".select2box")) {
            dieListBox.style.display = "none";
            assigneeListBox.style.display = "none";
          }
        });
      });
    </script>
  </body>
</html>
