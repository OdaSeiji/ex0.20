<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>New Die Issue</title>

    <style>
      body {
        background-color: #e8f0f8;
        font-family: sans-serif;
      }

      h2 {
        color: #2b6ca3;
        font-weight: bold;
      }

      .container {
        width: 90%;
        margin: 20px auto;
      }

      .card {
        background: #ffffff;
        border: 1px solid #c5d1dd;
        border-radius: 6px;
        padding: 20px;
      }

      label {
        font-weight: bold;
        color: #2b6ca3;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        margin-bottom: 15px;
        border: 1px solid #c5d1dd;
        border-radius: 4px;
      }

      .btn-save {
        background-color: #2b6ca3;
        color: white;
        padding: 10px 18px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
      }

      .btn-save:hover {
        background-color: #1f527d;
      }

      /* Select2風 */
      .dropdown {
        position: relative;
      }

      .dropdown-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: white;
        border: 1px solid #c5d1dd;
        max-height: 200px;
        overflow-y: auto;
        display: none;
        z-index: 1000;
      }

      .dropdown-item {
        padding: 8px;
        cursor: pointer;
      }

      .dropdown-item:hover {
        background: #cfe2f3;
      }

      .preview-img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-right: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>New Die Issue</h2>

      <div class="card">
        <!-- Die Number -->
        <label>Die Number</label>
        <div class="dropdown">
          <input type="text" id="dieInput" placeholder="Type to search..." />
          <div id="dieDropdown" class="dropdown-list"></div>
        </div>
        <input type="hidden" id="dieId" />

        <!-- Title -->
        <label>Issue Title</label>
        <input type="text" id="title" />

        <!-- Priority -->
        <label>Priority</label>
        <select id="priority">
          <option value="3">Low</option>
          <option value="2">Middle</option>
          <option value="1">High</option>
        </select>

        <!-- Assignee -->
        <label>Assignee</label>
        <select id="assignee"></select>

        <!-- Description -->
        <label>Description</label>
        <textarea id="description" rows="4"></textarea>

        <!-- Attachments -->
        <label>Attachments</label>
        <input type="file" id="files" multiple accept="image/*" />
        <div id="previewArea" style="display: flex; margin-top: 10px"></div>

        <button class="btn-save" onclick="saveIssue()">Save</button>
      </div>
    </div>

    <script>
      let dieList = [];
      let currentIndex = -1;

      // 金型一覧取得
      fetch("./php/die_issue_php/get_die_list.php")
        .then((res) => res.json())
        .then((data) => (dieList = data));

      // スタッフ一覧取得（id + staff_name）
      fetch("./php/die_issue_php/get_staff_names.php")
        .then((res) => res.json())
        .then((data) => {
          const sel = document.getElementById("assignee");
          data.forEach((s) => {
            const opt = document.createElement("option");
            opt.value = s.id;
            opt.textContent = s.staff_name;
            sel.appendChild(opt);
          });
        });

      /* Select2風 Die Number */
      const input = document.getElementById("dieInput");
      const dropdown = document.getElementById("dieDropdown");

      input.addEventListener("input", function () {
        const keyword = input.value.toLowerCase();
        dropdown.innerHTML = "";
        currentIndex = -1;

        if (!keyword) {
          dropdown.style.display = "none";
          return;
        }

        const filtered = dieList.filter((d) =>
          d.die_number.toLowerCase().startsWith(keyword),
        );

        filtered.forEach((d) => {
          const item = document.createElement("div");
          item.className = "dropdown-item";
          item.textContent = d.die_number;
          item.onclick = () => selectDie(d);
          dropdown.appendChild(item);
        });

        dropdown.style.display = filtered.length ? "block" : "none";
      });

      // キー操作
      input.addEventListener("keydown", function (e) {
        const items = dropdown.querySelectorAll(".dropdown-item");
        if (items.length === 0) return;

        if (e.key === "ArrowDown") {
          e.preventDefault();
          currentIndex = (currentIndex + 1) % items.length;
          updateHighlight(items);
        }

        if (e.key === "ArrowUp") {
          e.preventDefault();
          currentIndex = (currentIndex - 1 + items.length) % items.length;
          updateHighlight(items);
        }

        if (e.key === "Enter") {
          e.preventDefault();
          if (currentIndex >= 0) {
            items[currentIndex].click();
          }
        }
      });

      function updateHighlight(items) {
        items.forEach((item, index) => {
          item.style.background = index === currentIndex ? "#cfe2f3" : "white";
        });
      }

      function selectDie(d) {
        input.value = d.die_number;
        document.getElementById("dieId").value = d.id;
        dropdown.style.display = "none";
      }

      /* 添付ファイルプレビュー */
      document.getElementById("files").addEventListener("change", function () {
        const area = document.getElementById("previewArea");
        area.innerHTML = "";

        [...this.files].forEach((file) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = document.createElement("img");
            img.src = e.target.result;
            img.className = "preview-img";
            area.appendChild(img);
          };
          reader.readAsDataURL(file);
        });
      });

      /* 保存処理 */
      function saveIssue() {
        if (!document.getElementById("dieId").value) {
          alert("Please select a die number from the list.");
          return;
        }

        const fd = new FormData();
        fd.append("die_id", document.getElementById("dieId").value);
        fd.append("issue_title", document.getElementById("title").value);
        fd.append(
          "issue_description",
          document.getElementById("description").value,
        );
        fd.append("priority", document.getElementById("priority").value);
        fd.append("reported_by", document.getElementById("assignee").value);

        const files = document.getElementById("files").files;
        for (let i = 0; i < files.length; i++) {
          fd.append("files[]", files[i]);
        }

        fetch("./php/die_issue_php/save_issue.php", {
          method: "POST",
          body: fd,
        })
          .then((res) => res.json())
          .then((result) => {
            if (result.status === "success") {
              alert("Saved.");
              location.href = "die_issue_list.html";
            } else {
              alert("Error: " + result.error);
            }
          });
      }
    </script>
  </body>
</html>
