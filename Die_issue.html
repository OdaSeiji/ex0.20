<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>New Die Issue</title>

    <style>
      body {
        background-color: #e8f0f8;
        font-family: sans-serif;
      }

      h2 {
        color: #2b6ca3;
        font-weight: bold;
      }

      .container {
        width: 90%;
        margin: 20px auto;
      }

      .card {
        background: #ffffff;
        border: 1px solid #c5d1dd;
        border-radius: 6px;
        padding: 20px;
      }

      label {
        font-weight: bold;
        color: #2b6ca3;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        margin-bottom: 15px;
        border: 1px solid #c5d1dd;
        border-radius: 4px;
      }

      textarea {
        height: 120px;
      }

      .btn-save {
        background-color: #2b6ca3;
        color: white;
        padding: 10px 18px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
      }

      .btn-save:hover {
        background-color: #1f527d;
      }

      .btn-back {
        background-color: #6c8ebf;
        color: white;
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
      }

      .btn-back:hover {
        background-color: #56729a;
      }

      .text-right {
        text-align: right;
      }

      .preview-area img {
        width: 120px;
        margin-right: 10px;
        margin-bottom: 10px;
        border: 1px solid #c5d1dd;
        border-radius: 4px;
      }

      /* Select2風 */
      .select2box {
        position: relative;
      }

      .select2list {
        position: absolute;
        top: 38px;
        left: 0;
        width: 100%;
        background: white;
        border: 1px solid #c5d1dd;
        border-radius: 4px;
        max-height: 180px;
        overflow-y: auto;
        display: none;
        z-index: 10;
      }

      .select2item {
        padding: 6px 10px;
        cursor: pointer;
      }

      .select2item:hover {
        background-color: #e8f0f8;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>New Die Issue</h2>

      <!-- 戻るボタン -->
      <div class="text-right" style="margin-bottom: 10px">
        <button
          class="btn-back"
          onclick="location.href = 'die_issue_list.html'"
        >
          ← Back to List
        </button>
      </div>

      <div class="card">
        <form id="issueForm" enctype="multipart/form-data">
          <!-- 金型選択（Select2風） -->
          <label>Die</label>
          <div class="select2box">
            <input
              type="text"
              id="dieInput"
              placeholder="Type to search..."
              autocomplete="off"
            />
            <input type="hidden" name="die_id" id="dieId" />
            <div id="dieListBox" class="select2list"></div>
          </div>

          <label>Issue Title</label>
          <input type="text" name="issue_title" required />

          <label>Issue Description</label>
          <textarea name="issue_description" required></textarea>

          <label>Priority</label>
          <select name="priority">
            <option value="1">High</option>
            <option value="2" selected>Middle</option>
            <option value="3">Low</option>
          </select>

          <label>Attachments</label>
          <input type="file" name="files[]" multiple accept="image/*" />

          <div class="preview-area" id="previewArea"></div>

          <button type="submit" class="btn-save">Save Issue</button>
        </form>
      </div>
    </div>

    <script>
      let dieList = [];

      // 金型一覧取得（./php/die_issue_php/ に統一）
      fetch("./php/die_issue_php/get_die_list.php")
        .then((res) => res.json())
        .then((data) => {
          dieList = data; // [{id:1, die_number:"CP9001"}, ...]
        });

      const dieInput = document.getElementById("dieInput");
      const dieId = document.getElementById("dieId");
      const dieListBox = document.getElementById("dieListBox");

      // 入力イベント（前方一致フィルター）
      dieInput.addEventListener("input", () => {
        const keyword = dieInput.value.toLowerCase();
        const filtered = dieList.filter((d) =>
          d.die_number.toLowerCase().startsWith(keyword),
        );

        dieListBox.innerHTML = "";
        filtered.forEach((die) => {
          const item = document.createElement("div");
          item.className = "select2item";
          item.textContent = die.die_number;

          item.addEventListener("click", () => {
            dieInput.value = die.die_number;
            dieId.value = die.id;
            dieListBox.style.display = "none";
          });

          dieListBox.appendChild(item);
        });

        dieListBox.style.display = filtered.length ? "block" : "none";
      });

      // フォーカス外れたら閉じる
      document.addEventListener("click", (e) => {
        if (!dieListBox.contains(e.target) && e.target !== dieInput) {
          dieListBox.style.display = "none";
        }
      });

      // 添付ファイルプレビュー
      document
        .querySelector("input[name='files[]']")
        .addEventListener("change", function () {
          const preview = document.getElementById("previewArea");
          preview.innerHTML = "";

          [...this.files].forEach((file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
              const img = document.createElement("img");
              img.src = e.target.result;
              preview.appendChild(img);
            };
            reader.readAsDataURL(file);
          });
        });

      // フォーム送信
      document
        .getElementById("issueForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          if (!dieId.value) {
            alert("Please select a Die.");
            return;
          }

          const formData = new FormData(this);

          fetch("./php/die_issue_php/save_issue.php", {
            method: "POST",
            body: formData,
          })
            .then((res) => res.json())
            .then((result) => {
              if (result.status === "success") {
                alert("Issue saved.");
                location.href = "die_issue_list.html";
              } else {
                alert("Error: " + result.error);
              }
            })
            .catch((err) => {
              console.error(err);
              alert("Communication error.");
            });
        });
    </script>
  </body>
</html>
