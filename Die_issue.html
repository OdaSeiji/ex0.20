<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>New Issue Registration</title>
    <link rel="stylesheet" href="die_issue.css" />
  </head>

  <body>
    <header>New Issue Registration</header>

    <div class="container">
      <div class="card">
        <h2>Basic Information</h2>

        <!-- ▼ Select2-style Die Number -->
        <label>Die Number</label>
        <div class="select2box">
          <input
            type="text"
            id="dieInput"
            placeholder="Type to search..."
            autocomplete="off"
          />
          <div id="dieList" class="select2list"></div>
        </div>
        <input type="hidden" id="dieId" />

        <label>Issue Title</label>
        <input type="text" id="issueTitle" />

        <label>Issue Description</label>
        <textarea id="issueDesc" rows="4"></textarea>

        <label>Before Photo</label>
        <input type="file" id="fileInput" name="files[]" multiple />

        <div id="preview" class="preview-area"></div>
      </div>

      <div class="card">
        <h2>Assignment</h2>

        <!-- ▼ Select2-style Assignee -->
        <label>Assignee</label>
        <div class="select2box">
          <input
            type="text"
            id="assigneeInput"
            placeholder="Type to search..."
            autocomplete="off"
          />
          <div id="assigneeList" class="select2list"></div>
        </div>
        <input type="hidden" id="assigneeId" />
      </div>

      <div class="bottom-area">
        <button id="submitBtn" class="primary" disabled>Submit</button>
      </div>
    </div>

    <script>
      // ---------------------------------------------
      // Image preview handling
      // ---------------------------------------------
      function isImageFile(file) {
        const name = file.name.toLowerCase();
        return (
          name.endsWith(".jpg") ||
          name.endsWith(".jpeg") ||
          name.endsWith(".png") ||
          name.endsWith(".gif") ||
          name.endsWith(".bmp") ||
          name.endsWith(".webp") ||
          name.endsWith(".heic")
        );
      }

      document.addEventListener("DOMContentLoaded", () => {
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");
        const submitBtn = document.getElementById("submitBtn");

        let fileList = [];

        fileInput.addEventListener("change", () => {
          fileList = fileList.concat(Array.from(fileInput.files));
          renderPreview();
          validateForm();
        });

        function renderPreview() {
          preview.innerHTML = "";
          fileList.forEach((file, index) => {
            const item = document.createElement("div");
            item.className = "preview-item";

            item.addEventListener("click", () => {
              if (confirm("Delete this file?")) {
                fileList.splice(index, 1);
                renderPreview();
                validateForm();
              }
            });

            if (isImageFile(file)) {
              const img = document.createElement("img");
              img.src = URL.createObjectURL(file);
              img.onload = () => URL.revokeObjectURL(img.src);
              item.appendChild(img);
            } else {
              item.textContent = file.name;
            }

            preview.appendChild(item);
          });
        }

        // ---------------------------------------------
        // Load Die Numbers (ID + name)
        // ---------------------------------------------
        const dieInput = document.getElementById("dieInput");
        const dieListBox = document.getElementById("dieList");
        const dieId = document.getElementById("dieId");
        let dieList = [];

        fetch("./php/die_issue_php/get_die_numbers.php")
          .then((res) => res.json())
          .then((list) => (dieList = list));

        dieInput.addEventListener("input", () => {
          const keyword = dieInput.value.toLowerCase();
          const filtered = dieList.filter((d) =>
            d.die_number.toLowerCase().startsWith(keyword),
          );

          dieListBox.innerHTML = "";
          filtered.forEach((d) => {
            const item = document.createElement("div");
            item.className = "select2item";
            item.textContent = d.die_number;

            item.addEventListener("click", () => {
              dieInput.value = d.die_number;
              dieId.value = d.id;
              dieListBox.style.display = "none";
              validateForm();
            });

            dieListBox.appendChild(item);
          });

          dieListBox.style.display = filtered.length ? "block" : "none";
        });

        // ---------------------------------------------
        // Load Staff (ID + name)
        // ---------------------------------------------
        const assigneeInput = document.getElementById("assigneeInput");
        const assigneeListBox = document.getElementById("assigneeList");
        const assigneeId = document.getElementById("assigneeId");
        let staffList = [];

        fetch("./php/die_issue_php/get_staff_names.php")
          .then((res) => res.json())
          .then((list) => (staffList = list));

        assigneeInput.addEventListener("input", () => {
          const keyword = assigneeInput.value.toLowerCase();
          const filtered = staffList.filter((s) =>
            s.name.toLowerCase().startsWith(keyword),
          );

          assigneeListBox.innerHTML = "";
          filtered.forEach((s) => {
            const item = document.createElement("div");
            item.className = "select2item";
            item.textContent = s.name;

            item.addEventListener("click", () => {
              assigneeInput.value = s.name;
              assigneeId.value = s.id;
              assigneeListBox.style.display = "none";
              validateForm();
            });

            assigneeListBox.appendChild(item);
          });

          assigneeListBox.style.display = filtered.length ? "block" : "none";
        });

        // ---------------------------------------------
        // Form validation (enable/disable Submit)
        // ---------------------------------------------
        function validateForm() {
          const isValid =
            dieId.value.trim() !== "" &&
            issueTitle.value.trim() !== "" &&
            issueDesc.value.trim() !== "" &&
            assigneeId.value.trim() !== "";

          submitBtn.disabled = !isValid;
        }

        issueTitle.addEventListener("input", validateForm);
        issueDesc.addEventListener("input", validateForm);

        // ---------------------------------------------
        // Submit (POST to save_issue.php)
        // ---------------------------------------------
        document.getElementById("submitBtn").addEventListener("click", () => {
          const fd = new FormData();
          fd.append("die_id", dieId.value);
          fd.append("issue_title", issueTitle.value);
          fd.append("issue_description", issueDesc.value);
          fd.append("assignee_id", assigneeId.value);

          fileList.forEach((f) => fd.append("files[]", f));

          fetch("./php/die_issue_php/save_issue.php", {
            method: "POST",
            body: fd,
          })
            .then((res) => res.json())
            .then((data) => {
              alert("Issue saved. ID = " + data.issue_id);

              // Clear inputs
              dieInput.value = "";
              dieId.value = "";
              issueTitle.value = "";
              issueDesc.value = "";
              assigneeInput.value = "";
              assigneeId.value = "";

              // Clear files
              fileList = [];
              preview.innerHTML = "";

              // Disable submit again
              submitBtn.disabled = true;
            });
        });
      });
    </script>
  </body>
</html>
