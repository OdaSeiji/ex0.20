<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>金型 Issue 一覧</title>
    <link rel="stylesheet" href="common.css" />

    <style>
      .issue-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      .issue-table th,
      .issue-table td {
        border: 1px solid #ccc;
        padding: 8px;
      }
      .issue-table th {
        background: #f0f0f0;
      }

      .badge {
        padding: 3px 8px;
        border-radius: 4px;
        color: white;
        font-size: 12px;
      }
      .p1 {
        background: #d9534f;
      } /* 高 */
      .p2 {
        background: #f0ad4e;
      } /* 中 */
      .p3 {
        background: #5bc0de;
      } /* 低 */

      .status-open {
        color: #d9534f;
        font-weight: bold;
      }
      .status-closed {
        color: #5cb85c;
        font-weight: bold;
      }

      .btn-detail {
        padding: 4px 10px;
        background: #0275d8;
        color: white;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>■ 金型 Issue 一覧</h1>

      <table class="issue-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>金型番号</th>
            <th>タイトル</th>
            <th>優先度</th>
            <th>ステータス</th>
            <th>登録日</th>
            <th>詳細</th>
          </tr>
        </thead>
        <tbody id="issue_list"></tbody>
      </table>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", loadIssueList);

      async function loadIssueList() {
        const res = await fetch("./php/die_issue/get_issue_list.php");
        const list = await res.json();

        const tbody = document.getElementById("issue_list");
        tbody.innerHTML = "";

        list.forEach((row) => {
          const tr = document.createElement("tr");

          // 優先度バッジ
          const pClass = "p" + (row.priority ?? 3);
          const priorityBadge = `<span class="badge ${pClass}">P${row.priority}</span>`;

          // ステータス
          const statusClass =
            row.status === "open" ? "status-open" : "status-closed";

          tr.innerHTML = `
      <td>${row.id}</td>
      <td>${row.die_number}</td>
      <td>${row.issue_title}</td>
      <td>${priorityBadge}</td>
      <td class="${statusClass}">${row.status}</td>
      <td>${row.created_at}</td>
      <td><a class="btn-detail" href="die_issue_detail.html?id=${row.id}">詳細</a></td>
    `;

          tbody.appendChild(tr);
        });
      }
    </script>
  </body>
</html>
