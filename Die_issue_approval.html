<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Issue Approval</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />

    <style>
      body {
        background-color: #e8f0f8;
      }
      h2 {
        color: #2b6ca3;
        font-weight: bold;
      }
      .card {
        border-color: #c5d1dd;
      }
      .card-header {
        background-color: #dce8f5;
        color: #2b6ca3;
        font-weight: bold;
      }
      label {
        font-weight: bold;
        color: #2b6ca3;
      }
    </style>
  </head>

  <body class="container mt-4">
    <h2>Issue Approval</h2>

    <div class="card mt-3">
      <div class="card-header">Issue Information</div>
      <div class="card-body">
        <div class="row mb-2">
          <div class="col-md-3"><label>Die Number:</label></div>
          <div class="col-md-9" id="die_number"></div>
        </div>

        <div class="row mb-2">
          <div class="col-md-3"><label>Issue Title:</label></div>
          <div class="col-md-9" id="issue_title"></div>
        </div>

        <div class="row mb-2">
          <div class="col-md-3"><label>Description:</label></div>
          <div class="col-md-9" id="issue_description"></div>
        </div>

        <div class="row mb-2">
          <div class="col-md-3"><label>Priority:</label></div>
          <div class="col-md-9" id="priority"></div>
        </div>

        <div class="row mb-2">
          <div class="col-md-3"><label>Approval Status:</label></div>
          <div class="col-md-9" id="approval_status"></div>
        </div>

        <div class="row mb-2">
          <div class="col-md-3"><label>Reported By:</label></div>
          <div class="col-md-9" id="reported_by"></div>
        </div>

        <div class="row mb-2">
          <div class="col-md-3"><label>Reported At:</label></div>
          <div class="col-md-9" id="reported_at"></div>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <button id="btnApprove" class="btn btn-primary">Approve</button>
      <button id="btnReject" class="btn btn-danger">Reject</button>
      <button class="btn btn-secondary" onclick="history.back()">Back</button>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const issueId = params.get("id");

      // 課題情報取得
      fetch(`./php/die_issue_php/get_issue_detail.php?id=${issueId}`)
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("die_number").textContent = data.die_number;
          document.getElementById("issue_title").textContent = data.issue_title;
          document.getElementById("issue_description").textContent =
            data.issue_description;
          document.getElementById("priority").textContent = data.priority;
          document.getElementById("approval_status").textContent =
            data.approval_status;
          document.getElementById("reported_by").textContent =
            data.reported_by_name;
          document.getElementById("reported_at").textContent = data.reported_at;
        });

      // 承認
      document.getElementById("btnApprove").onclick = () => {
        if (!confirm("Approve this issue?")) return;

        fetch("./php/die_issue_php/approve_issue.php", {
          method: "POST",
          body: new URLSearchParams({ issue_id: issueId }),
        })
          .then((res) => res.json())
          .then(() => {
            alert("Approved.");
            window.location.href = "die_issue_list.html";
          });
      };

      // 却下
      document.getElementById("btnReject").onclick = () => {
        if (!confirm("Reject this issue?")) return;

        fetch("./php/die_issue_php/reject_issue.php", {
          method: "POST",
          body: new URLSearchParams({ issue_id: issueId }),
        })
          .then((res) => res.json())
          .then(() => {
            alert("Rejected.");
            window.location.href = "die_issue_list.html";
          });
      };
    </script>
  </body>
</html>
