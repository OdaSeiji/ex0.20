<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Die Issue Approval</title>

    <style>
      body {
        background-color: #e8f0f8;
        font-family: sans-serif;
      }

      h2 {
        color: #2b6ca3;
        font-weight: bold;
      }

      .container {
        width: 90%;
        margin: 20px auto;
      }

      .card {
        background: #ffffff;
        border: 1px solid #c5d1dd;
        border-radius: 6px;
        padding: 20px;
        margin-top: 10px;
      }

      label {
        font-weight: bold;
        color: #2b6ca3;
      }

      .value-box {
        background: #f7f9fc;
        border: 1px solid #c5d1dd;
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 15px;
      }

      .thumb {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-right: 10px;
        cursor: pointer;
      }

      /* モーダル */
      #imgModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      #modalContent {
        background: white;
        padding: 20px;
        border-radius: 6px;
        max-width: 90%;
        max-height: 90%;
        text-align: center;
      }

      #modalImg {
        max-width: 100%;
        max-height: 80vh;
        border-radius: 4px;
      }

      .modal-btn {
        background: #2b6ca3;
        color: white;
        padding: 8px 20px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        margin: 5px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Die Issue Approval</h2>

      <div class="card">
        <label>Die Number</label>
        <div class="value-box" id="dieNumber"></div>

        <label>Issue Title</label>
        <div class="value-box" id="issueTitle"></div>

        <label>Description</label>
        <div class="value-box" id="issueDescription"></div>

        <label>Priority</label>
        <div class="value-box" id="priority"></div>

        <label>Reported By</label>
        <div class="value-box" id="reportedBy"></div>

        <label>Before Photos</label>
        <div id="beforePhotos" style="display: flex; margin-top: 10px"></div>

        <button class="modal-btn" onclick="approveIssue()">Approve</button>
        <button class="modal-btn" onclick="rejectIssue()">Reject</button>
      </div>
    </div>

    <!-- モーダル -->
    <div id="imgModal">
      <div id="modalContent">
        <img id="modalImg" src="" />
        <br /><br />
        <button class="modal-btn" onclick="prevImg()">Prev</button>
        <button class="modal-btn" onclick="nextImg()">Next</button>
        <button class="modal-btn" onclick="closeModal()">Close</button>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const issueId = urlParams.get("issue_id"); // ← die_issue_list.html から ?issue_id=◯◯ で来る

      let beforeFiles = [];
      let currentIndex = 0;

      if (!issueId) {
        alert("Issue ID missing.");
        location.href = "die_issue_list.html";
      }

      // Issue 詳細取得（★ ここは元のまま id= を使う）
      fetch(`./php/die_issue_php/get_issue_detail.php?id=${issueId}`)
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("dieNumber").innerText = data.die_number;
          document.getElementById("issueTitle").innerText = data.issue_title;
          document.getElementById("issueDescription").innerText =
            data.issue_description;
          document.getElementById("priority").innerText = data.priority;
          document.getElementById("reportedBy").innerText =
            data.reported_by_name;

          // Before Photos
          beforeFiles = data.before_photos || [];
          const area = document.getElementById("beforePhotos");
          area.innerHTML = "";

          beforeFiles.forEach((f, index) => {
            const img = document.createElement("img");
            img.src = `/ex0.20/upload/01_die_issue_files/${f.saved_name}`;
            img.className = "thumb";
            img.onclick = () => openModal(index);
            area.appendChild(img);
          });
        });

      /* モーダル制御 */
      function openModal(index) {
        currentIndex = index;
        document.getElementById("modalImg").src =
          `/ex0.20/upload/01_die_issue_files/${beforeFiles[index].saved_name}`;
        document.getElementById("imgModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("imgModal").style.display = "none";
      }

      function nextImg() {
        if (beforeFiles.length === 0) return;
        currentIndex = (currentIndex + 1) % beforeFiles.length;
        openModal(currentIndex);
      }

      function prevImg() {
        if (beforeFiles.length === 0) return;
        currentIndex =
          (currentIndex - 1 + beforeFiles.length) % beforeFiles.length;
        openModal(currentIndex);
      }

      /* 承認処理 */
      function approveIssue() {
        fetch("./php/die_issue_php/approve_issue.php", {
          method: "POST",
          body: new URLSearchParams({ issue_id: issueId }),
        })
          .then((res) => res.json())
          .then((result) => {
            alert("Approved.");
            location.href = "die_issue_list.html";
          });
      }

      /* 却下処理 */
      function rejectIssue() {
        fetch("./php/die_issue_php/reject_issue.php", {
          method: "POST",
          body: new URLSearchParams({ issue_id: issueId }),
        })
          .then((res) => res.json())
          .then((result) => {
            alert("Rejected.");
            location.href = "die_issue_list.html";
          });
      }
    </script>
  </body>
</html>
