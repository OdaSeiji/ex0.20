<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Issue List</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      th {
        background: #e8f1ff;
        font-weight: bold;
      }

      tr:hover {
        background: #f0f8ff;
        cursor: pointer;
      }

      .badge {
        padding: 4px 10px;
        border-radius: 4px;
        color: white;
        font-size: 12px;
      }
      .high {
        background: #d9534f;
      }
      .medium {
        background: #f0ad4e;
      }
      .low {
        background: #5bc0de;
      }

      .complete {
        background: #5cb85c;
      }
      .incomplete {
        background: #d9534f;
      }

      .btn {
        padding: 6px 12px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      /* ★ issue_detail 編集用 */
      .detail-cell {
        min-width: 200px;
      }
      .detail-edit {
        width: 95%;
        height: 60px;
        font-size: 14px;
      }
      .save-btn {
        margin-top: 5px;
        padding: 4px 10px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <!-- ★ メニューへ戻るボタン -->
      <div style="text-align: right; margin-bottom: 10px">
        <button
          onclick="location.href = 'index.html'"
          style="
            background: #2b6ca3;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          ← メニューへ戻る
        </button>
      </div>

      <h1 data-key="title">🛠 Issue List（課題一覧）</h1>

      <table id="issueTable">
        <thead>
          <tr>
            <th data-key="col_die">Die Number</th>
            <th data-key="col_type">Issue 種類</th>
            <th data-key="col_priority">Priority</th>
            <th data-key="col_latest">最新診断日</th>
            <th data-key="col_status">完了状態</th>

            <!-- ★ 追加：詳細 -->
            <th>詳細</th>

            <th data-key="col_action">Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      /* 多言語辞書 */
      const dict = {
        ja: {
          title: "🛠 テーマ一覧",
          col_die: "金型番号",
          col_type: "Issue 種類",
          col_priority: "優先度",
          col_latest: "最新診断日",
          col_status: "完了状態",
          col_action: "操作",
        },
        vi: {
          title: "🛠 Danh sách chủ đề",
          col_die: "Mã khuôn",
          col_type: "Loại Issue",
          col_priority: "Ưu tiên",
          col_latest: "Ngày chẩn đoán mới nhất",
          col_status: "Trạng thái",
          col_action: "Thao tác",
        },
      };

      function setLang(lang) {
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          el.textContent = dict[lang][key];
        });
        localStorage.setItem("lang", lang);
      }

      window.onload = function () {
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);
        loadIssueList();
      };

      /* 一覧データ読み込み */
      function loadIssueList() {
        fetch("./php/die_progress_php/get_die_issue_list.php")
          .then((res) => res.json())
          .then((data) => {
            const tbody = document.querySelector("#issueTable tbody");
            tbody.innerHTML = "";

            data.forEach((row) => {
              const tr = document.createElement("tr");

              let priorityClass =
                row.priority == 1
                  ? "high"
                  : row.priority == 2
                    ? "medium"
                    : "low";

              let compClass =
                row.completion_status === "完了" ? "complete" : "incomplete";

              tr.innerHTML = `
                <td>${row.die_number}</td>
                <td>${row.issue_title}</td>
                <td><span class="badge ${priorityClass}">${row.priority_label}</span></td>
                <td>${row.latest_diagnosis_date ?? "—"}</td>
                <td><span class="badge ${compClass}">${row.completion_status}</span></td>

                <!-- ★ issue_detail 表示＋編集 -->
                <td class="detail-cell" data-id="${row.id}">
                  <div class="detail-view">${row.issue_detail ?? ""}</div>
                  <textarea class="detail-edit" style="display:none;">${row.issue_detail ?? ""}</textarea>
                  <button class="save-btn" style="display:none;">保存</button>
                </td>

                <td><button class="btn">詳細</button></td>
              `;

              tbody.appendChild(tr);
            });
          });
      }

      /* ★ クリックで編集モードへ */
      document.addEventListener("click", function (e) {
        const cell = e.target.closest(".detail-cell");
        if (!cell) return;

        const view = cell.querySelector(".detail-view");
        const edit = cell.querySelector(".detail-edit");
        const save = cell.querySelector(".save-btn");

        view.style.display = "none";
        edit.style.display = "block";
        save.style.display = "inline-block";
      });

      /* ★ 保存処理 */
      document.addEventListener("click", async function (e) {
        if (!e.target.classList.contains("save-btn")) return;

        const cell = e.target.closest(".detail-cell");
        const id = cell.dataset.id;
        const edit = cell.querySelector(".detail-edit");
        const view = cell.querySelector(".detail-view");

        const newDetail = edit.value;

        const form = new FormData();
        form.append("id", id);
        form.append("issue_detail", newDetail);

        const res = await fetch(
          "./php/die_progress_php/update_issue_detail.php",
          {
            method: "POST",
            body: form,
          },
        );

        const result = await res.json();

        if (result.status === "success") {
          view.textContent = newDetail;
          view.style.display = "block";
          edit.style.display = "none";
          e.target.style.display = "none";
        } else {
          alert("保存に失敗しました");
        }
      });
    </script>
  </body>
</html>
