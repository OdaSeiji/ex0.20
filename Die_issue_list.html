<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Issue List</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      th {
        background: #e8f1ff;
        font-weight: bold;
      }

      tr:hover {
        background: #f0f8ff;
        cursor: pointer;
      }

      .badge {
        padding: 4px 10px;
        border-radius: 4px;
        color: white;
        font-size: 12px;
      }
      .high {
        background: #d9534f;
      }
      .medium {
        background: #f0ad4e;
      }
      .low {
        background: #5bc0de;
      }

      .complete {
        background: #5cb85c;
      }
      .incomplete {
        background: #d9534f;
      }

      .btn {
        padding: 6px 12px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <!-- ★ メニューへ戻るボタン -->
      <div style="text-align: right; margin-bottom: 10px">
        <button
          onclick="location.href = 'index.html'"
          style="
            background: #2b6ca3;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          ← メニューへ戻る
        </button>
      </div>

      <h1 data-key="title">🛠 Issue List（課題一覧）</h1>

      <table id="issueTable">
        <thead>
          <tr>
            <th data-key="col_die">Die Number</th>
            <th data-key="col_type">Issue Type</th>
            <th data-key="col_priority">Priority</th>
            <th data-key="col_latest">Latest Diagnosis</th>
            <th data-key="col_status">Status</th>
            <th data-key="col_action">Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      /* 多言語辞書 */
      const dict = {
        ja: {
          title: "🛠 テーマ一覧",
          col_die: "金型番号",
          col_type: "Issue 種類",
          col_priority: "優先度",
          col_latest: "最新診断日",
          col_status: "完了状態",
          col_action: "操作",
        },
        vi: {
          title: "🛠 Danh sách chủ đề",
          col_die: "Mã khuôn",
          col_type: "Loại Issue",
          col_priority: "Ưu tiên",
          col_latest: "Ngày chẩn đoán mới nhất",
          col_status: "Trạng thái",
          col_action: "Thao tác",
        },
      };

      function setLang(lang) {
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          el.textContent = dict[lang][key];
        });
        localStorage.setItem("lang", lang);
      }

      window.onload = function () {
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);
        loadIssueList();
      };

      /* 一覧データ読み込み */
      function loadIssueList() {
        fetch("./php/die_inspection_php/get_issue_list.php")
          .then((res) => res.json())
          .then((data) => {
            const tbody = document.querySelector("#issueTable tbody");
            tbody.innerHTML = "";

            data.forEach((row) => {
              const tr = document.createElement("tr");

              // Priority バッジ
              let priorityClass =
                row.priority == 1
                  ? "high"
                  : row.priority == 2
                    ? "medium"
                    : "low";

              // 完了状態
              let compClass =
                row.completion_status === "completed"
                  ? "complete"
                  : "incomplete";
              let compLabel =
                row.completion_status === "completed" ? "完了" : "未完了";

              tr.innerHTML = `
                <td>${row.die_number}</td>
                <td>${row.issue_title}</td>
                <td><span class="badge ${priorityClass}">${row.priority_label}</span></td>
                <td>${row.latest_diagnosis_date ?? "—"}</td>
                <td><span class="badge ${compClass}">${compLabel}</span></td>
                <td><button class="btn">詳細</button></td>
              `;

              tbody.appendChild(tr);
            });
          });
      }
    </script>
  </body>
</html>
