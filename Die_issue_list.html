<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Issue List</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .container {
        max-width: 1500px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      th {
        background: #e8f1ff;
        font-weight: bold;
      }

      tr:hover {
        background: #f0f8ff;
        cursor: pointer;
      }

      .badge {
        padding: 4px 10px;
        border-radius: 4px;
        color: white;
        font-size: 12px;
      }
      .high {
        background: #d9534f;
      }
      .medium {
        background: #f0ad4e;
      }
      .low {
        background: #5bc0de;
      }

      .complete {
        background: #5cb85c;
      }
      .incomplete {
        background: #d9534f;
      }

      .btn {
        padding: 6px 12px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .die-number {
        font-family: "Roboto Mono", monospace;
        text-align: left;
      }

      .editable-cell {
        min-width: 160px;
        text-align: left;
        cursor: pointer;
      }
      .detail-view {
        white-space: pre-wrap;
        min-height: 1em;
      }
      .detail-edit {
        width: 95%;
        height: 60px;
        font-size: 14px;
      }
      .detail-edit-input {
        width: 95%;
        font-size: 14px;
        padding: 3px 5px;
      }
      .save-btn {
        margin-top: 5px;
        padding: 4px 10px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <!-- 戻るボタン -->
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
        <button id="backBtn"
          style="background:#2b6ca3;color:white;padding:8px 16px;border:none;border-radius:5px;cursor:pointer;">
          ← メニューへ戻る
        </button>
        <span id="filterBadge" style="display:none; background:#e65100; color:#fff; padding:4px 12px; border-radius:4px; font-size:13px; font-family:'Roboto Mono',monospace;"></span>
      </div>

      <h1 data-key="title">🛠 Issue List（課題一覧）</h1>

      <table id="issueTable">
        <thead>
          <tr>
            <th style="cursor:pointer; user-select:none;" onclick="sortByDieNo()">
              <span data-key="col_die">金型番号</span>
              <span id="sortIndicator"></span>
              <input id="searchDieNo" type="text" placeholder="検索..."
                style="margin-left:8px; padding:3px 7px; font-size:12px; border:1px solid #aaa; border-radius:4px; width:100px; font-weight:normal;"
                oninput="filterAndRender()"
                onclick="event.stopPropagation()" />
            </th>
            <th data-key="col_title_jp">テーマ(JP)</th>
            <th data-key="col_title_vn">テーマ(VN)</th>
            <th data-key="col_priority">優先度</th>
            <th data-key="col_latest">最終押出日</th>
            <th data-key="col_status">完了状態</th>
            <th data-key="col_action">操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      /* 多言語辞書 */
      const dict = {
        ja: {
          title: "🛠 テーマ一覧",
          col_die: "金型番号",
          col_title_jp: "テーマ(JP)",
          col_title_vn: "テーマ(VN)",
          col_priority: "優先度",
          col_latest: "最終押出日",
          col_status: "完了状態",
          col_action: "操作",
        },
        vi: {
          title: "🛠 Danh sách chủ đề",
          col_die: "Mã khuôn",
          col_title_jp: "Chủ đề(JP)",
          col_title_vn: "Chủ đề(VN)",
          col_priority: "Ưu tiên",
          col_latest: "Ngày ép cuối",
          col_status: "Trạng thái",
          col_action: "Thao tác",
        },
      };

      function setLang(lang) {
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          el.textContent = dict[lang][key];
        });
        localStorage.setItem("lang", lang);
      }

      /* URLパラメータから die_id / die_number を取得 */
      const urlParams  = new URLSearchParams(location.search);
      const filterDieId = urlParams.get("die_id");
      const filterDieNo = urlParams.get("die_number");

      window.onload = function () {
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);

        if (filterDieId) {
          document.getElementById("backBtn").textContent = "← 重点管理リストへ戻る";
          document.getElementById("backBtn").onclick = () => location.href = "die_watch.html";
          const badge = document.getElementById("filterBadge");
          badge.textContent = filterDieNo ? `金型: ${filterDieNo}` : `die_id: ${filterDieId}`;
          badge.style.display = "inline-block";
        } else {
          document.getElementById("backBtn").onclick = () => location.href = "index.html";
        }

        loadIssueList();
      };

      /* 全データ保持・ソート状態 */
      let allData  = [];
      let sortDir  = 0; // 0=未ソート, 1=昇順, -1=降順

      /* 一覧データ読み込み */
      function loadIssueList() {
        const url = filterDieId
          ? `./php/die_progress_php/get_die_issue_list.php?die_id=${filterDieId}`
          : "./php/die_progress_php/get_die_issue_list.php";
        fetch(url)
          .then((res) => res.json())
          .then((data) => {
            allData = data;
            filterAndRender();
          });
      }

      /* 型番ソート */
      function sortByDieNo() {
        sortDir = sortDir === 1 ? -1 : 1;
        document.getElementById("sortIndicator").textContent = sortDir === 1 ? "▲" : "▼";
        allData.sort((a, b) => a.die_number.localeCompare(b.die_number, "ja") * sortDir);
        filterAndRender();
      }

      /* 型番フィルタ → 描画 */
      function filterAndRender() {
        const q = document.getElementById("searchDieNo").value.trim().toLowerCase();
        const rows = q ? allData.filter(r => r.die_number.toLowerCase().includes(q)) : allData;
        renderTable(rows);
      }

      /* テーブル描画 */
      function renderTable(data) {
        const tbody = document.querySelector("#issueTable tbody");
        tbody.innerHTML = "";

        data.forEach((row) => {
          const tr = document.createElement("tr");

          const priorityClass =
            row.priority == 1 ? "high" : row.priority == 2 ? "medium" : "low";
          const compClass =
            row.completion_status === "完了" ? "complete" : "incomplete";

          tr.innerHTML = `
            <td class="die-number">${row.die_number}</td>
            <td class="editable-cell" data-id="${row.id}" data-field="issue_title_jp">
              <div class="detail-view">${row.issue_title_jp ?? ""}</div>
              <input class="detail-edit-input" style="display:none;" type="text" value="${(row.issue_title_jp ?? "").replace(/"/g, "&quot;")}" />
              <button class="save-btn" style="display:none;">保存</button>
            </td>
            <td class="editable-cell" data-id="${row.id}" data-field="issue_title_vn">
              <div class="detail-view">${row.issue_title_vn ?? ""}</div>
              <input class="detail-edit-input" style="display:none;" type="text" value="${(row.issue_title_vn ?? "").replace(/"/g, "&quot;")}" />
              <button class="save-btn" style="display:none;">保存</button>
            </td>
            <td><span class="badge ${priorityClass}">${row.priority_label}</span></td>
            <td>${row.latest_press_date?.split(" ")[0] ?? "—"}</td>
            <td><span class="badge ${compClass}">${row.completion_status}</span></td>
            <td><button class="btn" onclick="location.href='die_timeline.html?die_id=${row.die_id}&die_number=${encodeURIComponent(row.die_number)}'">タイムライン</button></td>
          `;

          tbody.appendChild(tr);
        });
      }

      /* クリックで編集モードへ */
      document.addEventListener("click", function (e) {
        if (e.target.classList.contains("save-btn")) return;
        const cell = e.target.closest(".editable-cell");
        if (!cell) return;

        const view = cell.querySelector(".detail-view");
        const input = cell.querySelector(".detail-edit-input");
        const area = cell.querySelector(".detail-edit");
        const save = cell.querySelector(".save-btn");

        view.style.display = "none";
        if (input) input.style.display = "block";
        if (area) area.style.display = "block";
        save.style.display = "inline-block";
      });

      /* 保存処理 */
      document.addEventListener("click", async function (e) {
        if (!e.target.classList.contains("save-btn")) return;

        const cell = e.target.closest(".editable-cell");
        const id = cell.dataset.id;
        const field = cell.dataset.field;
        const input = cell.querySelector(".detail-edit-input");
        const area = cell.querySelector(".detail-edit");
        const view = cell.querySelector(".detail-view");

        const newValue = input ? input.value : area.value;

        const form = new FormData();
        form.append("id", id);
        form.append("field", field);
        form.append("value", newValue);

        const res = await fetch(
          "./php/die_progress_php/update_issue_detail.php",
          { method: "POST", body: form },
        );

        const result = await res.json();

        if (result.status === "success") {
          view.textContent = newValue;
          view.style.display = "block";
          if (input) input.style.display = "none";
          if (area) area.style.display = "none";
          e.target.style.display = "none";
        } else {
          alert("保存に失敗しました");
        }
      });
    </script>
  </body>
</html>
