<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Die Issue List</title>
    <link rel="stylesheet" href="die_issue.css" />

    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
      }
      th {
        background: #f0f0f0;
      }
      .filter-box {
        margin-top: 20px;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <header>Die Issue List</header>

    <div class="container">
      <!-- ▼ Die Number フィルター -->
      <div class="filter-box">
        <label>Filter by Die Number:</label>
        <input
          type="text"
          id="filterDie"
          placeholder="Type Die Number..."
          style="width: 200px"
        />
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Die Number</th>
            <th>Issue Title</th>
            <th>Assignee</th>
            <th>Approval</th>
            <th>Repairs</th>
            <th>Created At</th>
          </tr>
        </thead>
        <tbody id="issueTableBody"></tbody>
      </table>
    </div>

    <script>
      // ---------------------------------------------
      // Approval status color formatting
      // ---------------------------------------------
      function renderApprovalStatus(status) {
        switch (status) {
          case "pending":
            return `<span style="color: orange; font-weight: bold;">Pending</span>`;
          case "approved":
            return `<span style="color: green; font-weight: bold;">Approved</span>`;
          case "rejected":
            return `<span style="color: red; font-weight: bold;">Rejected</span>`;
          default:
            return status;
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        let issueList = [];

        // ---------------------------------------------
        // Load issue list from PHP
        // ---------------------------------------------
        fetch("./php/die_issue_php/get_issue_list.php")
          .then((res) => res.json())
          .then((list) => {
            issueList = list;
            renderTable(issueList);
          });

        const tbody = document.getElementById("issueTableBody");
        const filterDie = document.getElementById("filterDie");

        // ---------------------------------------------
        // Render table
        // ---------------------------------------------
        function renderTable(list) {
          tbody.innerHTML = "";
          list.forEach((row) => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
        <td>${row.id}</td>
        <td>${row.die_number}</td>
        <td>${row.issue_title}</td>
        <td>${row.assignee_name}</td>
        <td>${renderApprovalStatus(row.approval_status)}</td>
        <td>${row.repair_count}</td>
        <td>${row.created_at}</td>
      `;

            tbody.appendChild(tr);
          });
        }

        // ---------------------------------------------
        // Die Number 前方一致フィルター
        // ---------------------------------------------
        filterDie.addEventListener("input", () => {
          const keyword = filterDie.value.toLowerCase();

          const filtered = issueList.filter((row) =>
            row.die_number.toLowerCase().startsWith(keyword),
          );

          renderTable(filtered);
        });
      });
    </script>
  </body>
</html>
