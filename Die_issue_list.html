<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Die Issue List</title>

    <style>
      body {
        background-color: #e8f0f8;
        font-family: sans-serif;
      }

      h2 {
        color: #2b6ca3;
        font-weight: bold;
      }

      .container {
        width: 95%;
        margin: 20px auto;
      }

      .card {
        background: #ffffff;
        border: 1px solid #c5d1dd;
        border-radius: 6px;
        padding: 20px;
      }

      .table-header {
        background-color: #dce8f5;
        color: #2b6ca3;
        font-weight: bold;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      th,
      td {
        border: 1px solid #c5d1dd;
        padding: 8px 10px;
        text-align: left;
      }

      tr:hover {
        background-color: #f2f7fc;
      }

      .btn-new {
        background-color: #2b6ca3;
        color: white;
        padding: 8px 14px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
      }

      .btn-new:hover {
        background-color: #1f527d;
      }

      .text-right {
        text-align: right;
      }

      /* Action buttons */
      .btn-action {
        background-color: #2b6ca3;
        color: white;
        padding: 4px 10px;
        border: none;
        border-radius: 4px;
        margin-right: 4px;
      }
      .btn-action:hover {
        background-color: #1f527d;
      }

      .btn-repair {
        background-color: #6c8ebf;
        color: white;
        padding: 4px 10px;
        border: none;
        border-radius: 4px;
        margin-right: 4px;
      }
      .btn-repair:hover {
        background-color: #56729a;
      }

      .btn-delete {
        background-color: #c0392b;
        color: white;
        padding: 4px 10px;
        border: none;
        border-radius: 4px;
      }
      .btn-delete:hover {
        background-color: #922b21;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Die Issue List</h2>

      <!-- 新規追加ボタン -->
      <div class="text-right">
        <button class="btn-new" onclick="location.href = 'die_issue.html'">
          ＋ New Issue
        </button>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr class="table-header">
              <th>ID</th>
              <th>Die Number</th>
              <th>Title</th>
              <th>Reported By</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Repairs</th>
              <th>Created</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="issueTableBody">
            <!-- JS で行を追加 -->
          </tbody>
        </table>
      </div>
    </div>

    <script>
      // 一覧データ取得
      fetch("./php/die_issue_php/get_issue_list.php")
        .then((res) => res.json())
        .then((data) => {
          const tbody = document.getElementById("issueTableBody");
          tbody.innerHTML = "";

          data.forEach((row) => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                    <td>${row.id}</td>
                    <td>${row.die_number}</td>
                    <td>${row.issue_title}</td>
                    <td>${row.reported_by_name ?? ""}</td>
                    <td>${row.approval_status}</td>
                    <td>${row.priority}</td>
                    <td>${row.repair_count}</td>
                    <td>${row.created_at}</td>
                    <td>

                        <!-- Approve ボタン（approved 以外のときだけ表示） -->
                        ${
                          row.approval_status !== "approved"
                            ? `<button class="btn-action" onclick="goApprove(${row.id})">Approve</button>`
                            : ``
                        }

                        <!-- Repair ボタン（approved のときだけ表示） -->
                        ${
                          row.approval_status === "approved"
                            ? `<button class="btn-repair" onclick="goRepair(${row.id})">Repair</button>`
                            : ``
                        }

                        <!-- Delete ボタン（pending のときだけ表示） -->
                        ${
                          row.approval_status === "pending"
                            ? `<button class="btn-delete" onclick="deleteIssue(${row.id})">Delete</button>`
                            : ``
                        }

                    </td>
                `;

            tbody.appendChild(tr);
          });
        })
        .catch((err) => {
          console.error("Error:", err);
        });

      // 承認画面へ（★ issue_id に統一）
      function goApprove(id) {
        location.href = `die_issue_approval.html?issue_id=${id}`;
      }

      // 修理記録一覧へ
      function goRepair(id) {
        location.href = `repair_record_list.html?issue_id=${id}`;
      }

      // 削除
      function deleteIssue(id) {
        if (!confirm("Are you sure you want to delete this issue?")) return;

        fetch(`./php/die_issue_php/delete_issue.php?id=${id}`)
          .then((res) => res.json())
          .then((result) => {
            if (result.status === "success") {
              alert("Deleted.");
              location.reload();
            } else {
              alert("Error: " + result.error);
            }
          });
      }
    </script>
  </body>
</html>
