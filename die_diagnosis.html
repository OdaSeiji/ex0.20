<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>診断（Die Diagnosis）</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      .btn {
        padding: 8px 16px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn:hover {
        background: #005fa3;
      }

      .btn-secondary {
        background: #2b6ca3;
      }

      .section-title {
        font-size: 18px;
        margin-top: 25px;
        border-left: 4px solid #0078d4;
        padding-left: 8px;
      }

      .info-box {
        background: #e8f1ff;
        padding: 10px;
        border-radius: 5px;
        margin-top: 10px;
        font-size: 14px;
      }

      label {
        font-weight: bold;
        margin-top: 15px;
        display: block;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
      }

      textarea {
        resize: vertical;
      }

      .thumb {
        width: 120px;
        margin-right: 10px;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <!-- 多言語ボタン -->
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <!-- 一覧へ戻る -->
      <div style="text-align: right; margin-bottom: 10px">
        <button
          class="btn btn-secondary"
          onclick="location.href = 'die_inspection_list.html'"
        >
          ← 測定一覧へ戻る
        </button>
      </div>

      <h1 data-key="title">🔍 診断（Die Diagnosis）</h1>

      <!-- 測定情報 -->
      <div>
        <div class="section-title" data-key="sec_inspection">
          ■ 測定情報（読み取り専用）
        </div>
        <div id="inspection_info" class="info-box"></div>

        <div class="section-title" data-key="sec_files">
          ■ 測定時の添付ファイル（必須）
        </div>
        <div id="inspection_files"></div>
      </div>

      <!-- 押出指示条件 -->
      <div>
        <div class="section-title" data-key="sec_directive">
          ■ 押出指示条件（t_press_directive）
        </div>
        <div id="directive_info" class="info-box"></div>
      </div>

      <!-- 押出実績 -->
      <div>
        <div class="section-title" data-key="sec_press">
          ■ 押出実績（t_press）
        </div>
        <div id="press_info" class="info-box"></div>
      </div>

      <!-- 診断入力 -->
      <div>
        <div class="section-title" data-key="sec_diagnosis">
          ■ 診断情報（入力）
        </div>

        <label data-key="lbl_date">診断日</label>
        <input type="date" id="diagnosis_date" />

        <label data-key="lbl_staff">診断者</label>
        <select id="diagnosis_staff_id"></select>
      </div>

      <!-- 判定 -->
      <div>
        <div class="section-title" data-key="sec_judgement">■ 判定</div>

        <label>寸法判定</label>
        <select id="dimension_result">
          <option value="OK">OK</option>
          <option value="NG">NG</option>
        </select>

        <label>形状判定</label>
        <select id="shape_result">
          <option value="OK">OK</option>
          <option value="NG">NG</option>
        </select>

        <label>総合判定</label>
        <select id="overall_result">
          <option value="OK">OK</option>
          <option value="NG">NG</option>
        </select>
      </div>

      <!-- NG対応 -->
      <div>
        <div class="section-title" data-key="sec_ng">■ NG 対応（必須）</div>

        <select id="ng_action">
          <option value="1">(1) 様子を見る</option>
          <option value="2">(2) 修理</option>
          <option value="3">(3) 修理 + 条件変更</option>
          <option value="4">(4) 条件変更のみ</option>
        </select>

        <label data-key="lbl_change"
          >条件変更内容（ng_action=3 or 4 の場合）</label
        >
        <textarea id="change_content" rows="3"></textarea>

        <label data-key="lbl_needfix">修理の要否（自動 or 手動）</label>
        <input type="checkbox" id="need_fix" /> 修理が必要
      </div>

      <!-- 承認 -->
      <div>
        <div class="section-title" data-key="sec_approval">
          ■ 承認ステータス
        </div>

        <label>状態</label>
        <select id="approval_status">
          <option value="pending">pending</option>
          <option value="approved">approved</option>
          <option value="rejected">rejected</option>
        </select>

        <label>承認者</label>
        <input type="text" id="approver" />

        <label>承認日</label>
        <input type="date" id="approval_date" />

        <label>却下理由</label>
        <textarea id="reject_reason" rows="3"></textarea>
      </div>

      <!-- メモ -->
      <div>
        <div class="section-title" data-key="sec_memo">■ メモ</div>
        <textarea id="memo" rows="4"></textarea>
      </div>

      <!-- 添付ファイル -->
      <div>
        <div class="section-title" data-key="sec_files2">
          ■ 添付ファイル（任意）
        </div>
        <input type="file" id="diagnosis_files" multiple />
      </div>

      <!-- ボタン -->
      <div style="margin-top: 30px">
        <button class="btn" id="saveBtn" data-key="btn_save">保存</button>
        <button class="btn" id="goFixBtn" data-key="btn_fix">
          修理画面へ進む
        </button>
        <button class="btn" id="goNextPressBtn" data-key="btn_next">
          次回押出条件へ進む
        </button>
      </div>
    </div>

    <script>
      /* 多言語辞書（必要なら後で追加） */
      function setLang(lang) {
        localStorage.setItem("lang", lang);
      }

      window.onload = function () {
        loadInspectionInfo();
        loadDirective();
        loadPress();
        loadStaffList();
      };

      /* ダミーデータ（後で API に置換） */
      function loadInspectionInfo() {
        document.getElementById("inspection_info").innerHTML = `
        測定日：2026-05-03<br>
        測定者：山田<br>
        寸法結果：OK<br>
        形状結果：NG<br>
        総合結果：NG<br>
        メモ：ランド部摩耗
      `;

        document.getElementById("inspection_files").innerHTML = `
        <img src="image1.jpg" class="thumb">
        <a href="measure.pdf" target="_blank">measure.pdf</a><br>
        <a href="measure.xlsx" target="_blank">measure.xlsx</a><br>
      `;
      }

      function loadDirective() {
        document.getElementById("directive_info").innerHTML = `
        billet_size：180<br>
        billet_length：900<br>
        ram_speed：3.5<br>
        billet_temperature：480<br>
        billet_taper_heating：450<br>
        die_temperature：480<br>
        stretch_ratio：8%<br>
        discard_thickness：20mm
      `;
      }

      function loadPress() {
        document.getElementById("press_info").innerHTML = `
        press_date_at：2026-04-30<br>
        billet_size：180<br>
        billet_length：900<br>
        no1_0200_ram_speed：3.2<br>
        actual_die_temperature：475<br>
        stretch_ratio：7.8%
      `;
      }

      function loadStaffList() {
        const staffList = [
          { id: 1, name: "山田" },
          { id: 2, name: "佐藤" },
          { id: 3, name: "鈴木" },
        ];

        const sel = document.getElementById("diagnosis_staff_id");
        staffList.forEach((s) => {
          sel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
      }

      /* 保存処理（ダミー） */
      document.getElementById("saveBtn").onclick = function () {
        alert("保存しました。");
      };

      document.getElementById("goFixBtn").onclick = function () {
        location.href = "die_fix_plan.html";
      };

      document.getElementById("goNextPressBtn").onclick = function () {
        alert("次回押出条件画面はまだ未実装です。");
      };
    </script>
  </body>
</html>
