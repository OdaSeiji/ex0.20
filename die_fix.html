<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>修理報告（Fix Report）</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      .btn {
        padding: 8px 16px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn:hover {
        background: #005fa3;
      }

      .btn-secondary {
        background: #2b6ca3;
      }

      .section-title {
        font-size: 18px;
        margin-top: 25px;
        border-left: 4px solid #0078d4;
        padding-left: 8px;
      }

      .info-box {
        background: #e8f1ff;
        padding: 10px;
        border-radius: 5px;
        margin-top: 10px;
        font-size: 14px;
      }

      label {
        font-weight: bold;
        margin-top: 15px;
        display: block;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
      }

      textarea {
        resize: vertical;
      }

      .thumb {
        width: 120px;
        margin-right: 10px;
        margin-top: 10px;
      }

      .file-item {
        margin-top: 8px;
      }

      .icon {
        width: 20px;
        vertical-align: middle;
        margin-right: 5px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- 一覧へ戻る -->
      <div style="text-align: right; margin-bottom: 10px">
        <button
          class="btn btn-secondary"
          onclick="location.href = 'die_fix_list.html'"
        >
          ← 修理一覧へ戻る
        </button>
      </div>

      <h1>🛠 修理報告（Fix Report）</h1>

      <!-- 修理計画（読み取り専用） -->
      <div>
        <div class="section-title">■ 修理計画（読み取り専用）</div>

        <div class="info-box">
          修理予定日：2026-05-10<br />
          修理担当者：山田<br />
          修理予定内容：<br />
          ・ベアリング交換<br />
          ・ランド部研磨
        </div>

        <div class="section-title">■ 計画時の添付ファイル</div>
        <div>
          <img src="plan1.jpg" class="thumb" />
          <div class="file-item">
            <img src="pdf_icon.png" class="icon" />
            <a href="plan_doc.pdf" target="_blank">plan_doc.pdf</a>
          </div>
        </div>
      </div>

      <!-- 修理実行（入力） -->
      <div>
        <div class="section-title">■ 修理実行（入力）</div>

        <label>実修理日（必須）</label>
        <input type="date" id="actual_fix_date" />

        <label>実修理担当者（必須）</label>
        <select id="actual_fix_staff"></select>

        <label>実修理内容（必須）</label>
        <textarea id="actual_fix_content" rows="4"></textarea>
      </div>

      <!-- 修理結果 -->
      <div>
        <div class="section-title">■ 修理結果（入力）</div>

        <label>修理結果（必須）</label>
        <textarea id="fix_result" rows="4"></textarea>
      </div>

      <!-- 添付ファイル -->
      <div>
        <div class="section-title">■ 添付ファイル（必須推奨）</div>

        <input type="file" id="fix_files" multiple />
        <div style="font-size: 13px; margin-top: 5px">
          ※ 画像 → サムネイル表示 ※ PDF / Excel / Word / ZIP → アイコン＋リンク
        </div>
      </div>

      <!-- 承認 -->
      <div>
        <div class="section-title">■ 実行後承認（承認②）</div>

        <label>承認ステータス</label>
        <select id="approval_status">
          <option value="pending">pending</option>
          <option value="approved">approved</option>
          <option value="rejected">rejected</option>
        </select>

        <label>承認者</label>
        <select id="approver"></select>

        <label>承認日（approved の場合のみ）</label>
        <input type="date" id="approval_date" />

        <label>却下理由（rejected の場合のみ）</label>
        <textarea id="reject_reason" rows="3"></textarea>
      </div>

      <!-- 保存 -->
      <div style="margin-top: 30px">
        <button class="btn" id="saveBtn">保存</button>
      </div>
    </div>

    <script>
      /* ダミー：スタッフ一覧 */
      const staffList = [
        { id: 1, name: "山田" },
        { id: 2, name: "佐藤" },
        { id: 3, name: "鈴木" },
      ];

      window.onload = function () {
        loadStaff("actual_fix_staff");
        loadStaff("approver");
      };

      function loadStaff(selectId) {
        const sel = document.getElementById(selectId);
        staffList.forEach((s) => {
          sel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
      }

      document.getElementById("saveBtn").onclick = function () {
        alert("保存しました。");
      };
    </script>
  </body>
</html>
