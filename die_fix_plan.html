<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Fix Plan</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      /* 多言語ボタン */
      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      /* コンテナ */
      .container {
        max-width: 1100px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* タイトル */
      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      /* ボタン */
      .btn {
        padding: 8px 16px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn:hover {
        background: #005fa3;
      }

      .btn-secondary {
        background: #2b6ca3;
      }

      /* カード */
      .card {
        padding: 16px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fafafa;
      }

      .row {
        margin-bottom: 10px;
        display: flex;
      }
      .row label {
        width: 150px;
        font-weight: bold;
      }

      .file-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .file-item {
        width: 120px;
        text-align: center;
      }
      .thumb {
        width: 120px;
        height: 90px;
        object-fit: cover;
        border: 1px solid #ccc;
      }

      .button-area {
        text-align: right;
        margin-top: 20px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
      }

      /* サムネイル */
      .thumb {
        width: 120px;
        height: auto;
        margin: 5px;
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #ccc;
      }

      /* モーダル背景 */
      .img-modal {
        display: none;
        position: fixed;
        z-index: 9999;
        padding-top: 60px;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.8);
      }

      /* モーダル画像 */
      .modal-content {
        margin: auto;
        display: block;
        max-width: 90%;
        max-height: 80%;
        border-radius: 6px;
      }

      /* 閉じるボタン */
      .close-btn {
        position: absolute;
        top: 20px;
        right: 35px;
        color: #fff;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <!-- 多言語ボタン -->
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <!-- 戻るボタン -->
      <div style="text-align: right; margin-bottom: 10px">
        <button class="btn btn-secondary" onclick="history.back()">
          ← 戻る
        </button>
      </div>

      <!-- タイトル -->
      <h1 id="pageTitle">🛠 修理計画（Fix Plan）</h1>

      <!-- 承認モード専用ボタン -->
      <div
        id="approvalButtons"
        style="text-align: right; margin-bottom: 10px; display: none"
      >
        <button class="btn btn-success" id="approveBtn" data-key="btn_approve">承認</button>
        <button class="btn btn-danger"  id="rejectBtn"  data-key="btn_reject">却下</button>
      </div>

      <!-- ============================= -->
      <!-- 診断情報（読み取り専用） -->
      <!-- ============================= -->
      <div class="card">
        <h2 data-key="sec_diag">■ 診断情報（読み取り専用）</h2>

        <div class="row">
          <label data-key="lbl_die_number">型番：</label><span id="fp_die_number"></span>
        </div>
        <div class="row">
          <label data-key="lbl_press_date">押出日：</label><span id="fp_press_date"></span>
        </div>
        <div class="row">
          <label data-key="lbl_diag_date">診断日：</label><span id="diag_date"></span>
        </div>
        <div class="row">
          <label data-key="lbl_diag_staff">診断者：</label><span id="diag_staff"></span>
        </div>
        <div class="row">
          <label data-key="lbl_dim">寸法判定：</label><span id="dim_judge"></span>
        </div>
        <div class="row">
          <label data-key="lbl_shape">形状判定：</label><span id="shape_judge"></span>
        </div>
        <div class="row">
          <label data-key="lbl_overall">総合判定：</label><span id="overall_judge"></span>
        </div>
        <div class="row">
          <label data-key="lbl_ng_action">NG 対応：</label><span id="ng_action"></span>
        </div>
        <div class="row">
          <label data-key="lbl_condition">条件変更：</label><span id="condition_change"></span>
        </div>
        <div class="row">
          <label data-key="lbl_need_fix">修理要否：</label><span id="need_fix"></span>
        </div>

        <h3 data-key="sec_diag_files">■ 診断時の添付ファイル</h3>
        <div id="diag_files" class="file-list"></div>
      </div>

      <!-- ============================= -->
      <!-- 修理計画（入力） -->
      <!-- ============================= -->
      <div class="card">
        <h2 id="secPlanTitle" data-key="sec_plan">■ 修理計画（入力）</h2>

        <div class="row">
          <label data-key="lbl_plan_fix_date">修理予定日：</label>
          <input type="date" id="plan_fix_date" required />
        </div>

        <div class="row">
          <label data-key="lbl_completion_date">修理完了予定日：</label>
          <input type="date" id="plan_completion_date" />
        </div>

        <div class="row">
          <label data-key="lbl_staff">修理担当者：</label>
          <select id="plan_fix_staff_id"></select>
        </div>

        <div class="row">
          <label data-key="lbl_content">修理予定内容：</label>
          <textarea id="plan_fix_content" required></textarea>
        </div>

        <h3 data-key="sec_attach">■ 添付ファイル（任意）</h3>
        <div id="plan_file_preview" class="file-list"></div>
        <input type="file" id="plan_files" multiple />
        <div id="plan_file_new_preview" class="file-list" style="margin-top:8px;"></div>

        <div class="button-area">
          <button class="btn" id="submitBtn" data-key="btn_submit">申請する</button>
        </div>
      </div>
    </div>
    <!-- ============================= -->
    <!-- 画像モーダル -->
    <!-- ============================= -->
    <div id="imgModal" class="img-modal" onclick="closeModal()">
      <span class="close-btn">&times;</span>
      <img id="modalImg" class="modal-content" />
    </div>
    <!-- ============================= -->
    <!-- 却下モーダル -->
    <!-- ============================= -->
    <div id="rejectModal" class="img-modal" style="display: none">
      <div
        style="
          background: white;
          padding: 20px;
          width: 300px;
          margin: 100px auto;
          border-radius: 8px;
        "
      >
        <h3 data-key="lbl_reject_reason">却下理由</h3>
        <textarea
          id="reject_reason"
          style="width: 100%; height: 80px"
        ></textarea>
        <div style="text-align: right; margin-top: 10px">
          <button class="btn btn-secondary" onclick="closeRejectModal()" data-key="btn_cancel">
            キャンセル
          </button>
          <button class="btn btn-danger" onclick="submitReject()" data-key="btn_do_reject">
            却下する
          </button>
        </div>
      </div>
    </div>

    <script>
      /* ------------------------------ */
      /* 多言語辞書                      */
      /* ------------------------------ */
      const dict = {
        ja: {
          page_title:       "🛠 修理計画（Fix Plan）",
          page_title_appr:  "🛠 修理計画（承認モード）",
          sec_diag:         "■ 診断情報（読み取り専用）",
          lbl_die_number:   "型番：",
          lbl_press_date:   "押出日：",
          lbl_diag_date:    "診断日：",
          lbl_diag_staff:   "診断者：",
          lbl_dim:          "寸法判定：",
          lbl_shape:        "形状判定：",
          lbl_overall:      "総合判定：",
          lbl_ng_action:    "NG 対応：",
          lbl_condition:    "条件変更：",
          lbl_need_fix:     "修理要否：",
          sec_diag_files:   "■ 診断時の添付ファイル",
          sec_plan:         "■ 修理計画（入力）",
          lbl_plan_fix_date:"修理予定日：",
          lbl_completion_date:"修理完了予定日：",
          lbl_staff:        "修理担当者：",
          lbl_content:      "修理予定内容：",
          sec_attach:       "■ 添付ファイル（任意）",
          btn_submit:       "申請する",
          btn_approve:      "承認",
          btn_reject:       "却下",
          btn_cancel:       "キャンセル",
          btn_do_reject:    "却下する",
          lbl_reject_reason:"却下理由",
          need_fix_yes:     "必要",
          need_fix_no:      "不要",
          msg_submitted:    "修理計画を申請しました。",
          msg_approved:     "修理計画を承認しました。",
          msg_rejected:     "修理計画を却下しました。",
          msg_no_plan:      "修理計画が読み込まれていません。",
          msg_need_reason:  "却下理由を入力してください。",
          btn_back:         "← 戻る",
        },
        vi: {
          page_title:       "🛠 Kế hoạch sửa chữa",
          page_title_appr:  "🛠 Kế hoạch sửa chữa（Chế độ duyệt）",
          sec_diag:         "■ Thông tin chẩn đoán（Chỉ đọc）",
          lbl_die_number:   "Số khuôn：",
          lbl_press_date:   "Ngày ép：",
          lbl_diag_date:    "Ngày chẩn đoán：",
          lbl_diag_staff:   "Người chẩn đoán：",
          lbl_dim:          "Đánh giá kích thước：",
          lbl_shape:        "Đánh giá hình dạng：",
          lbl_overall:      "Đánh giá tổng hợp：",
          lbl_ng_action:    "Xử lý NG：",
          lbl_condition:    "Thay đổi điều kiện：",
          lbl_need_fix:     "Cần sửa chữa：",
          sec_diag_files:   "■ File đính kèm chẩn đoán",
          sec_plan:         "■ Kế hoạch sửa chữa（Nhập liệu）",
          lbl_plan_fix_date:"Ngày dự kiến sửa：",
          lbl_completion_date:"Ngày dự kiến hoàn thành：",
          lbl_staff:        "Người phụ trách：",
          lbl_content:      "Nội dung sửa chữa dự kiến：",
          sec_attach:       "■ File đính kèm（Tùy chọn）",
          btn_submit:       "Gửi yêu cầu",
          btn_approve:      "Duyệt",
          btn_reject:       "Từ chối",
          btn_cancel:       "Hủy",
          btn_do_reject:    "Xác nhận từ chối",
          lbl_reject_reason:"Lý do từ chối",
          need_fix_yes:     "Cần",
          need_fix_no:      "Không cần",
          msg_submitted:    "Đã gửi kế hoạch sửa chữa.",
          msg_approved:     "Đã duyệt kế hoạch sửa chữa.",
          msg_rejected:     "Đã từ chối kế hoạch sửa chữa.",
          msg_no_plan:      "Chưa tải được kế hoạch sửa chữa.",
          msg_need_reason:  "Vui lòng nhập lý do từ chối.",
          btn_back:         "← Quay lại",
        },
      };

      let currentLang = localStorage.getItem("lang") || "ja";

      function setLang(lang) {
        currentLang = lang;
        localStorage.setItem("lang", lang);
        applyLang();
      }

      function applyLang() {
        const d = dict[currentLang] || dict.ja;

        // data-key 要素を一括更新
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.dataset.key;
          if (d[key]) el.textContent = d[key];
        });

        // タイトル（承認モードかどうかで分岐）
        const isApproval = mode === "approval";
        document.getElementById("pageTitle").textContent =
          isApproval ? d.page_title_appr : d.page_title;

        // 戻るボタン
        const backBtn = document.querySelector(".btn.btn-secondary[onclick='history.back()']");
        if (backBtn) backBtn.textContent = d.btn_back;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const press_id = urlParams.get("press_id");
      const mode = urlParams.get("mode"); // ★ 承認モード判定
      let diagnosis_id = null;
      let fix_id = null;

      // 新規選択ファイル（修理計画）の一時保持用
      let selectedPlanFiles = [];

      window.onload = function () {
        applyLang();
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById("plan_fix_date").value = today;
        loadDiagnosis();
        loadStaffList();
      };

      /* ------------------------------
     日付フォーマット（YYYY-MM-DD）
  ------------------------------ */
      function formatDateForInput(dt) {
        if (!dt) return "";
        return dt.split(" ")[0]; // "2026-05-14 00:00:00" → "2026-05-14"
      }

      /* ------------------------------
     診断情報の読み込み
  ------------------------------ */
      function loadDiagnosis() {
        fetch(
          `./php/die_progress_php/get_diagnosis_data.php?press_id=${press_id}`,
        )
          .then((res) => res.json())
          .then((data) => {
            const diag = data.diagnosis;
            const diag_files = data.diagnosis_files;

            diagnosis_id = diag ? diag.id : null;

            document.getElementById("fp_die_number").textContent =
              data.press?.die_number || "";
            document.getElementById("fp_press_date").textContent =
              (data.press?.press_date_at || "").slice(0, 10);

            document.getElementById("diag_date").textContent =
              diag?.diagnosis_date || "";
            document.getElementById("diag_staff").textContent =
              diag?.staff_name || "";
            document.getElementById("dim_judge").textContent =
              diag?.dimension_judgement || "";
            document.getElementById("shape_judge").textContent =
              diag?.shape_judgement || "";
            document.getElementById("overall_judge").textContent =
              diag?.overall_judgement || "";
            document.getElementById("ng_action").textContent =
              diag?.ng_action || "";
            document.getElementById("condition_change").textContent =
              diag?.condition_change || "なし";
            document.getElementById("need_fix").textContent =
              diag?.ng_action == 2 || diag?.ng_action == 3 ? "必要" : "不要";

            renderDiagFiles(diag_files);

            // 診断IDが確定したら修理計画を読み込む
            loadFixPlan();
          });
      }

      /* ------------------------------
        診断ファイル表示
      ------------------------------ */
      function renderDiagFiles(files) {
        const area = document.getElementById("diag_files");
        area.innerHTML = "";

        if (!diagnosis_id) return;

        files.forEach((f) => {
          const div = document.createElement("div");
          div.classList.add("file-item");

          // ★ file_path は "diagnosis/13/xxx.jpg" なので、そのまま使う
          const base = `../uploads/${f.file_path}`;

          if (f.file_type.startsWith("image/")) {
            div.innerHTML = `
        <img 
          src="${base}" 
          class="thumb" 
          onclick="openModal('${base}')"
        >
      `;
          } else {
            div.innerHTML = `
        <a href="${base}" target="_blank">${f.file_path}</a>
      `;
          }

          area.appendChild(div);
        });
      }

      /* ------------------------------
     スタッフ一覧
  ------------------------------ */
      function loadStaffList() {
        fetch("./php/die_progress_php/get_staff_list.php?roles=die_setup,admin,null")
          .then((res) => res.json())
          .then((list) => {
            const sel = document.getElementById("plan_fix_staff_id");
            list.forEach((s) => {
              const opt = document.createElement("option");
              opt.value = s.id;
              opt.textContent = s.staff_name;
              sel.appendChild(opt);
            });
          });
      }

      /* ------------------------------
     修理計画の読み込み
  ------------------------------ */
      function loadFixPlan() {
        if (!diagnosis_id) return;

        fetch(
          `./php/die_progress_php/get_fix_plan.php?press_id=${press_id}`,
        )
          .then((res) => res.json())
          .then((data) => {
            if (!data) return;

            fix_id = data.id;

            // ★ 修理予定日を date input 用に整形
            document.getElementById("plan_fix_date").value = formatDateForInput(
              data.plan_fix_date,
            );

            document.getElementById("plan_completion_date").value = formatDateForInput(
              data.plan_completion_date,
            );

            document.getElementById("plan_fix_staff_id").value =
              data.plan_fix_staff_id || "";

            document.getElementById("plan_fix_content").value =
              data.plan_fix_content || "";

            renderPlanFiles(data.files);

            // ★ 承認モードなら読み取り専用にする
            if (mode === "approval") {
              setApprovalMode();
            }
          });
      }

      /* ------------------------------
          修理計画ファイル表示（保存済み）
        ------------------------------ */
      function renderPlanFiles(files) {
        const area = document.getElementById("plan_file_preview");
        area.innerHTML = "";

        // ★ files が undefined/null/空配列なら何も表示しない
        if (!files || !Array.isArray(files) || files.length === 0) {
          return;
        }

        files.forEach((f) => {
          const div = document.createElement("div");
          div.classList.add("file-item");

          // ★ file_path は "fix/14/xxx.jpg" のように既にパスが入っている前提
          const base = `../uploads/${f.file_path}`;

          if (f.file_type.startsWith("image/")) {
            div.innerHTML = `
        <img 
          src="${base}" 
          class="thumb" 
          onclick="openModal('${base}')"
        >
      `;
          } else {
            div.innerHTML = `
        <a href="${base}" target="_blank">${f.file_path}</a>
      `;
          }

          area.appendChild(div);
        });
      }

      /* ------------------------------
          修理計画ファイル（選択時プレビュー＋削除）
        ------------------------------ */
      document
        .getElementById("plan_files")
        .addEventListener("change", function () {
          selectedPlanFiles = Array.from(this.files);
          renderSelectedPlanFiles();
        });

      function renderSelectedPlanFiles() {
        const area = document.getElementById("plan_file_new_preview");
        area.innerHTML = "";

        selectedPlanFiles.forEach((file, index) => {
          const div = document.createElement("div");
          div.classList.add("file-item");
          div.style.position = "relative";

          // 削除ボタン
          const delBtn = document.createElement("div");
          delBtn.textContent = "×";
          delBtn.style.position = "absolute";
          delBtn.style.top = "0px";
          delBtn.style.right = "5px";
          delBtn.style.color = "white";
          delBtn.style.background = "rgba(0,0,0,0.6)";
          delBtn.style.padding = "2px 6px";
          delBtn.style.cursor = "pointer";
          delBtn.style.borderRadius = "50%";
          delBtn.style.fontWeight = "bold";
          delBtn.onclick = () => {
            selectedPlanFiles.splice(index, 1);
            renderSelectedPlanFiles();
          };

          if (file.type.startsWith("image/")) {
            const reader = new FileReader();
            reader.onload = function (e) {
              div.innerHTML = `<img src="${e.target.result}" class="thumb" onclick="openModal('${e.target.result}')">`;
              div.appendChild(delBtn);
            };
            reader.readAsDataURL(file);
          } else {
            div.innerHTML = `<span>${file.name}</span>`;
            div.appendChild(delBtn);
          }

          area.appendChild(div);
        });
      }

      /* ------------------------------
     修理計画の申請（保存）
  ------------------------------ */
      document
        .getElementById("submitBtn")
        .addEventListener("click", function () {
          const formData = new FormData();
          formData.append("diagnosis_id", diagnosis_id);
          formData.append(
            "plan_fix_date",
            document.getElementById("plan_fix_date").value,
          );
          formData.append(
            "plan_completion_date",
            document.getElementById("plan_completion_date").value,
          );
          formData.append(
            "plan_fix_staff_id",
            document.getElementById("plan_fix_staff_id").value,
          );
          formData.append(
            "plan_fix_content",
            document.getElementById("plan_fix_content").value,
          );

          if (fix_id) formData.append("fix_id", fix_id);

          // 削除後の選択ファイルだけ送信
          selectedPlanFiles.forEach((file) => {
            formData.append("plan_files[]", file);
          });

          fetch("./php/die_progress_php/save_fix_plan.php", {
            method: "POST",
            body: formData,
          })
            .then((res) => res.json())
            .then((data) => {
              alert(dict[currentLang].msg_submitted);
              location.href = "die_progress_list.html";
            });
        });

      /* ------------------------------
     承認モード設定
  ------------------------------ */
      function setApprovalMode() {
        // タイトル変更
        document.getElementById("pageTitle").textContent = dict[currentLang].page_title_appr;

        // 入力不可にする
        document.getElementById("plan_fix_date").disabled = true;
        document.getElementById("plan_completion_date").disabled = true;
        document.getElementById("plan_fix_staff_id").disabled = true;
        document.getElementById("plan_fix_content").readOnly = true;

        // ファイル選択を非表示
        document.getElementById("plan_files").style.display = "none";

        // 申請ボタンを非表示
        document.getElementById("submitBtn").style.display = "none";

        // ★ 承認ボタンを表示
        document.getElementById("approvalButtons").style.display = "block";
      }

      /* ------------------------------
     モーダル表示
  ------------------------------ */
      function openModal(src) {
        document.getElementById("modalImg").src = src;
        document.getElementById("imgModal").style.display = "block";
      }

      function closeModal() {
        document.getElementById("imgModal").style.display = "none";
      }

      /* ------------------------------
        // 承認処理
      ------------------------------ */
      document
        .getElementById("approveBtn")
        .addEventListener("click", function () {
          if (!fix_id) return alert(dict[currentLang].msg_no_plan);

          fetch("./php/die_progress_php/approve_fix_plan.php", {
            method: "POST",
            body: new URLSearchParams({
              fix_id: fix_id,
              action: "approve",
            }),
          })
            .then((res) => res.json())
            .then((data) => {
              alert(dict[currentLang].msg_approved);
              location.href = "die_progress_list.html";
            });
        });

      /* ------------------------------
        却下ボタンの動作
      ------------------------------ */

      document
        .getElementById("rejectBtn")
        .addEventListener("click", function () {
          document.getElementById("rejectModal").style.display = "block";
        });

      function closeRejectModal() {
        document.getElementById("rejectModal").style.display = "none";
      }

      function submitReject() {
        const reason = document.getElementById("reject_reason").value.trim();
        if (!reason) return alert(dict[currentLang].msg_need_reason);

        fetch("./php/die_progress_php/approve_fix_plan.php", {
          method: "POST",
          body: new URLSearchParams({
            fix_id: fix_id,
            action: "reject",
            reason: reason,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            alert(dict[currentLang].msg_rejected);
            location.href = "die_progress_list.html";
          });
      }
    </script>
  </body>
</html>
