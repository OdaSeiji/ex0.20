<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Inspection</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      .section-title {
        font-size: 18px;
        margin-top: 25px;
        margin-bottom: 10px;
        border-bottom: 2px solid #0078d4;
        padding-bottom: 5px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 15px;
      }

      table td {
        padding: 10px;
        vertical-align: top;
      }

      table td:first-child {
        width: 240px;
        font-weight: bold;
        background: #f0f6ff;
      }

      input[type="text"],
      input[type="date"],
      select,
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }

      textarea {
        height: 100px;
        resize: vertical;
      }

      .radio-group {
        display: flex;
        gap: 20px;
        padding-top: 8px;
      }

      .buttons {
        margin-top: 25px;
        display: flex;
        gap: 15px;
      }

      .btn {
        padding: 10px 20px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 14px;
      }

      .btn-save {
        background: #0078d4;
        color: #fff;
      }
      .btn-clear {
        background: #ccc;
      }
      .btn-back {
        background: #666;
        color: #fff;
      }

      .btn-save:disabled {
        background: #9bbbd4;
        cursor: not-allowed;
      }

      .required {
        color: red;
        font-weight: bold;
        margin-left: 4px;
      }

      #preview_area img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <h1 data-key="title">🧾 Inspection（検査記録入力）</h1>

      <!-- 基本情報 -->
      <div class="section-title" data-key="section_basic">基本情報</div>
      <table>
        <!-- <tr>
          <td data-key="id_label">検査記録ID</td>
          <td><input type="text" value="Auto Numbering" disabled /></td>
        </tr>
        <tr>
          <td data-key="die_id_label">金型ID（die_id）</td>
          <td><input type="text" id="die_id" value="" disabled /></td>
        </tr> -->
        <tr>
          <td>
            <span data-key="press_id_label">押出記録ID（press_id）</span>
            <span class="required">*</span>
          </td>
          <td>
            <select id="press_id" onchange="validateForm()">
              <option value="" data-key="press_select">
                Select (last 7 days)
              </option>
            </select>
          </td>
        </tr>
      </table>

      <!-- 検査情報 -->
      <div class="section-title" data-key="section_inspection">検査情報</div>
      <table>
        <tr>
          <td>
            <span data-key="inspection_date_label">検査日</span>
            <span class="required">*</span>
          </td>
          <td>
            <input type="date" id="inspection_date" onchange="validateForm()" />
          </td>
        </tr>
        <tr>
          <td>
            <span data-key="inspected_by_label">検査担当者</span>
            <span class="required">*</span>
          </td>
          <td>
            <select id="inspected_by" onchange="validateForm()">
              <option value="" data-key="staff_select">Select</option>
            </select>
          </td>
        </tr>

        <!-- 検査結果（全体） -->
        <tr>
          <td>
            <span data-key="result_label">検査結果（全体）</span>
            <span class="required">*</span>
          </td>
          <td>
            <div class="radio-group">
              <label
                ><input
                  type="radio"
                  name="result"
                  value="OK"
                  onchange="validateForm()"
                />
                <span data-key="ok">OK</span></label
              >
              <label
                ><input
                  type="radio"
                  name="result"
                  value="NG"
                  onchange="validateForm()"
                />
                <span data-key="ng">NG</span></label
              >
            </div>
          </td>
        </tr>

        <!-- 寸法 -->
        <tr>
          <td>
            <span data-key="dimension_label">寸法</span>
            <span class="required">*</span>
          </td>
          <td>
            <div class="radio-group">
              <label
                ><input
                  type="radio"
                  name="dimension_result"
                  value="OK"
                  onchange="validateForm()"
                />
                <span data-key="ok">OK</span></label
              >
              <label
                ><input
                  type="radio"
                  name="dimension_result"
                  value="NG"
                  onchange="validateForm()"
                />
                <span data-key="ng">NG</span></label
              >
            </div>
          </td>
        </tr>

        <!-- 形状 -->
        <tr>
          <td>
            <span data-key="shape_label">形状</span>
            <span class="required">*</span>
          </td>
          <td>
            <div class="radio-group">
              <label
                ><input
                  type="radio"
                  name="shape_result"
                  value="OK"
                  onchange="validateForm()"
                />
                <span data-key="ok">OK</span></label
              >
              <label
                ><input
                  type="radio"
                  name="shape_result"
                  value="NG"
                  onchange="validateForm()"
                />
                <span data-key="ng">NG</span></label
              >
            </div>
          </td>
        </tr>

        <tr>
          <td data-key="comment_label">検査コメント</td>
          <td>
            <textarea
              id="inspection_comment"
              placeholder="Enter inspection details (size, appearance, temperature...)"
            ></textarea>
          </td>
        </tr>
      </table>

      <!-- 添付ファイル -->
      <div class="section-title" data-key="section_file">添付ファイル</div>
      <table>
        <tr>
          <td>
            <span data-key="file_label">添付ファイル</span>
            <span class="required">*</span>
          </td>
          <td>
            <input
              type="file"
              id="file"
              multiple
              onchange="
                previewFiles();
                validateForm();
              "
            />
            <div
              id="preview_area"
              style="
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin-top: 10px;
              "
            ></div>
          </td>
        </tr>
      </table>

      <!-- 必須注意文 -->
      <p
        id="required_note"
        style="color: red; font-weight: bold; margin-top: 20px"
        data-key="required_note"
      >
        * 印の項目は入力が必要です
      </p>

      <!-- 操作ボタン -->
      <div class="buttons">
        <button
          class="btn btn-save"
          id="saveBtn"
          onclick="saveData()"
          disabled
          data-key="btn_save"
        >
          保存
        </button>
        <button
          class="btn btn-clear"
          onclick="location.reload()"
          data-key="btn_clear"
        >
          クリア
        </button>
        <button
          class="btn btn-back"
          onclick="history.back()"
          data-key="btn_back"
        >
          一覧へ戻る
        </button>
      </div>
    </div>

    <!-- モーダル -->
    <div
      id="imgModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
        z-index: 9999;
      "
    >
      <div
        style="
          background: white;
          padding: 20px;
          border-radius: 6px;
          max-width: 90%;
          max-height: 90%;
          text-align: center;
        "
      >
        <img
          id="modalImg"
          src=""
          style="max-width: 100%; max-height: 70vh; border-radius: 4px"
        />
        <br /><br />
        <button
          id="deleteBtn"
          style="
            background: #d9534f;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            margin-right: 10px;
          "
        >
          削除
        </button>

        <button
          onclick="closeModal()"
          style="
            background: #2b6ca3;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
          "
        >
          閉じる
        </button>
      </div>
    </div>

    <script>
      /* 多言語辞書 */
      const dict = {
        ja: {
          title: "🧾 Inspection（検査記録入力）",
          section_basic: "基本情報",
          id_label: "検査記録ID",
          die_id_label: "金型ID（die_id）",
          press_id_label: "押出記録ID（press_id）",
          press_select: "選択してください（過去1週間）",

          section_inspection: "検査情報",
          inspection_date_label: "検査日",
          inspected_by_label: "検査担当者",
          staff_select: "選択してください",
          result_label: "検査結果（全体）",
          dimension_label: "寸法",
          shape_label: "形状",
          ok: "OK",
          ng: "NG",
          comment_label: "検査コメント",

          section_file: "添付ファイル",
          file_label: "添付ファイル",

          required_note: "* 印の項目は入力が必要です",

          btn_save: "保存",
          btn_clear: "クリア",
          btn_back: "一覧へ戻る",
        },

        vi: {
          title: "🧾 Kiểm tra (Nhập dữ liệu kiểm tra)",
          section_basic: "Thông tin cơ bản",
          id_label: "Mã kiểm tra",
          die_id_label: "Mã khuôn (die_id)",
          press_id_label: "Mã ép đùn (press_id)",
          press_select: "Vui lòng chọn (trong 1 tuần qua)",

          section_inspection: "Thông tin kiểm tra",
          inspection_date_label: "Ngày kiểm tra",
          inspected_by_label: "Người kiểm tra",
          staff_select: "Vui lòng chọn",
          result_label: "Kết quả kiểm tra (tổng thể)",
          dimension_label: "Kích thước",
          shape_label: "Hình dạng",
          ok: "OK",
          ng: "NG",
          comment_label: "Ghi chú kiểm tra",

          section_file: "Tệp đính kèm",
          file_label: "Tệp đính kèm",

          required_note: "Các mục có dấu * là bắt buộc",

          btn_save: "Lưu",
          btn_clear: "Xóa",
          btn_back: "Quay lại danh sách",
        },
      };

      /* 言語切り替え */
      function setLang(lang) {
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          el.textContent = dict[lang][key];
        });
        localStorage.setItem("lang", lang);
      }

      /* 初期処理 */
      window.onload = () => {
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);
        loadInitialData();
      };

      /* 初期データ読み込み */
      function loadInitialData() {
        fetch("./php/die_inspection_php/load_inspection_data.php")
          .then((res) => res.json())
          .then((data) => {
            const pressSelect = document.getElementById("press_id");
            data.press_list.forEach((p) => {
              const opt = document.createElement("option");
              opt.value = p.id;
              opt.textContent = `${p.id} / ${p.press_date_at} / ${p.die_number}`;
              pressSelect.appendChild(opt);
            });

            const staffSelect = document.getElementById("inspected_by");
            data.staff_list.forEach((s) => {
              const opt = document.createElement("option");
              opt.value = s.id;
              opt.textContent = s.staff_name;
              staffSelect.appendChild(opt);
            });
          });
      }

      /* サムネイル表示 */
      let currentFile = null;

      function previewFile() {
        const file = document.getElementById("file").files[0];
        const preview = document.getElementById("preview_area");
        preview.innerHTML = "";
        currentFile = null;

        if (!file) return;

        if (!file.type.startsWith("image/")) {
          const div = document.createElement("div");
          div.textContent = file.name;
          preview.appendChild(div);
          return;
        }

        currentFile = file;
        const reader = new FileReader();
        reader.onload = function (event) {
          const img = document.createElement("img");
          img.src = event.target.result;
          img.onclick = () => openModal(event.target.result);
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      }

      /* モーダル */
      function openModal(src) {
        document.getElementById("modalImg").src = src;
        document.getElementById("imgModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("imgModal").style.display = "none";
      }

      document.getElementById("deleteBtn").onclick = function () {
        document.getElementById("file").value = "";
        document.getElementById("preview_area").innerHTML = "";
        currentFile = null;
        closeModal();
        validateForm();
      };

      /* 必須項目チェック */
      function validateForm() {
        const press_id = document.getElementById("press_id").value;
        const inspection_date =
          document.getElementById("inspection_date").value;
        const inspected_by = document.getElementById("inspected_by").value;
        const file = document.getElementById("file").files.length;

        const result = document.querySelector("input[name='result']:checked");
        const dimension = document.querySelector(
          "input[name='dimension_result']:checked",
        );
        const shape = document.querySelector(
          "input[name='shape_result']:checked",
        );

        const saveBtn = document.getElementById("saveBtn");

        if (
          press_id &&
          inspection_date &&
          inspected_by &&
          file > 0 &&
          result &&
          dimension &&
          shape
        ) {
          saveBtn.disabled = false;
        } else {
          saveBtn.disabled = true;
        }
      }

      /* 保存処理 */
      /* 保存処理（複数ファイル対応） */
      function saveData() {
        const press_id = document.getElementById("press_id").value;
        const inspection_date =
          document.getElementById("inspection_date").value;
        const inspected_by = document.getElementById("inspected_by").value;
        const inspection_comment =
          document.getElementById("inspection_comment").value;

        const result = document.querySelector("input[name='result']:checked");
        const dimension = document.querySelector(
          "input[name='dimension_result']:checked",
        );
        const shape = document.querySelector(
          "input[name='shape_result']:checked",
        );

        const files = document.getElementById("file").files;

        const formData = new FormData();
        formData.append("press_id", press_id);
        formData.append("inspection_date", inspection_date);
        formData.append("inspected_by", inspected_by);
        formData.append("inspection_result", result.value);
        formData.append("dimension_result", dimension.value);
        formData.append("shape_result", shape.value);
        formData.append("inspection_comment", inspection_comment);

        // ★ 複数ファイルを送信
        for (let i = 0; i < files.length; i++) {
          formData.append("file[]", files[i]);
        }

        fetch("./php/die_inspection_php/save_inspection.php", {
          method: "POST",
          body: formData,
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "success") {
              alert("保存しました");
              location.reload();
            } else {
              alert("エラー: " + data.message);
            }
          })
          .catch((err) => {
            console.error(err);
            alert("通信エラーが発生しました");
          });
      }

      // 複数プレビュー対応
      function previewFiles() {
        const files = document.getElementById("file").files;
        const preview = document.getElementById("preview_area");
        preview.innerHTML = "";

        Array.from(files).forEach((file, index) => {
          const reader = new FileReader();
          reader.onload = function (e) {
            const box = document.createElement("div");
            box.style.position = "relative";

            const img = document.createElement("img");
            img.src = e.target.result;
            img.style.width = "120px";
            img.style.height = "120px";
            img.style.objectFit = "cover";
            img.style.border = "1px solid #ccc";
            img.style.borderRadius = "6px";
            img.style.cursor = "pointer";

            img.onclick = () => openPreviewModal(e.target.result);

            // 削除ボタン
            const del = document.createElement("button");
            del.textContent = "×";
            del.style.position = "absolute";
            del.style.top = "0";
            del.style.right = "0";
            del.style.background = "red";
            del.style.color = "white";
            del.style.border = "none";
            del.style.borderRadius = "50%";
            del.style.cursor = "pointer";

            del.onclick = () => removeFile(index);

            box.appendChild(img);
            box.appendChild(del);
            preview.appendChild(box);
          };
          reader.readAsDataURL(file);
        });
      }
      // 選択した画像を削除する
      function removeFile(index) {
        const input = document.getElementById("file");
        const dt = new DataTransfer();

        Array.from(input.files)
          .filter((_, i) => i !== index)
          .forEach((f) => dt.items.add(f));

        input.files = dt.files;

        previewFiles();
        validateForm();
      }
      // 既存モーダルを使用する
      function openPreviewModal(src) {
        document.getElementById("modalImg").src = src;
        document.getElementById("imgModal").style.display = "flex";
      }
    </script>
  </body>
</html>
