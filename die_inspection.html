<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>測定入力（Inspection）</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      label {
        font-weight: bold;
        margin-top: 15px;
        display: block;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
      }

      textarea {
        resize: vertical;
      }

      .btn {
        padding: 10px 18px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 20px;
        font-size: 15px;
      }

      .btn:hover {
        background: #005fa3;
      }

      .back-btn {
        background: #2b6ca3;
        margin-bottom: 15px;
      }

      .section-title {
        font-size: 18px;
        margin-top: 25px;
        border-left: 4px solid #0078d4;
        padding-left: 8px;
      }

      .info-box {
        background: #e8f1ff;
        padding: 10px;
        border-radius: 5px;
        margin-top: 10px;
        font-size: 14px;
      }

      .die-number-box {
        font-family: "Roboto Mono", monospace;
        width: 200px;
        margin: 6px 0 12px 0;
      }

      .die-card {
        background: #ffffff;
        border: 2px solid #1e88e5;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 20px;
        font-family: "Roboto Mono", monospace;
      }

      .die-row {
        margin-bottom: 6px;
      }

      .die-label {
        font-weight: bold;
        color: #0d47a1;
      }

      .die-value {
        color: #000;
      }

      .preview-area {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      .preview-item img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid #ccc;
        cursor: pointer;
      }

      .img-modal {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        max-width: 90vw;
        max-height: 90vh;
        border-radius: 6px;
        cursor: zoom-in;
        transition: max-width 0.2s ease, max-height 0.2s ease;
      }

      .modal-content.zoomed {
        max-width: none;
        max-height: none;
        width: 180vw;
        cursor: zoom-out;
      }

      .img-modal.zoomed {
        overflow: auto;
        align-items: flex-start;
        padding: 60px 20px 20px;
      }

      .modal-close {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 40px;
        color: white;
        cursor: pointer;
      }

      .preview-item {
        position: relative;
        display: inline-block;
      }

      .thumb-delete-btn {
        position: absolute;
        top: -6px;
        right: -6px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        font-size: 16px;
        line-height: 22px;
        text-align: center;
        cursor: pointer;
        z-index: 10;
      }

      .preview-item {
        width: 100px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <!-- 多言語ボタン -->
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <!-- メニューへ戻る -->
      <div style="text-align: right">
        <button
          class="btn back-btn"
          onclick="location.href = 'die_progress_list.html'"
        >
          ← メニューへ戻る
        </button>
      </div>

      <h1 data-key="title">📏 測定入力（Inspection）</h1>

      <!-- 金型情報カード -->
      <div class="die-card">
        <div class="die-row">
          <span class="die-label">金型番号：</span>
          <span id="die_number_display" class="die-value"></span>
        </div>

        <div class="die-row">
          <span class="die-label">押出日：</span>
          <span id="press_date_display" class="die-value"></span>
        </div>

        <div class="die-row">
          <span class="die-label">押出種類：</span>
          <span id="pressing_type_display" class="die-value"></span>
        </div>

        <div class="die-row">
          <span class="die-label">押し出し本数：</span>
          <span id="billet_qty_display" class="die-value"></span>
        </div>

        <div class="die-row">
          <span class="die-label">押出時間：</span>
          <span id="press_hours_display" class="die-value"></span>
        </div>

        <input type="hidden" id="press_id" />
        <input type="hidden" id="dies_id" />
      </div>

      <!-- 測定情報 -->
      <div>
        <div class="section-title" data-key="sec_inspection">■ 測定情報</div>

        <label data-key="lbl_date">測定日</label>
        <input type="date" id="inspection_date" />

        <label data-key="lbl_staff">測定者</label>
        <select id="inspection_staff_id"></select>

        <label data-key="lbl_dim">寸法判定</label>
        <select id="dimension_result">
          <option value="OK">OK</option>
          <option value="NG">NG</option>
        </select>

        <label data-key="lbl_shape">形状判定</label>
        <select id="shape_result">
          <option value="OK">OK</option>
          <option value="NG">NG</option>
        </select>

        <label data-key="lbl_overall">総合判定</label>
        <select id="overall_result">
          <option value="OK">OK</option>
          <option value="NG">NG</option>
        </select>

        <label data-key="lbl_cmm">CMM</label>
        <textarea id="cmm" rows="2" maxlength="200"></textarea>

        <label data-key="lbl_lm_im">LM/IM</label>
        <textarea id="lm_im" rows="2" maxlength="200"></textarea>

        <label data-key="lbl_gage">Gage</label>
        <textarea id="gage" rows="2" maxlength="200"></textarea>

        <label data-key="lbl_surface_roughness">表面粗さ</label>
        <textarea id="surface_roughness" rows="2" maxlength="200"></textarea>

        <label data-key="lbl_diesmark">Diesmark</label>
        <textarea id="diesmark" rows="2" maxlength="200"></textarea>

        <label data-key="lbl_memo">メモ</label>
        <textarea id="memo" rows="4"></textarea>

        <label data-key="lbl_files">添付ファイル（必須）</label>
        <input type="file" id="inspection_files" multiple />

        <!-- ★ ここに追加：サムネイル表示エリア -->
        <div id="preview_area" class="preview-area"></div>
      </div>

      <button class="btn" id="saveBtn" data-key="btn_save" type="button">
        保存して一覧へ戻る
      </button>
      <!-- ★ 画像モーダル -->
      <div id="imgModal" class="img-modal">
        <span id="modalClose" class="modal-close">&times;</span>
        <img id="modalImg" class="modal-content" />
      </div>
      <!-- inspection_id -->
      <input type="hidden" id="inspection_id" name="inspection_id" />
    </div>

    <script>
      /* --------------------------------------------------
        初期ログ（デバッグ用）
      -------------------------------------------------- */
      // console.log(
      //   "inspection_files:",
      //   document.getElementById("inspection_files"),
      // );

      /* --------------------------------------------------
        添付ファイルの種類に応じたアイコン
      -------------------------------------------------- */
      function getFileIcon(fileName) {
        const name = fileName.toLowerCase();

        if (name.endsWith(".pdf")) return "📄";
        if (name.endsWith(".xls") || name.endsWith(".xlsx")) return "📊";
        if (name.endsWith(".doc") || name.endsWith(".docx")) return "📘";
        if (name.endsWith(".zip") || name.endsWith(".rar")) return "🗂️";

        return "📁"; // その他
      }

      /* --------------------------------------------------
        画像ファイル判定
      -------------------------------------------------- */
      function isImageFile(file) {
        const name = file.name.toLowerCase();
        return (
          name.endsWith(".jpg") ||
          name.endsWith(".jpeg") ||
          name.endsWith(".png") ||
          name.endsWith(".gif") ||
          name.endsWith(".bmp") ||
          name.endsWith(".webp") ||
          name.endsWith(".heic")
        );
      }

      /* --------------------------------------------------
        サムネイル描画（画像・非画像 / 削除ボタン付き）
      -------------------------------------------------- */
      function renderPreview(files) {
        console.log("renderPreview:", files);

        const preview = document.getElementById("preview_area");
        preview.innerHTML = "";

        files.forEach((file, index) => {
          const item = document.createElement("div");
          item.classList.add("preview-item");

          /* --- 削除ボタン --- */
          const delBtn = document.createElement("div");
          delBtn.classList.add("thumb-delete-btn");
          delBtn.textContent = "×";

          delBtn.onclick = () => {
            files.splice(index, 1);

            // FileList を再構築
            const dt = new DataTransfer();
            files.forEach((f) => dt.items.add(f));
            document.getElementById("inspection_files").files = dt.files;

            renderPreview(files);
          };

          item.appendChild(delBtn);

          /* --- 画像ファイル --- */
          if (isImageFile(file)) {
            const img = document.createElement("img");
            img.src = URL.createObjectURL(file);

            img.onclick = () => openModal(img.src);

            item.appendChild(img);
          } else {
            /* --- 非画像ファイル --- */
            console.log("非画像ファイル:", file.name);

            const icon = document.createElement("div");
            icon.style.fontSize = "40px";
            icon.style.textAlign = "center";
            icon.textContent = getFileIcon(file.name);

            const label = document.createElement("div");
            label.style.fontSize = "12px";
            label.style.marginTop = "4px";
            label.textContent = file.name;

            item.appendChild(icon);
            item.appendChild(label);

            // クリックでダウンロード
            item.onclick = () => {
              const url = URL.createObjectURL(file);
              const a = document.createElement("a");
              a.href = url;
              a.download = file.name;
              a.click();
            };
          }

          preview.appendChild(item);
        });
      }

      /* --------------------------------------------------
        ファイル選択時
      -------------------------------------------------- */
      document
        .getElementById("inspection_files")
        .addEventListener("change", function (e) {
          const files = Array.from(e.target.files);

          // ★ 5MB 制限
          const MAX_SIZE = 5 * 1024 * 1024;

          for (const file of files) {
            if (file.size > MAX_SIZE) {
              alert(`The file "${file.name}" exceeds the 5MB size limit.`);
              e.target.value = ""; // 選択解除
              return;
            }
          }

          renderPreview(files);
        });

      /* --------------------------------------------------
        モーダル表示
      -------------------------------------------------- */
      function openModal(src) {
        const modal = document.getElementById("imgModal");
        const modalImg = document.getElementById("modalImg");

        modalImg.src = src;
        modalImg.classList.remove("zoomed");
        modal.classList.remove("zoomed");
        modal.style.display = "flex";
      }

      // 画像クリック → ズームトグル
      document.getElementById("modalImg").onclick = function (e) {
        e.stopPropagation();
        this.classList.toggle("zoomed");
        document.getElementById("imgModal").classList.toggle("zoomed");
      };

      document.getElementById("modalClose").onclick = function () {
        const modal = document.getElementById("imgModal");
        modal.classList.remove("zoomed");
        modal.style.display = "none";
      };

      // 背景クリックで閉じる
      document.getElementById("imgModal").onclick = function (e) {
        if (e.target === this) {
          this.classList.remove("zoomed");
          document.getElementById("modalImg").classList.remove("zoomed");
          this.style.display = "none";
        }
      };

      // ESCキーで閉じる
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          const modal = document.getElementById("imgModal");
          if (modal.style.display === "flex") {
            modal.classList.remove("zoomed");
            document.getElementById("modalImg").classList.remove("zoomed");
            modal.style.display = "none";
          }
        }
      });

      /* --------------------------------------------------
        多言語辞書
      -------------------------------------------------- */
      const dict = {
        ja: {
          title: "📏 測定入力（Inspection）",
          sec_press: "■ 押出実績",
          sec_inspection: "■ 測定情報",
          lbl_press: "押出実績（t_press）",
          lbl_date: "測定日",
          lbl_staff: "測定者",
          lbl_dim: "寸法判定",
          lbl_shape: "形状判定",
          lbl_overall: "総合判定",
          lbl_memo: "メモ",
          lbl_cmm: "CMM",
          lbl_lm_im: "LM/IM",
          lbl_gage: "Gage",
          lbl_surface_roughness: "表面粗さ",
          lbl_diesmark: "Diesmark",
          lbl_files: "添付ファイル（必須）",
          btn_save: "保存して一覧へ戻る",
        },
        vi: {
          title: "📏 Nhập dữ liệu đo",
          sec_press: "■ Dữ liệu ép",
          sec_inspection: "■ Thông tin đo",
          lbl_press: "Dữ liệu ép (t_press)",
          lbl_date: "Ngày đo",
          lbl_staff: "Người đo",
          lbl_dim: "Kết quả kích thước",
          lbl_shape: "Kết quả hình dạng",
          lbl_overall: "Kết quả tổng hợp",
          lbl_memo: "Ghi chú",
          lbl_cmm: "CMM",
          lbl_lm_im: "LM/IM",
          lbl_gage: "Gage",
          lbl_surface_roughness: "Độ nhám bề mặt",
          lbl_diesmark: "Diesmark",
          lbl_files: "Tệp đính kèm (bắt buộc)",
          btn_save: "Lưu và quay lại danh sách",
        },
      };

      /* --------------------------------------------------
        言語切替
      -------------------------------------------------- */
      function setLang(lang) {
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          el.textContent = dict[lang][key];
        });
        localStorage.setItem("lang", lang);
      }

      /* --------------------------------------------------
        URL パラメータ取得
      -------------------------------------------------- */
      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      /* --------------------------------------------------
       初期ロード
      -------------------------------------------------- */
      window.onload = function () {
        // ▼ 言語設定
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);

        // ▼ スタッフ一覧
        loadStaffList();

        // ▼ URL パラメータ取得
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get("mode"); // null / edit
        const pressId = urlParams.get("press_id");

        // ▼ 押出情報カードは常に表示
        if (pressId) {
          loadPressInfo(pressId);
        }

        // ▼ 編集モード（プレビュー → 修正する）
        if (mode === "edit" && pressId) {
          loadInspectionData(pressId); // ★ 測定データをロード
          enableInputs(); // 入力欄を編集可能にする
        }

        // ▼ 新規モード（mode=null）
        if (!mode) {
          document.getElementById("inspection_date").value =
            new Date().toISOString().slice(0, 10);
        }
      };

      /* --------------------------------------------------
        押出情報の読み出し
      -------------------------------------------------- */
      function loadPressInfo(pressId) {
        fetch(`./php/die_progress_php/get_press_info.php?press_id=${pressId}`)
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("press_id").value = data.press_id;
            document.getElementById("dies_id").value = data.dies_id;

            document.getElementById("die_number_display").textContent =
              data.die_number;
            document.getElementById("press_date_display").textContent =
              data.press_date;

            document.getElementById("pressing_type_display").textContent =
              data.pressing_type;
            document.getElementById("billet_qty_display").textContent =
              data.actual_billet_quantity;

            const hours = calcPressHours(
              data.press_start_at,
              data.press_finish_at,
            );
            document.getElementById("press_hours_display").textContent =
              hours + " 時間";
          })
          .catch((err) => console.error("押出情報の取得に失敗:", err));
      }

      /* --------------------------------------------------
        スタッフ一覧
      -------------------------------------------------- */
      function loadStaffList() {
        fetch("./php/die_progress_php/get_staff_list.php?role=inspector")
          .then((res) => res.json())
          .then((staffList) => {
            const sel = document.getElementById("inspection_staff_id");
            sel.innerHTML = "";

            staffList.forEach((s) => {
              sel.innerHTML += `<option value="${s.id}">${s.staff_name}</option>`;
            });
          })
          .catch((err) => console.error("スタッフ一覧の取得に失敗:", err));
      }

      /* --------------------------------------------------
        保存処理
      -------------------------------------------------- */
      document.getElementById("saveBtn").onclick = function () {
        event.preventDefault(); // ← これで画面遷移を完全に止める

        const files = document.getElementById("inspection_files").files;
        const dateVal = document.getElementById("inspection_date").value;

        if (!dateVal) {
          alert("測定日を入力してください。");
          return;
        }

        const hasExistingFiles =
          document.querySelectorAll("#preview_area .preview-item").length > 0;

        if (files.length === 0 && !hasExistingFiles) {
          alert("Attachment is required.");
          return;
        }

        // ★ FormData 作成
        const fd = new FormData();

        // --- 基本情報 ---
        fd.append("press_id", document.getElementById("press_id").value);
        fd.append("dies_id", document.getElementById("dies_id").value);
        fd.append(
          "inspection_date",
          document.getElementById("inspection_date").value,
        );
        fd.append(
          "inspection_staff_id",
          document.getElementById("inspection_staff_id").value,
        );
        fd.append(
          "dimension_result",
          document.getElementById("dimension_result").value,
        );
        fd.append(
          "shape_result",
          document.getElementById("shape_result").value,
        );
        fd.append(
          "overall_result",
          document.getElementById("overall_result").value,
        );
        fd.append("memo",  document.getElementById("memo").value);
        fd.append("cmm",   document.getElementById("cmm").value);
        fd.append("lm_im", document.getElementById("lm_im").value);
        fd.append("gage",             document.getElementById("gage").value);
        fd.append("surface_roughness", document.getElementById("surface_roughness").value);
        fd.append("diesmark",          document.getElementById("diesmark").value);

        // --- 添付ファイル（複数） ---
        for (let i = 0; i < files.length; i++) {
          fd.append("files[]", files[i]);
        }

        // ★ デバッグ表示
        console.log("送信データ:", ...fd);

        // ★ PHP に送信
        fetch("./php/die_progress_php/save_inspection.php", {
          method: "POST",
          body: fd,
        })
          .then((res) => res.text())
          .then((text) => {
            console.log("サーバー応答:", text);

            alert("Saved. Returning to the progress list.");
            // デバッグ中は画面遷移しない
            location.href = "die_progress_list.html";
          })
          .catch((err) => {
            console.error("保存エラー:", err);
            alert("Failed to save.");
          });
      };

      /* --------------------------------------------------
        押出時間計算
      -------------------------------------------------- */
      function calcPressHours(start, finish) {
        const [sh, sm, ss] = start.split(":").map(Number);
        const [fh, fm, fs] = finish.split(":").map(Number);

        const startSec = sh * 3600 + sm * 60 + ss;
        const finishSec = fh * 3600 + fm * 60 + fs;

        const diffSec = finishSec - startSec;
        return (diffSec / 3600).toFixed(2);
      }

      /* --------------------------------------------------
        入力欄をすべて編集可にする
      -------------------------------------------------- */
      function enableInputs() {
        // 入力欄をすべて編集可能にする
        document.querySelectorAll("input, select, textarea").forEach((el) => {
          el.disabled = false;
        });

        // 保存ボタンを表示
        const saveBtn = document.getElementById("saveBtn");
        if (saveBtn) saveBtn.style.display = "inline-block";

        // 承認モード専用カードを非表示
        const approvalCard = document.getElementById("approvalCard");
        if (approvalCard) approvalCard.style.display = "none";
      }

      /* --------------------------------------------------
        データロード 編集時
      -------------------------------------------------- */
      function loadInspectionData(pressId) {
        fetch(
          `./php/die_progress_php/get_inspection_data.php?press_id=${pressId}`,
        )
          .then((res) => res.json())
          .then((data) => {
            console.log("loadInspectionData:", data);

            if (data.status !== "success") {
              alert("No inspection data found.");
              return;
            }

            const ins = data.inspection;

            // ▼ ★ 編集モード用：inspection_id を hidden にセット
            document.getElementById("inspection_id").value = ins.inspection_id;

            // ▼ 基本情報
            document.getElementById("inspection_date").value = (
              ins.inspection_date || ""
            ).split(" ")[0];

            // ▼ スタッフ名（inspection_staff は staff_name）
            setStaffByName(ins.inspection_staff);

            document.getElementById("dimension_result").value =
              ins.dimension_result || "";

            document.getElementById("shape_result").value =
              ins.shape_result || "";

            document.getElementById("overall_result").value =
              ins.overall_result || "";

            document.getElementById("memo").value  = ins.memo  || "";
            document.getElementById("cmm").value   = ins.cmm   || "";
            document.getElementById("lm_im").value = ins.lm_im || "";
            document.getElementById("gage").value             = ins.gage             || "";
            document.getElementById("surface_roughness").value = ins.surface_roughness || "";
            document.getElementById("diesmark").value          = ins.diesmark          || "";

            // ▼ 添付ファイルプレビュー
            if (data.inspection_files) {
              renderPreviewFiles(data.inspection_files);
            }
          })
          .catch((err) => {
            console.error("loadInspectionData error:", err);
          });
      }

      function setStaffByName(name) {
        const sel = document.getElementById("inspection_staff_id");
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].text === name) {
            sel.selectedIndex = i;
            return;
          }
        }
      }

      /* --------------------------------------------------
        ファイルプレビュー（編集モード用 / 画像はサムネイル、非画像はアイコンで表示）
      -------------------------------------------------- */
      function renderPreviewFiles(files) {
        const container = document.getElementById("preview_area");
        container.innerHTML = "";

        if (!files || files.length === 0) {
          container.innerHTML = "<p>No files.</p>";
          return;
        }

        files.forEach((f) => {
          // 外枠
          const div = document.createElement("div");
          div.className = "preview-item";

          // 削除ボタン（編集時も表示）
          const del = document.createElement("div");
          del.className = "thumb-delete-btn";
          del.textContent = "×";

          // 削除ボタン押下時の動作（必要なら後で調整）
          del.onclick = () => {
            div.remove();
            // ★ 必要なら削除リストに追加する処理を書く
          };

          // 画像
          const img = document.createElement("img");
          img.src = "../uploads/" + f.file_path; // ← DB のパス
          img.className = "preview-img";

          // DOM 組み立て
          div.appendChild(del);
          div.appendChild(img);
          container.appendChild(div);
        });
      }

      /* --------------------------------------------------
        エラー対策
      -------------------------------------------------- */
      function loadDiagnosisData() {
        console.log("loadDiagnosisData() is not used in inspection page.");
      }
    </script>
  </body>
</html>
