<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>測定一覧（Inspection List）</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      .btn {
        padding: 8px 16px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn:hover {
        background: #005fa3;
      }

      .btn-secondary {
        background: #2b6ca3;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      th {
        background: #e8f1ff;
        font-weight: bold;
      }

      tr:hover {
        background: #f0f8ff;
        cursor: pointer;
      }

      .badge {
        padding: 4px 10px;
        border-radius: 4px;
        color: white;
        font-size: 12px;
      }
      .ok {
        background: #5cb85c;
      }
      .ng {
        background: #d9534f;
      }

      .clip {
        font-size: 18px;
      }
    </style>
  </head>

  <body style="visibility:hidden">
    <script>
      (async () => {
        const r = await fetch("php/auth/check_session.php");
        const d = await r.json();
        if (!d.ok) { location.replace("login.html"); return; }
        document.body.style.visibility = "visible";
      })();
    </script>
    <!-- 多言語ボタン -->
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <!-- メニューへ戻る -->
      <div style="text-align: right; margin-bottom: 10px">
        <button
          class="btn btn-secondary"
          onclick="location.href = 'index.html'"
        >
          ← メニューへ戻る
        </button>
      </div>

      <h1 data-key="title">📋 測定一覧（Inspection List）</h1>

      <!-- 新規測定 -->
      <div style="text-align: right; margin-bottom: 15px">
        <button
          class="btn"
          onclick="location.href = 'die_inspection.html'"
          data-key="btn_new"
        >
          ＋ 新規測定を追加
        </button>
      </div>

      <!-- 一覧テーブル -->
      <table id="inspectionTable">
        <thead>
          <tr>
            <th data-key="col_date">測定日</th>
            <th data-key="col_die">金型番号</th>
            <th data-key="col_staff">測定者</th>
            <th data-key="col_dim">寸法</th>
            <th data-key="col_shape">形状</th>
            <th data-key="col_overall">総合</th>
            <th data-key="col_file">添付</th>
            <th data-key="col_action">診断へ</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      /* 多言語辞書 */
      const dict = {
        ja: {
          title: "📋 測定一覧（Inspection List）",
          btn_new: "＋ 新規測定を追加",
          col_date: "測定日",
          col_die: "金型番号",
          col_staff: "測定者",
          col_dim: "寸法",
          col_shape: "形状",
          col_overall: "総合",
          col_file: "添付",
          col_action: "診断へ",
        },
        vi: {
          title: "📋 Danh sách đo",
          btn_new: "＋ Thêm dữ liệu đo",
          col_date: "Ngày đo",
          col_die: "Mã khuôn",
          col_staff: "Người đo",
          col_dim: "Kích thước",
          col_shape: "Hình dạng",
          col_overall: "Tổng hợp",
          col_file: "Tệp",
          col_action: "Chẩn đoán",
        },
      };

      function setLang(lang) {
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          el.textContent = dict[lang][key];
        });
        localStorage.setItem("lang", lang);
      }

      window.onload = function () {
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);
        loadInspectionList();
      };

      /* 一覧データ */
      function loadInspectionList() {
        fetch("./php/die_progress_php/get_inspection_list.php")
          .then((res) => res.json())
          .then((data) => renderInspectionList(data));
      }

      function renderInspectionList(data) {
        const tbody = document.querySelector("#inspectionTable tbody");
        tbody.innerHTML = "";

        data.forEach((row) => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
      <td>${row.inspection_date}</td>
      <td>${row.die_number}</td>
      <td>${row.staff_name}</td>
      <td><span class="badge ${row.dimension === "OK" ? "ok" : "ng"}">${row.dimension}</span></td>
      <td><span class="badge ${row.shape === "OK" ? "ok" : "ng"}">${row.shape}</span></td>
      <td><span class="badge ${row.overall === "OK" ? "ok" : "ng"}">${row.overall}</span></td>
      <td>${row.has_file == 1 ? "📎" : "—"}</td>
      <td><button class="btn" onclick="goDiagnosis(${row.id})">診断</button></td>
    `;

          tbody.appendChild(tr);
        });
      }

      function goDiagnosis(id) {
        location.href = `die_diagnosis.html?inspection_id=${id}`;
      }
    </script>
  </body>
</html>
