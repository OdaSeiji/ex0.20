<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Maintenance Timeline</title>

    <style>
      body {
        background-color: #e8f0f8;
        font-family: sans-serif;
      }

      h2 {
        color: #2b6ca3;
        font-weight: bold;
      }

      .container {
        width: 95%;
        margin: 20px auto;
      }

      .btn-back {
        background-color: #6c8ebf;
        color: white;
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
      }

      .scroll-area {
        overflow-x: scroll;
        white-space: nowrap;
        border: 1px solid #c5d1dd;
        background: #ffffff;
        padding: 20px;
        border-radius: 6px;
        margin-top: 20px;
      }

      /* 月メモリ（左に金型名と同じ幅の空白を置く） */
      .month-scale {
        display: grid;
        grid-template-columns: 150px 1fr;
        margin-bottom: 20px;
      }

      .month-scale-inner {
        display: flex;
      }

      .month-label {
        width: 120px;
        text-align: center;
        color: #2b6ca3;
        font-weight: bold;
        border-right: 1px solid #c5d1dd;
      }

      /* タイムライン行 */
      .timeline-row {
        display: grid;
        grid-template-columns: 150px 1fr;
        align-items: center;
        margin-bottom: 25px;
      }

      .die-label {
        width: 150px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        font-weight: bold;
        color: #2b6ca3;
      }

      .timeline-bar {
        position: relative;
        height: 40px;
        width: 1440px; /* 12ヶ月 × 120px */
        background: #f5f9ff;
        border: 1px solid #c5d1dd;
        border-radius: 4px;
      }

      /* 修理マーク ● */
      .dot-repair {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        position: absolute;
        cursor: pointer;
      }

      .repair-green {
        background-color: #4a9b6a;
      }
      .repair-yellow {
        background-color: #d8b04c;
      }
      .repair-red {
        background-color: #b84a4a;
      }

      /* 生産マーク ▲ */
      .dot-press {
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-bottom: 14px solid #2b6ca3;
        position: absolute;
        cursor: pointer;
      }

      /* tooltip */
      .dot-repair:hover::after,
      .dot-press:hover::after {
        content: attr(data-date);
        position: absolute;
        top: -28px;
        left: -10px;
        background: #333;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Maintenance Timeline (1 Year)</h2>

      <button class="btn-back" onclick="location.href = 'die_issue_list.html'">
        ← Back to Issue List
      </button>

      <div class="scroll-area">
        <!-- 月メモリ（左に150pxの空白） -->
        <div class="month-scale">
          <div></div>
          <div class="month-scale-inner" id="monthScale"></div>
        </div>

        <!-- タイムライン本体 -->
        <div id="timelineArea"></div>
      </div>
    </div>

    <script>
      const today = new Date();
      const startDate = new Date();
      startDate.setFullYear(today.getFullYear() - 1); // 1年前

      /* 月メモリ生成（左が今月 → 過去へ） */
      const monthScale = document.getElementById("monthScale");
      monthScale.innerHTML = "";

      let current = new Date(today);

      for (let i = 0; i < 12; i++) {
        const div = document.createElement("div");
        div.className = "month-label";

        const monthName = current.toLocaleString("en-US", { month: "short" });
        div.innerText = monthName;

        monthScale.appendChild(div);

        current.setMonth(current.getMonth() - 1);
      }

      /* 日付 → left%（左＝最新・右＝過去） */
      function calcLeftPercent(dateStr) {
        const d = new Date(dateStr);

        if (d < startDate) d.setTime(startDate.getTime());
        if (d > today) d.setTime(today.getTime());

        const totalMs = today - startDate;
        const posMs = d - startDate;

        return 100 - (posMs / totalMs) * 100;
      }

      /* 修理色分け */
      function getRepairColor(dateStr) {
        const d = new Date(dateStr);
        const diff = (today - d) / (1000 * 60 * 60 * 24);

        if (diff <= 7) return "repair-green";
        if (diff <= 14) return "repair-yellow";
        return "repair-red";
      }

      /* 重なり解消（top のみ変更） */
      function adjustOverlap(events) {
        events.sort((a, b) => a.left - b.left);

        for (let i = 1; i < events.length; i++) {
          if (Math.abs(events[i].left - events[i - 1].left) < 2) {
            events[i].top = events[i - 1].top + 10;
          }
        }
      }

      /* データ取得 */
      fetch("./php/die_issue_php/get_maintenance_timeline.php")
        .then((res) => res.json())
        .then((data) => {
          const area = document.getElementById("timelineArea");

          data.forEach((row) => {
            const line = document.createElement("div");
            line.className = "timeline-row";

            const label = document.createElement("div");
            label.className = "die-label";
            label.innerText = row.die_number;

            const bar = document.createElement("div");
            bar.className = "timeline-bar";

            const events = [];

            /* 修理イベント */
            row.repairs.forEach((r) => {
              events.push({
                type: "repair",
                date: r.date,
                left: calcLeftPercent(r.date),
                top: 8,
              });
            });

            /* 生産イベント */
            row.press.forEach((p) => {
              events.push({
                type: "press",
                date: p.date,
                left: calcLeftPercent(p.date),
                top: 22,
              });
            });

            adjustOverlap(events);

            events.forEach((ev) => {
              let dot = document.createElement("div");

              if (ev.type === "repair") {
                dot.className = "dot-repair " + getRepairColor(ev.date);
              } else {
                dot.className = "dot-press";
              }

              dot.style.left = ev.left + "%";
              dot.style.top = ev.top + "px";
              dot.setAttribute(
                "data-date",
                ev.date + (ev.type === "repair" ? " (Repair)" : " (Press)"),
              );

              bar.appendChild(dot);
            });

            line.appendChild(label);
            line.appendChild(bar);
            area.appendChild(line);
          });
        });
    </script>
  </body>
</html>
