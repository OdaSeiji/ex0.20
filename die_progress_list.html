<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>金型進捗一覧（Progress List）</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .container {
        max-width: 1600px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      .btn {
        padding: 8px 16px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn:hover {
        background: #005fa3;
      }

      .btn-secondary {
        background: #2b6ca3;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      /* バッジ列の最小幅を確保 */
      #progressTable td:nth-child(4),
      #progressTable td:nth-child(5),
      #progressTable td:nth-child(6),
      #progressTable td:nth-child(7),
      #progressTable td:nth-child(8),
      #progressTable td:nth-child(9),
      #progressTable td:nth-child(10),
      #progressTable td:nth-child(11) {
        min-width: 70px; /* ← ここを調整すればバッジが潰れない */
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      th {
        background: #e8f1ff;
        font-weight: bold;
      }

      tr:hover {
        background: #f0f8ff;
      }
      /* 進捗表示のバッジの設定 */
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 48px; /* ★ 幅を広げる（未承認が入る） */
        height: 32px; /* 高さしっかり */
        padding: 0 10px;
        border-radius: 8px; /* ピル型 */
        font-size: 14px; /* ★ アイコン大きく */
        font-weight: bold;
        color: white;
        box-sizing: border-box;
      }

      /* ☑（OK） */
      .badge.ok {
        background-color: #4caf50;
      }

      /* ×（NG） */
      .badge.ng {
        background-color: #d9534f;
      }

      /* —（none） */
      .badge.none {
        background-color: #9e9e9e;
      }

      /* 診断承認（3 色） */
      .badge.reject {
        background-color: #d9534f;
      }

      .badge.pending {
        background-color: #f0ad4e;
      }

      /* ★ 押出種別の記号フォントを MS ゴシックに統一 */
      .pressing-type {
        font-family: "MS Gothic", "ＭＳ ゴシック", monospace;
        font-size: 20px;
        letter-spacing: 2px;
      }
      /* 型番表示部 */
      .die-number {
        font-family: "Roboto Mono", monospace;
        text-align: left;
        letter-spacing: 0.5px;
      }
      /* 型番検索用 */
      .die-search {
        width: 120px;
        font-family: "Roboto Mono", monospace;
        padding: 4px 6px;
        margin-left: 6px;
      }
      /* ★ テーブルヘッダー固定 */
      #progressTable thead th {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #e8f1ff; /* ← 既存のヘッダー色 */
      }
    </style>
  </head>

  <body>
    <!-- 多言語ボタン -->
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <!-- メニューへ戻る -->
      <div style="text-align: right; margin-bottom: 10px">
        <button
          class="btn btn-secondary"
          onclick="location.href = 'index.html'"
        >
          ← メニューへ戻る
        </button>
      </div>

      <h1 data-key="title">📊 金型進捗一覧（Progress List）</h1>

      <!-- 一覧テーブル -->
      <table id="progressTable">
        <thead>
          <tr>
            <th data-key="col_date">押出日</th>

            <th>
              金型番号
              <input
                type="text"
                id="searchDie"
                placeholder="検索…"
                class="die-search"
              />
            </th>

            <th data-key="col_type">
              押出種別
              <select
                id="filterPressingType"
                class="die-search"
                style="margin-left: 6px"
              >
                <option value="">すべて</option>
                <option value="◎">◎</option>
                <option value="〇">〇</option>
                <option value="●">●</option>
              </select>
            </th>

            <!-- ★ ここから 8 ステップ -->
            <th data-key="col_ins">測定</th>
            <th data-key="col_diag">診断</th>
            <th data-key="col_needfix">修理要否</th>
            <th data-key="col_diag_app">診断承認</th>
            <th data-key="col_fix_plan">修理計画</th>
            <th data-key="col_fix_plan_app">修理計画承認</th>
            <th data-key="col_fix_report">修理報告</th>
            <th data-key="col_fix_report_app">修理報告承認</th>

            <th data-key="col_action">操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      /* ============================================================
   多言語辞書（8ステップ対応）
============================================================ */
      const dict = {
        ja: {
          title: "📊 金型進捗一覧（Progress List）",
          col_date: "押出日",
          col_die: "金型番号",
          col_type: "押出種別",

          col_ins: "測定",
          col_diag: "診断",
          col_needfix: "修理要否",
          col_diag_app: "診断承認",
          col_fix_plan: "修理計画",
          col_fix_plan_app: "修理計画承認",
          col_fix_report: "修理報告",
          col_fix_report_app: "修理報告承認",

          col_action: "操作",
          col_action_ins: "測定",
          col_action_diag: "診断",
          col_action_diag_app: "診断承認",
          col_action_fix_plan: "修理計画",
          col_action_fix_plan_app: "計画承認",
          col_action_fix_report: "修理報告",
          col_action_fix_report_app: "報告承認",
          col_action_detail: "詳細",
        },

        vi: {
          title: "📊 Danh sách tiến độ",
          col_date: "Ngày ép",
          col_die: "Mã khuôn",
          col_type: "Loại ép",

          col_ins: "Đo",
          col_diag: "Chẩn đoán",
          col_needfix: "Cần sửa",
          col_diag_app: "Duyệt chẩn đoán",
          col_fix_plan: "Kế hoạch sửa",
          col_fix_plan_app: "Duyệt kế hoạch",
          col_fix_report: "Báo cáo sửa",
          col_fix_report_app: "Duyệt báo cáo",

          col_action: "Thao tác",
          col_action_ins: "Đo",
          col_action_diag: "Chẩn đoán",
          col_action_diag_app: "Duyệt chẩn đoán",
          col_action_fix_plan: "Kế hoạch sửa",
          col_action_fix_plan_app: "Duyệt kế hoạch",
          col_action_fix_report: "Báo cáo sửa",
          col_action_fix_report_app: "Duyệt báo cáo",
          col_action_detail: "Chi tiết",
        },
      };

      /* ============================================================
   初期ロード
============================================================ */
      window.onload = function () {
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);
        loadProgressList();

        const typeFilter = document.getElementById("filterPressingType");
        if (typeFilter) {
          typeFilter.addEventListener("change", () => {
            renderTable(applyFilters(window._progressData));
          });
        }
      };

      /* ============================================================
   多言語切替（TH の select を壊さない安全版）
============================================================ */
      function setLang(lang) {
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          const newText = dict[lang][key];

          if (el.tagName === "TH") {
            const children = Array.from(el.childNodes);
            const textNode = children.find(
              (n) => n.nodeType === Node.TEXT_NODE,
            );
            if (textNode) textNode.textContent = newText + " ";
          } else {
            el.textContent = newText;
          }
        });

        localStorage.setItem("lang", lang);

        if (window._progressData) {
          renderTable(applyFilters(window._progressData));
        }
      }

      /* ============================================================
   進捗リスト読み込み
============================================================ */
      function loadProgressList() {
        fetch("./php/die_progress_php/get_progress_list.php?ts=" + Date.now())
          .then((res) => res.json())
          .then((data) => {
            data.forEach((row) => {
              row.inspected =
                row.inspected === null ? null : Number(row.inspected);
              row.diagnosed =
                row.diagnosed === null ? null : Number(row.diagnosed);
              row.need_fix =
                row.need_fix === null ? null : Number(row.need_fix);
              row.approved =
                row.approved === null ? null : Number(row.approved);

              row.fix_plan =
                row.fix_plan === null ? null : Number(row.fix_plan);
              row.fix_plan_approval =
                row.fix_plan_approval === null
                  ? null
                  : Number(row.fix_plan_approval);

              row.fix_report =
                row.fix_report === null ? null : Number(row.fix_report);
              row.fix_report_approval =
                row.fix_report_approval === null
                  ? null
                  : Number(row.fix_report_approval);
            });

            window._progressData = data;
            renderTable(applyFilters(data));
          });
      }

      /* ============================================================
   押出種別フィルター
============================================================ */
      function applyFilters(data) {
        const select = document.getElementById("filterPressingType");
        if (!select) return data;

        const type = select.value;

        return data.filter((row) => {
          const matchType = type === "" || row.pressing_symbol === type;
          return matchType;
        });
      }

      /* ============================================================
        テーブル描画（8ステップ対応）
      ============================================================ */
      function renderTable(data) {
        const tbody = document.querySelector("#progressTable tbody");
        tbody.innerHTML = "";

        /* ------------------------------
          診断承認専用バッジ（3色）
          1 = 承認, -1 = 却下, 0 = 未承認, null = —
        ------------------------------ */
        const approvalBadge = (flag) =>
          flag === 1
            ? `<span class="badge ok">承認</span>`
            : flag === -1
              ? `<span class="badge reject">却下</span>`
              : flag === 0
                ? `<span class="badge pending">未承認</span>`
                : `<span class="badge none">—</span>`;

        /* ------------------------------
          その他ステップ用バッジ（☑ / × / —）
          1 = ☑, 0 = ×, null = —
        ------------------------------ */
        const stepBadge = (flag) =>
          flag === 1
            ? `<span class="badge ok">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M20 6L9 17L4 12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>`
            : flag === 0
              ? `<span class="badge ng">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                      <path d="M6 6L18 18M6 18L18 6" stroke="white" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                  </span>`
              : `<span class="badge none">—</span>`;

        data.forEach((row) => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>${row.press_date}</td>
            <td class="die-number">${row.die_number}</td>
            <td class="pressing-type">${row.pressing_symbol}</td>

            <!-- 測定・診断・修理要否 → ☑ / × / — -->
            <td>${stepBadge(row.inspected)}</td>
            <td>${stepBadge(row.diagnosed)}</td>
            <td>${stepBadge(row.need_fix)}</td>

            <!-- ★ 診断承認だけ 3 色バッジ -->
            <td>${approvalBadge(row.approved)}</td>

            <!-- 修理計画・承認・報告・承認 → ☑ / × / — -->
            <td>${stepBadge(row.fix_plan)}</td>
            <td>${stepBadge(row.fix_plan_approval)}</td>
            <td>${stepBadge(row.fix_report)}</td>
            <td>${stepBadge(row.fix_report_approval)}</td>

            <td>${renderActionButton(row)}</td>
          `;

          tbody.appendChild(tr);
        });
      }

      /* ============================================================
        操作ボタン（8ステップ対応）
      ============================================================ */
      function renderActionButton(row) {
        const lang = localStorage.getItem("lang") || "ja";

        // ① 測定前
        if (!row.inspected) {
          return `<button class="btn" onclick="goInspection(${row.press_id})">${dict[lang].col_action_ins}</button>`;
        }

        // ② 診断前
        if (!row.diagnosed) {
          return `<button class="btn" onclick="goDiagnosis(${row.press_id})">${dict[lang].col_action_diag}</button>`;
        }

        // ★★★ ③ 診断承認が「却下」された場合 → 再診断 ★★★
        if (row.approved === -1) {
          return `<button class="btn" onclick="goDiagnosis(${row.press_id})">再診断</button>`;
        }

        // ④ 診断済・未承認（approved = 0）→ 承認ボタン
        if (row.approved === 0) {
          return `<button class="btn btn-warning" onclick="approveDiagnosis(${row.press_id})">${dict[lang].col_action_diag_app}</button>`;
        }

        // ⑤ 修理計画
        if (!row.fix_plan) {
          return `<button class="btn" onclick="goFixPlan(${row.press_id})">${dict[lang].col_action_fix_plan}</button>`;
        }

        // ⑥ 修理計画承認
        if (!row.fix_plan_approval) {
          return `<button class="btn btn-warning" onclick="approveFixPlan(${row.press_id})">${dict[lang].col_action_fix_plan_app}</button>`;
        }

        // ⑦ 修理報告
        if (!row.fix_report) {
          return `<button class="btn" onclick="goFixReport(${row.press_id})">${dict[lang].col_action_fix_report}</button>`;
        }

        // ⑧ 修理報告承認
        if (!row.fix_report_approval) {
          return `<button class="btn btn-warning" onclick="approveFixReport(${row.press_id})">${dict[lang].col_action_fix_report_app}</button>`;
        }

        // ⑨ すべて完了 → 詳細
        return `<button class="btn" onclick="goDetail(${row.press_id})">${dict[lang].col_action_detail}</button>`;
      }

      /* ============================================================
        画面遷移
      ============================================================ */
      function goInspection(id) {
        location.href = `die_inspection.html?press_id=${id}`;
      }
      function goDiagnosis(id) {
        location.href = `die_diagnosis.html?press_id=${id}`;
      }
      function goFixPlan(id) {
        location.href = `die_fix_plan.html?press_id=${id}`;
      }
      function goFixReport(id) {
        location.href = `die_fix_report.html?press_id=${id}`;
      }
      function goDetail(id) {
        alert("詳細画面はまだ未実装です");
      }

      /* ============================================================
   承認（PIN）
============================================================ */
      function approveDiagnosis(id) {
        const pin = prompt("診断承認 PIN を入力してください");
        if (pin === "1031") {
          location.href = `die_diagnosis.html?press_id=${id}&mode=approval`;
        } else {
          alert("PINコードが違います");
        }
      }

      function approveFixPlan(id) {
        const pin = prompt("修理計画承認 PIN を入力してください");
        if (pin === "1031") {
          location.href = `die_fix_plan.html?press_id=${id}&mode=approval`;
        } else {
          alert("PINコードが違います");
        }
      }

      function approveFixReport(id) {
        const pin = prompt("修理報告承認 PIN を入力してください");
        if (pin === "1031") {
          location.href = `die_fix_report.html?press_id=${id}&mode=approval`;
        } else {
          alert("PINコードが違います");
        }
      }

      /* ============================================================
   型番検索
============================================================ */
      document
        .getElementById("searchDie")
        .addEventListener("input", function () {
          const keyword = this.value.trim().toUpperCase();
          const filtered = window._progressData.filter((row) =>
            row.die_number.toUpperCase().startsWith(keyword),
          );
          renderTable(applyFilters(filtered));
        });
    </script>
  </body>
</html>
