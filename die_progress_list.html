<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>金型進捗一覧（Progress List）</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      .btn {
        padding: 8px 16px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn:hover {
        background: #005fa3;
      }

      .btn-secondary {
        background: #2b6ca3;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      th {
        background: #e8f1ff;
        font-weight: bold;
      }

      tr:hover {
        background: #f0f8ff;
      }

      .badge {
        padding: 4px 10px;
        border-radius: 4px;
        color: white;
        font-size: 12px;
      }
      .ok {
        background: #5cb85c;
      }
      .ng {
        background: #d9534f;
      }
      .none {
        background: #999;
      }

      /* ★ 押出種別の記号フォントを MS ゴシックに統一 */
      .pressing-type {
        font-family: "MS Gothic", "ＭＳ ゴシック", monospace;
        font-size: 20px;
        letter-spacing: 2px;
      }
      /* 型番表示部 */
      .die-number {
        font-family: "Roboto Mono", monospace;
        text-align: left;
        letter-spacing: 0.5px;
      }
      /* 型番検索用 */
      .die-search {
        width: 120px;
        font-family: "Roboto Mono", monospace;
        padding: 4px 6px;
        margin-left: 6px;
      }
      /* ★ テーブルヘッダー固定 */
      #progressTable thead th {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #e8f1ff; /* ← 既存のヘッダー色 */
      }
    </style>
  </head>

  <body>
    <!-- 多言語ボタン -->
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <div class="container">
      <!-- メニューへ戻る -->
      <div style="text-align: right; margin-bottom: 10px">
        <button
          class="btn btn-secondary"
          onclick="location.href = 'index.html'"
        >
          ← メニューへ戻る
        </button>
      </div>

      <h1 data-key="title">📊 金型進捗一覧（Progress List）</h1>

      <!-- 一覧テーブル -->
      <table id="progressTable">
        <thead>
          <tr>
            <th data-key="col_date">押出日</th>
            <th>
              金型番号
              <input
                type="text"
                id="searchDie"
                placeholder="検索…"
                class="die-search"
              />
            </th>
            <!-- <th data-key="col_die">金型番号</th> -->
            <th data-key="col_type">
              押出種別
              <select
                id="filterPressingType"
                class="die-search"
                style="margin-left: 6px"
              >
                <option value="">すべて</option>
                <option value="◎">◎</option>
                <option value="〇">〇</option>
                <option value="●">●</option>
              </select>
            </th>
            <th data-key="col_ins">測定</th>
            <th data-key="col_diag">診断</th>
            <th data-key="col_needfix">修理要否</th>
            <th data-key="col_app">承認</th>
            <th data-key="col_fix">修理</th>
            <th data-key="col_action">操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      /* ============================================================
   多言語辞書
============================================================ */
      const dict = {
        ja: {
          title: "📊 金型進捗一覧（Progress List）",
          col_date: "押出日",
          col_die: "金型番号",
          col_type: "押出種別",
          col_ins: "測定",
          col_diag: "診断",
          col_app: "承認",
          col_needfix: "修理要否",
          col_fix: "修理",
          col_action: "操作",
          col_action_ins: "測定",
          col_action_diag: "診断",
          col_action_app: "承認",
          col_action_fix: "修理",
          col_action_detail: "詳細",
        },
        vi: {
          title: "📊 Danh sách tiến độ",
          col_date: "Ngày ép",
          col_die: "Mã khuôn",
          col_type: "Loại ép",
          col_ins: "Đo",
          col_diag: "Chẩn đoán",
          col_app: "Phê duyệt",
          col_needfix: "Cần sửa",
          col_fix: "Sửa chữa",
          col_action: "Thao tác",
          col_action_ins: "Đo",
          col_action_diag: "Chẩn đoán",
          col_action_app: "Phê duyệt",
          col_action_fix: "Sửa chữa",
          col_action_detail: "Chi tiết",
        },
      };

      /* ============================================================
   初期ロード
============================================================ */
      window.onload = function () {
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);
        loadProgressList();

        // ★ 押出種別フィルターのイベント登録
        const typeFilter = document.getElementById("filterPressingType");
        if (typeFilter) {
          typeFilter.addEventListener("change", () => {
            renderTable(applyFilters(window._progressData));
          });
        }
      };

      /* ============================================================
   多言語切替（TH の select を壊さない安全版）
============================================================ */
      function setLang(lang) {
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          const newText = dict[lang][key];

          if (el.tagName === "TH") {
            // ★ 子要素（select 等）を保持しつつ、先頭テキストだけ置換
            const children = Array.from(el.childNodes);

            // 先頭のテキストノードを探す
            const textNode = children.find(
              (n) => n.nodeType === Node.TEXT_NODE,
            );

            if (textNode) {
              textNode.textContent = newText + " ";
            }
          } else {
            el.textContent = newText;
          }
        });

        localStorage.setItem("lang", lang);

        if (window._progressData) {
          renderTable(applyFilters(window._progressData));
        }
      }

      /* ============================================================
   進捗リスト読み込み
============================================================ */
      function loadProgressList() {
        fetch("./php/die_progress_php/get_progress_list.php?ts=" + Date.now())
          .then((res) => res.json())
          .then((data) => {
            data.forEach((row) => {
              row.inspected =
                row.inspected === null ? null : Number(row.inspected);
              row.diagnosed =
                row.diagnosed === null ? null : Number(row.diagnosed);
              row.approved =
                row.approved === null ? null : Number(row.approved);
              row.need_fix =
                row.need_fix === null ? null : Number(row.need_fix);
              row.fixed = row.fixed === null ? null : Number(row.fixed);
            });

            window._progressData = data;
            renderTable(applyFilters(data));
          });
      }

      /* ============================================================
   押出種別フィルター（安全版）
============================================================ */
      function applyFilters(data) {
        const select = document.getElementById("filterPressingType");
        if (!select) return data;

        const type = select.value;

        return data.filter((row) => {
          const matchType = type === "" || row.pressing_symbol === type;
          return matchType;
        });
      }

      /* ============================================================
   テーブル描画
============================================================ */
      function renderTable(data) {
        const tbody = document.querySelector("#progressTable tbody");
        tbody.innerHTML = "";

        data.forEach((row) => {
          const tr = document.createElement("tr");

          const badge = (flag) =>
            flag === 1
              ? `<span class="badge ok">YES</span>`
              : flag === 0
                ? `<span class="badge ng">NO</span>`
                : `<span class="badge none">—</span>`;

          const lang = localStorage.getItem("lang") || "ja";
          let actionBtn = "";

          if (row.inspected === 0 || row.inspected === null) {
            actionBtn = `<button class="btn" onclick="goInspection(${row.press_id})">${dict[lang].col_action_ins}</button>`;
          } else if (
            row.inspected === 1 &&
            (row.diagnosed === 0 || row.diagnosed === null)
          ) {
            actionBtn = `<button class="btn" onclick="goDiagnosis(${row.press_id})">${dict[lang].col_action_diag}</button>`;
          } else if (row.diagnosed === 1 && row.approved !== 1) {
            actionBtn = `<button class="btn btn-warning" onclick="approveDiagnosis(${row.press_id})">${dict[lang].col_action_app}</button>`;
          } else if (row.need_fix === 1 && row.fixed === 0) {
            actionBtn = `<button class="btn" onclick="goFix(${row.press_id})">${dict[lang].col_action_fix}</button>`;
          } else {
            actionBtn = `<button class="btn" onclick="goDetail(${row.press_id})">${dict[lang].col_action_detail}</button>`;
          }

          tr.innerHTML = `
      <td>${row.press_date}</td>
      <td class="die-number">${row.die_number}</td>
      <td class="pressing-type">${row.pressing_symbol}</td>
      <td>${badge(row.inspected)}</td>
      <td>${badge(row.diagnosed)}</td>
      <td>${badge(row.need_fix)}</td>
      <td>${badge(row.approved)}</td>
      <td>${badge(row.fixed)}</td>
      <td>${actionBtn}</td>
    `;

          tbody.appendChild(tr);
        });
      }

      /* ============================================================
   画面遷移
============================================================ */
      function goInspection(pressId) {
        location.href = `die_inspection.html?press_id=${pressId}`;
      }
      function goDiagnosis(pressId) {
        location.href = `die_diagnosis.html?press_id=${pressId}`;
      }
      function goFix(pressId) {
        location.href = `die_fix_plan.html?press_id=${pressId}`;
      }
      function goDetail(pressId) {
        alert("詳細画面はまだ未実装です");
      }

      /* ============================================================
   承認（PIN）
============================================================ */
      function approveDiagnosis(pressId) {
        const pin = prompt("承認PINコードを入力してください");
        if (pin === "1031") {
          location.href = `die_diagnosis.html?press_id=${pressId}&mode=approval`;
        } else {
          alert("PINコードが違います");
        }
      }

      /* ============================================================
   型番検索
============================================================ */
      document
        .getElementById("searchDie")
        .addEventListener("input", function () {
          const keyword = this.value.trim().toUpperCase();
          const filtered = window._progressData.filter((row) =>
            row.die_number.toUpperCase().startsWith(keyword),
          );
          renderTable(applyFilters(filtered));
        });
    </script>
  </body>
</html>
