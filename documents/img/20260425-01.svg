<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">

  <style>
    .box { fill:#ffffff; stroke:#333; stroke-width:1.5; rx:6; ry:6; }
    .decision { fill:#ffffff; stroke:#333; stroke-width:1.5; }
    .text { font-family:"Segoe UI", sans-serif; font-size:14px; fill:#111; }
    .arrow { stroke:#333; stroke-width:1.5; marker-end:url(#arrowhead); }
    .label { font-family:"Segoe UI", sans-serif; font-size:13px; fill:#111; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- 1. NG 診断が登録される -->
  <rect x="250" y="20" width="400" height="70" class="box"/>
  <text x="450" y="50" text-anchor="middle" class="text">NG 診断が登録される</text>
  <text x="450" y="70" text-anchor="middle" class="text">（t_die_diagnosis に INSERT, issue_id は NULL）</text>

  <line x1="450" y1="90" x2="450" y2="150" class="arrow"/>

  <!-- 2. 未完了 Issue の検索 -->
  <polygon points="450,160 580,220 450,280 320,220" class="decision"/>
  <text x="450" y="205" text-anchor="middle" class="text">同じ die_id の未完了 Issue を検索</text>
  <text x="450" y="230" text-anchor="middle" class="text">completed_at IS NULL</text>

  <text x="600" y="220" class="label">存在する</text>
  <text x="300" y="220" class="label">存在しない</text>

  <!-- YES branch -->
  <line x1="580" y1="220" x2="700" y2="220" class="arrow"/>

  <rect x="700" y="180" width="180" height="90" class="box"/>
  <text x="790" y="215" text-anchor="middle" class="text">既存 Issue を再利用</text>
  <text x="790" y="240" text-anchor="middle" class="text">diagnosis.issue_id = issue.id</text>

  <line x1="790" y1="270" x2="790" y2="330" class="arrow"/>

  <!-- NO branch -->
  <line x1="320" y1="220" x2="200" y2="220" class="arrow"/>

  <rect x="40" y="180" width="260" height="110" class="box"/>
  <text x="170" y="215" text-anchor="middle" class="text">新規 Issue を作成</text>
  <text x="170" y="240" text-anchor="middle" class="text">INSERT INTO t_die_issue (...)</text>
  <text x="170" y="265" text-anchor="middle" class="text">diagnosis.issue_id = new issue.id</text>

  <line x1="170" y1="290" x2="170" y2="330" class="arrow"/>

  <!-- Merge -->
  <line x1="170" y1="330" x2="790" y2="330" stroke="#333" stroke-width="1.5"/>

  <!-- 3. diagnosis.issue_id を確定 -->
  <rect x="250" y="330" width="400" height="80" class="box"/>
  <text x="450" y="365" text-anchor="middle" class="text">t_die_diagnosis.issue_id を確定</text>
  <text x="450" y="390" text-anchor="middle" class="text">（既存 Issue または 新規 Issue の id）</text>

  <line x1="450" y1="410" x2="450" y2="470" class="arrow"/>

  <!-- 4. die_condition 更新 -->
  <rect x="250" y="470" width="400" height="80" class="box"/>
  <text x="450" y="505" text-anchor="middle" class="text">金型状態を更新（m_dies.die_condition）</text>
  <text x="450" y="530" text-anchor="middle" class="text">need_repair に変更</text>

</svg>
