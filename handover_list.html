<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>金型輸出受領移管一覧</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .lang-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      .lang-buttons button {
        padding: 6px 12px;
        margin-left: 5px;
        border: 1px solid #0078d4;
        background: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 12px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .toolbar .checked-count {
        font-size: 13px;
        color: #555;
      }

      .btn {
        padding: 7px 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
      }

      .btn-edit { background: #ff9800; color: white; }
      .btn-edit:hover { background: #e68900; }
      .btn-edit:disabled { background: #ccc; color: #888; cursor: not-allowed; }

      .btn-save { background: #4caf50; color: white; }
      .btn-save:hover { background: #388e3c; }

      .btn-cancel { background: #9e9e9e; color: white; }
      .btn-cancel:hover { background: #757575; }

      .table-wrap {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        overflow-x: auto;
        overflow-y: auto;
        max-height: calc(100vh - 130px);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        min-width: 1400px;
      }

      th, td {
        padding: 7px 8px;
        border-bottom: 1px solid #ddd;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td {
        font-family: "Roboto Mono", monospace;
        font-size: 13px;
      }

      th {
        background: #e8f1ff;
        cursor: pointer;
        position: sticky;
        top: 0;
        z-index: 10;
        font-size: 12px;
      }

      th.no-sort { cursor: default; }
      th .sort-icon { margin-left: 3px; font-size: 10px; opacity: 0.6; }

      tr:hover { background: #f0f8ff; }
      tr.checked-row { background: #fff8e1; }
      tr.checked-row:hover { background: #fff3cd; }

      /* 編集モードの input */
      td input[type="date"],
      td input[type="text"] {
        font-family: "Roboto Mono", monospace;
        font-size: 12px;
        padding: 2px 4px;
        border: 1px solid #90c0f0;
        border-radius: 4px;
        width: 100%;
        box-sizing: border-box;
        background: #f0f8ff;
      }

      .die-number {
        font-family: "Roboto Mono", monospace;
        text-align: left;
        letter-spacing: 0.5px;
      }

      .wildcard-tip {
        position: fixed;
        background: #333;
        color: #fff;
        font-size: 11px;
        padding: 6px 10px;
        border-radius: 5px;
        z-index: 500;
        white-space: pre-wrap;
        line-height: 1.7;
        pointer-events: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }
      .wildcard-tip::before {
        content: "";
        position: absolute;
        top: -5px; left: 12px;
        border: 5px solid transparent;
        border-top: none;
        border-bottom-color: #333;
      }

      .die-search {
        width: 70px;
        font-family: "Roboto Mono", monospace;
        padding: 2px 5px;
        margin-left: 5px;
        border: 1px solid #aac4e8;
        border-radius: 4px;
        font-size: 11px;
      }

      th.col-check, td.col-check {
        width: 36px;
        min-width: 36px;
        cursor: default;
      }

      /* フラグ表示 */
      .flag-on  { color: #1565c0; font-weight: bold; }
      .flag-bad { color: #c62828; font-weight: bold; }

      /* インポートモーダル */
      .updated-recent { background: #fff3cd; color: #7b4f00; font-weight: bold; }

      .import-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); z-index: 200;
        display: flex; justify-content: center; align-items: flex-start;
        padding-top: 60px; box-sizing: border-box;
      }
      .import-box {
        background: white; border-radius: 10px; padding: 24px;
        width: 700px; max-width: 95vw; max-height: 80vh;
        overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }
      .import-box h2 { margin-top: 0; font-size: 18px; }
      .drop-zone {
        border: 2px dashed #90c0f0; border-radius: 8px;
        padding: 40px; text-align: center; color: #888;
        background: #f8fbff; cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        font-size: 15px;
      }
      .drop-zone.drag-over { background: #e0f0ff; border-color: #0078d4; }
      .drop-zone small { display: block; margin-top: 8px; font-size: 12px; color: #aaa; }
      .import-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
      .import-table th, .import-table td {
        padding: 7px 10px; border-bottom: 1px solid #ddd; text-align: left;
      }
      .import-table th { background: #e8f1ff; }
      .import-table select { width: 100%; font-size: 13px; padding: 3px; }
      .status-ok   { color: #2e7d32; font-weight: bold; }
      .status-warn { color: #e65100; font-weight: bold; }
      .status-none { color: #c62828; font-weight: bold; }
      .import-footer { margin-top: 16px; display: flex; gap: 10px; justify-content: flex-end; }
      .btn-import { background: #0078d4; color: white; }
      .btn-import:hover { background: #005fa3; }
      .btn-back { background: #546e7a; color: white; }
      .btn-back:hover { background: #37474f; }

      /* 列幅 */
      .col-die-num  { width: 110px; }
      .col-pn       { width: 130px; }
      .col-date     { width: 92px; }
      .col-text     { width: 110px; }
      .col-flag     { width: 72px; }

      /* 型番列固定 */
      th.col-check, td.col-check {
        position: sticky;
        left: 0;
        z-index: 11;
      }
      th.col-check { background: #e8f1ff; z-index: 12; }
      td.col-check { background: #fff; }
      tr:hover td.col-check { background: #f0f8ff; }
      tr.checked-row td.col-check { background: #fff8e1; }
      tr.checked-row:hover td.col-check { background: #fff3cd; }

      th.die-num-th, td.die-num-td {
        position: sticky;
        left: 36px;
        z-index: 11;
        box-shadow: 2px 0 5px rgba(0,0,0,0.08);
      }
      th.die-num-th { background: #e8f1ff; z-index: 12; overflow: visible; }
      td.die-num-td { background: #fff; }
      tr:hover td.die-num-td { background: #f0f8ff; }
      tr.checked-row td.die-num-td { background: #fff8e1; }
      tr.checked-row:hover td.die-num-td { background: #fff3cd; }
    </style>
  </head>

  <body>
    <div class="lang-buttons">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <h1 data-key="title">金型輸出受領移管一覧</h1>

    <div class="toolbar">
      <button class="btn btn-back" onclick="location.href='index.html'">← 戻る</button>
      <button class="btn btn-import" onclick="openImportModal()" data-key="btn_import">📂 CSV インポート</button>
      <button class="btn btn-edit" id="editBtn" onclick="enterEditMode()" disabled
        data-key="btn_edit">✏️ チェックのみ編集</button>
      <button class="btn btn-save" id="saveBtn" onclick="saveAll()"
        style="display:none" data-key="btn_save">💾 一括保存</button>
      <button class="btn btn-cancel" id="cancelBtn" onclick="cancelEditMode()"
        style="display:none" data-key="btn_cancel">✕ キャンセル</button>
      <span class="checked-count" id="checkedCount"></span>
    </div>

    <div class="table-wrap">
      <table id="handoverTable">
        <colgroup>
          <col class="col-check" />
          <col class="col-die-num" />
          <col class="col-pn" />
          <col class="col-date" />
          <col class="col-date" />
          <col class="col-text" />
          <col class="col-date" />
          <col class="col-date" />
          <col class="col-text" />
          <col class="col-date" />
          <col class="col-date" />
          <col class="col-date" />
          <col class="col-flag" />
          <col style="width:80px" />
          <col class="col-flag" />
          <col style="width:112px" />
        </colgroup>
        <thead>
          <tr>
            <th class="col-check no-sort">
              <input type="checkbox" id="checkAll" onclick="toggleCheckAll(this)" />
            </th>
            <th class="die-num-th" data-col="die_number" data-key="col_die">型番
              <input type="text" id="searchDie" placeholder="検索…" class="die-search"
                onclick="event.stopPropagation()" />
              <span class="sort-icon"></span>
            </th>
            <th data-col="production_number" data-key="col_pn">品番 <span class="sort-icon"></span></th>
            <th data-col="ordered_at" data-key="col_ordered">発注日 <span class="sort-icon"></span></th>
            <th data-col="shipped_at" data-key="col_shipped">出荷日 <span class="sort-icon"></span></th>
            <th data-col="invoice_number" data-key="col_invoice">インボイス番号 <span class="sort-icon"></span></th>
            <th data-col="die_arrived_at" data-key="col_arrived">到着日 <span class="sort-icon"></span></th>
            <th data-col="instruction_created_at" data-key="col_ins_created">指示書作成日 <span class="sort-icon"></span></th>
            <th data-col="inspection_number" data-key="col_insp_num">検査書番号 <span class="sort-icon"></span></th>
            <th data-col="inspection_passed_at" data-key="col_insp_passed">検査合格日 <span class="sort-icon"></span></th>
            <th data-col="submitted_to_japan_at" data-key="col_sub_jp">日本送付日 <span class="sort-icon"></span></th>
            <th data-col="asset_registration_applied_at" data-key="col_sub_vn">VN送付日 <span class="sort-icon"></span></th>
            <th data-col="is_accessory_item_flag" data-key="col_accessory" class="no-sort">付属品</th>
            <th data-col="note2" data-key="col_note2">備考 <span class="sort-icon"></span></th>
            <th data-col="unusable_flag" data-key="col_unusable" class="no-sort">使用不可</th>
            <th data-col="updated_at" data-key="col_updated">更新日時 <span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- インポートモーダル -->
    <div id="importModal" class="import-overlay" style="display:none">
      <div class="import-box">
        <h2>📂 CSV インポート</h2>

        <div id="dropZone" class="drop-zone">
          <div>ここに CSV をドロップ</div>
          <div style="margin-top:6px;font-size:13px">またはクリックしてファイルを選択</div>
          <small>形式: UTF-8 CSV &nbsp;|&nbsp; ヘッダー: die_name</small>
        </div>

        <div id="importPreview" style="display:none">
          <table class="import-table">
            <thead>
              <tr>
                <th>型番 (CSV)</th>
                <th>型番の候補</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="importTableBody"></tbody>
          </table>
        </div>

        <div class="import-footer">
          <button class="btn btn-save" id="importSubmitBtn" onclick="submitImport()" disabled>登録 (0件)</button>
          <button class="btn btn-cancel" onclick="closeImportModal()">キャンセル</button>
        </div>
      </div>
    </div>

    <script>
      /* ============================================================
        多言語
      ============================================================ */
      const dict = {
        ja: {
          title:           "金型輸出受領移管一覧",
          col_die:         "型番",
          col_pn:          "品番",
          col_ordered:     "発注日",
          col_shipped:     "出荷日",
          col_ins_created: "指示書作成日",
          col_insp_num:    "検査書番号",
          col_insp_passed: "検査合格日",
          col_sub_jp:      "日本送付日",
          col_sub_vn:      "固定資産登録日",
          col_accessory:   "付属品",
          col_note2:       "備考",
          col_invoice:     "インボイス番号",
          col_arrived:     "到着日",
          col_unusable:    "使用不可",
          col_updated:     "更新日時",
          btn_import:      "📂 CSV インポート",
          btn_edit:        "✏️ チェックのみ編集",
          btn_save:        "💾 一括保存",
          btn_cancel:      "✕ キャンセル",
          checked_count:   (n) => `${n}件選択中`,
          tip_wildcard:    "ワイルドカード使用可\n* ：任意の文字列\n? ：任意の1文字\n例）A12*　*123　A??B",
        },
        vi: {
          title:           "Danh sách tiếp nhận & bàn giao khuôn NK",
          col_die:         "Mã khuôn",
          col_pn:          "Mã sản phẩm",
          col_ordered:     "Ngày đặt hàng",
          col_shipped:     "Ngày xuất khẩu",
          col_ins_created: "Ngày tạo điều kiện gia công",
          col_insp_num:    "Số kataken",
          col_insp_passed: "Ngày xác nhận kataken",
          col_sub_jp:      "Ngày gửi mail qua Nhật yêu cầu ikan",
          col_sub_vn:      "Ngày đăng ký tài sản cố định",
          col_accessory:   "Nửa khuôn",
          col_note2:       "Ghi chú",
          col_invoice:     "Số invoice",
          col_arrived:     "Ngày nhập khuôn",
          col_unusable:    "Khuôn không dùng được",
          col_updated:     "Ngày cập nhật",
          btn_import:      "📂 Nhập CSV",
          btn_edit:        "✏️ Chỉnh sửa mục đã chọn",
          btn_save:        "💾 Lưu tất cả",
          btn_cancel:      "✕ Hủy",
          checked_count:   (n) => `Đã chọn ${n} mục`,
          tip_wildcard:    "Hỗ trợ ký tự đại diện\n* ：chuỗi ký tự bất kỳ\n? ：1 ký tự bất kỳ\nVD）A12*　*123　A??B",
        },
      };

      let currentLang = localStorage.getItem("lang") || "ja";

      function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          const val = dict[lang][key];
          if (!val || typeof val === "function") return;
          if (el.tagName === "TH") {
            const textNode = Array.from(el.childNodes).find(
              (n) => n.nodeType === Node.TEXT_NODE
            );
            if (textNode) textNode.textContent = val + " ";
          } else {
            el.textContent = val;
          }
        });
        localStorage.setItem("lang", lang);
        if (window._tableData) renderTable(window._tableData);
        updateCheckedCount();
      }

      /* ============================================================
        日付フォーマット  ja: yy-mm-dd  /  vi: dd-mm-yy
      ============================================================ */
      function formatDate(dateStr) {
        if (!dateStr) return "";
        const base = String(dateStr).split(" ")[0];
        const parts = base.split("-");
        if (parts.length !== 3) return dateStr;
        const yy = parts[0].slice(2);
        const mm = parts[1];
        const dd = parts[2];
        return currentLang === "vi" ? `${dd}-${mm}-${yy}` : `${yy}-${mm}-${dd}`;
      }

      function rawDate(val) {
        return val ? String(val).split(" ")[0] : "";
      }

      function formatDateTime(dateStr) {
        if (!dateStr) return "";
        const [datePart, timePart] = String(dateStr).split(" ");
        return formatDate(datePart) + " " + (timePart ? timePart.slice(0, 5) : "");
      }

      /* ============================================================
        チェック状態管理
      ============================================================ */
      const checkedIds = new Set();
      let isEditMode = false;

      function toggleCheck(id, checked) {
        id = Number(id);
        if (checked) checkedIds.add(id);
        else checkedIds.delete(id);
        updateCheckedCount();
        const tr = document.querySelector(`tr[data-id="${id}"]`);
        if (tr) tr.classList.toggle("checked-row", checked);
      }

      function toggleCheckAll(cbAll) {
        document.querySelectorAll("#handoverTable tbody tr[data-id]").forEach((tr) => {
          const id = Number(tr.dataset.id);
          const cb = tr.querySelector("input[type=checkbox]");
          if (cb) cb.checked = cbAll.checked;
          toggleCheck(id, cbAll.checked);
        });
      }

      function updateCheckedCount() {
        const n = checkedIds.size;
        document.getElementById("checkedCount").textContent =
          n > 0 ? dict[currentLang].checked_count(n) : "";
        document.getElementById("editBtn").disabled = n === 0;
      }

      /* ============================================================
        編集モード
      ============================================================ */
      function enterEditMode() {
        if (checkedIds.size === 0) return;
        isEditMode = true;
        document.getElementById("editBtn").style.display = "none";
        document.getElementById("saveBtn").style.display = "";
        document.getElementById("cancelBtn").style.display = "";
        document.getElementById("searchDie").disabled = true;
        const checked = (window._tableData || []).filter((r) => checkedIds.has(Number(r.id)));
        renderTable(checked);
      }

      function cancelEditMode() {
        isEditMode = false;
        document.getElementById("editBtn").style.display = "";
        document.getElementById("saveBtn").style.display = "none";
        document.getElementById("cancelBtn").style.display = "none";
        document.getElementById("searchDie").disabled = false;
        renderTable(window._tableData || []);
      }

      /* ============================================================
        一括保存
      ============================================================ */
      async function saveAll() {
        const rows = [];
        document.querySelectorAll("#handoverTable tbody tr[data-id]").forEach((tr) => {
          rows.push({
            id:                      Number(tr.dataset.id),
            ordered_at:              tr.querySelector('[name="ordered"]').value       || null,
            shipped_at:              tr.querySelector('[name="shipped"]').value       || null,
            instruction_created_at:  tr.querySelector('[name="ins_created"]').value  || null,
            inspection_number:       tr.querySelector('[name="insp_num"]').value      || null,
            inspection_passed_at:    tr.querySelector('[name="insp_passed"]').value   || null,
            submitted_to_japan_at:   tr.querySelector('[name="sub_jp"]').value        || null,
            asset_registration_applied_at: tr.querySelector('[name="sub_vn"]').value        || null,
            is_accessory_item_flag:  tr.querySelector('[name="accessory"]').checked   ? 1 : null,
            note2:                   tr.querySelector('[name="note2"]').value         || null,
            invoice_number:          tr.querySelector('[name="invoice"]').value       || null,
            die_arrived_at:          undefined,
            unusable_flag:           tr.querySelector('[name="unusable"]').checked    ? 1 : null,
          });
        });

        const res = await fetch("./php/handover/update_die_handover.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(rows),
        });
        const result = await res.json();

        if (result.status === "ok") {
          alert(`${result.updated}件 保存しました。`);
          checkedIds.clear();
          cancelEditMode();
          await loadTable();
        } else {
          alert("保存に失敗しました。");
        }
      }

      /* ============================================================
        データ読み込み
      ============================================================ */
      async function loadTable() {
        const res = await fetch("./php/handover/get_die_handover_list.php");
        window._tableData = await res.json();
        renderTable(window._tableData);
        updateCheckedCount();
      }

      /* ============================================================
        テーブル描画
      ============================================================ */
      let sortCol = "";
      let sortDir = "asc";

      function renderTable(data) {
        const sorted = [...data];
        if (sortCol) {
          sorted.sort((a, b) => {
            const v1 = a[sortCol] ?? "";
            const v2 = b[sortCol] ?? "";
            return sortDir === "asc" ? (v1 > v2 ? 1 : -1) : (v1 < v2 ? 1 : -1);
          });
        }

        const tbody = document.querySelector("#handoverTable tbody");
        tbody.innerHTML = "";

        sorted.forEach((row) => {
          const tr = document.createElement("tr");
          tr.dataset.id = row.id;
          const isChecked = checkedIds.has(Number(row.id));
          if (isChecked) tr.classList.add("checked-row");

          if (isEditMode) {
            tr.innerHTML = `
              <td class="col-check"><input type="checkbox" checked disabled /></td>
              <td class="die-number die-num-td">${row.die_number ?? ""}</td>
              <td class="die-number">${row.production_number ?? ""}</td>
              <td><input type="date" name="ordered"      value="${rawDate(row.ordered_at)}" /></td>
              <td><input type="date" name="shipped"      value="${rawDate(row.shipped_at)}" /></td>
              <td><input type="text" name="invoice"      value="${row.invoice_number ?? ""}" /></td>
              <td>${formatDate(row.die_arrived_at)}</td>
              <td><input type="date" name="ins_created"  value="${rawDate(row.instruction_created_at)}" /></td>
              <td><input type="text" name="insp_num"     value="${row.inspection_number ?? ""}" /></td>
              <td><input type="date" name="insp_passed"  value="${rawDate(row.inspection_passed_at)}" /></td>
              <td><input type="date" name="sub_jp"       value="${rawDate(row.submitted_to_japan_at)}" /></td>
              <td><input type="date" name="sub_vn"       value="${rawDate(row.asset_registration_applied_at)}" /></td>
              <td><input type="checkbox" name="accessory" ${row.is_accessory_item_flag ? "checked" : ""} /></td>
              <td><input type="text" name="note2"        value="${row.note2 ?? ""}" /></td>
              <td><input type="checkbox" name="unusable" ${row.unusable_flag ? "checked" : ""} /></td>
              <td>${row.updated_at ? formatDateTime(row.updated_at) : ""}</td>
            `;
          } else {
            const accFlag = row.is_accessory_item_flag
              ? `<span class="flag-on">●</span>` : "";
            const unusableFlag = row.unusable_flag
              ? `<span class="flag-bad">●</span>` : "";
            tr.innerHTML = `
              <td class="col-check">
                <input type="checkbox" ${isChecked ? "checked" : ""}
                  onchange="toggleCheck(${row.id}, this.checked)" />
              </td>
              <td class="die-number die-num-td">${row.die_number ?? ""}</td>
              <td class="die-number">${row.production_number ?? ""}</td>
              <td>${formatDate(row.ordered_at)}</td>
              <td>${formatDate(row.shipped_at)}</td>
              <td>${row.invoice_number ?? ""}</td>
              <td>${formatDate(row.die_arrived_at)}</td>
              <td>${formatDate(row.instruction_created_at)}</td>
              <td>${row.inspection_number ?? ""}</td>
              <td>${formatDate(row.inspection_passed_at)}</td>
              <td>${formatDate(row.submitted_to_japan_at)}</td>
              <td>${formatDate(row.asset_registration_applied_at)}</td>
              <td>${accFlag}</td>
              <td>${row.note2 ?? ""}</td>
              <td>${unusableFlag}</td>
              <td class="${isRecentUpdate(row.updated_at) ? 'updated-recent' : ''}">${row.updated_at ? formatDateTime(row.updated_at) : ""}</td>
            `;
          }

          tbody.appendChild(tr);
        });
      }

      /* ============================================================
        ソート
      ============================================================ */
      document.querySelectorAll("th[data-col]").forEach((th) => {
        if (th.classList.contains("no-sort")) return;
        th.addEventListener("click", () => {
          if (isEditMode) return;
          const col = th.dataset.col;
          if (sortCol === col) {
            sortDir = sortDir === "asc" ? "desc" : "asc";
          } else {
            sortCol = col;
            sortDir = "asc";
          }
          document.querySelectorAll(".sort-icon").forEach((i) => (i.textContent = ""));
          const icon = th.querySelector(".sort-icon");
          if (icon) icon.textContent = sortDir === "asc" ? "▲" : "▼";
          if (window._tableData) renderTable(window._tableData);
        });
      });

      /* ============================================================
        型番検索
      ============================================================ */
      document.getElementById("searchDie").addEventListener("input", function () {
        const raw = this.value.trim().toUpperCase();
        let filtered;
        if (raw === "") {
          filtered = window._tableData || [];
        } else if (raw.includes("*") || raw.includes("?")) {
          const pattern = raw
            .replace(/[.+^${}()|[\]\\]/g, "\\$&")
            .replace(/\*/g, ".*")
            .replace(/\?/g, ".");
          const re = new RegExp("^" + pattern, "i");
          filtered = (window._tableData || []).filter((row) =>
            re.test(row.die_number ?? "")
          );
        } else {
          filtered = (window._tableData || []).filter((row) =>
            (row.die_number ?? "").toUpperCase().startsWith(raw)
          );
        }
        renderTable(filtered);
      });

      function isRecentUpdate(dateStr) {
        if (!dateStr) return false;
        const diff = Date.now() - new Date(dateStr).getTime();
        return diff >= 0 && diff <= 30 * 24 * 60 * 60 * 1000;
      }

      /* ============================================================
        CSV インポート
      ============================================================ */
      let importRows = [];

      function openImportModal() {
        document.getElementById("importModal").style.display = "flex";
      }

      function closeImportModal() {
        document.getElementById("importModal").style.display = "none";
        document.getElementById("dropZone").style.display = "";
        document.getElementById("importPreview").style.display = "none";
        document.getElementById("importTableBody").innerHTML = "";
        importRows = [];
      }

      function initDropZone() {
        const dz = document.getElementById("dropZone");
        dz.addEventListener("dragover",  (e) => { e.preventDefault(); dz.classList.add("drag-over"); });
        dz.addEventListener("dragleave", ()  => dz.classList.remove("drag-over"));
        dz.addEventListener("drop", (e) => {
          e.preventDefault();
          dz.classList.remove("drag-over");
          const file = e.dataTransfer.files[0];
          if (file) readCSVFile(file);
        });
        dz.addEventListener("click", () => {
          const inp = document.createElement("input");
          inp.type = "file"; inp.accept = ".csv";
          inp.onchange = (e) => { if (e.target.files[0]) readCSVFile(e.target.files[0]); };
          inp.click();
        });
      }

      function readCSVFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => processCSV(e.target.result);
        reader.readAsText(file, "UTF-8");
      }

      function parseCSV(text) {
        const lines = text.trim().split(/\r?\n/);
        if (lines.length < 2) return [];

        // タブ区切り / カンマ区切り 自動判定
        const delim = lines[0].includes("\t") ? "\t" : ",";

        const headers = lines[0].split(delim).map(h => h.trim().replace(/^"|"$/g, ""));
        return lines.slice(1)
          .map(line => {
            const vals = line.split(delim).map(v => v.trim().replace(/^"|"$/g, ""));
            const obj = {};
            headers.forEach((h, i) => { obj[h] = vals[i] ?? ""; });
            // die_number を die_name として扱う
            if (!obj.die_name && obj.die_number) obj.die_name = obj.die_number;
            return obj;
          })
          .filter(r => r.die_name);
      }

      async function processCSV(text) {
        const rows = parseCSV(text);
        if (rows.length === 0) { alert("有効なデータがありません"); return; }
        importRows = rows;

        const dieNames = [...new Set(rows.map(r => r.die_name).filter(Boolean))];
        let candidatesMap = {};
        try {
          const res = await fetch("./php/handover/search_dies.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ names: dieNames }),
          });
          candidatesMap = await res.json();
        } catch (e) { console.error(e); }

        renderImportPreview(rows, candidatesMap);
        document.getElementById("dropZone").style.display = "none";
        document.getElementById("importPreview").style.display = "";
      }

      function renderImportPreview(rows, candidatesMap) {
        const tbody = document.getElementById("importTableBody");
        tbody.innerHTML = "";

        rows.forEach((row, idx) => {
          const candidates = candidatesMap[row.die_name] || [];
          let selectHtml = "";
          let initialDieId = "";

          if (candidates.length === 1) {
            initialDieId = candidates[0].id;
            selectHtml = `<select data-idx="${idx}" onchange="onDieSelect(this)">
              <option value="${candidates[0].id}" selected>${candidates[0].die_number}</option>
            </select>`;
          } else if (candidates.length > 1) {
            const opts = candidates.map(c => `<option value="${c.id}">${c.die_number}</option>`).join("");
            selectHtml = `<select data-idx="${idx}" onchange="onDieSelect(this)">
              <option value="">-- 選択してください --</option>${opts}
            </select>`;
          } else {
            selectHtml = `<span class="status-none">候補なし</span>`;
          }

          const statusHtml = initialDieId
            ? `<span class="status-ok">✓</span>`
            : candidates.length > 1
              ? `<span class="status-warn">要選択</span>`
              : `<span class="status-none">⚠ 未確定</span>`;

          const tr = document.createElement("tr");
          tr.dataset.idx   = idx;
          tr.dataset.dieId = initialDieId;
          tr.innerHTML = `
            <td>${row.die_name ?? ""}</td>
            <td>${selectHtml}</td>
            <td id="imp_status_${idx}">${statusHtml}</td>
          `;
          tbody.appendChild(tr);
        });

        checkImportReady();
      }

      function onDieSelect(sel) {
        const idx = sel.dataset.idx;
        const tr  = document.querySelector(`#importTableBody tr[data-idx="${idx}"]`);
        tr.dataset.dieId = sel.value;
        document.getElementById(`imp_status_${idx}`).innerHTML = sel.value
          ? `<span class="status-ok">✓</span>`
          : `<span class="status-warn">要選択</span>`;
        checkImportReady();
      }

      function checkImportReady() {
        let readyCount = 0;
        document.querySelectorAll("#importTableBody tr[data-idx]").forEach(tr => {
          if (tr.dataset.dieId) readyCount++;
        });
        const btn = document.getElementById("importSubmitBtn");
        btn.disabled    = readyCount === 0;
        btn.textContent = `登録 (${readyCount}件)`;
      }

      async function submitImport() {
        const payload = [];
        document.querySelectorAll("#importTableBody tr[data-idx]").forEach((tr) => {
          if (!tr.dataset.dieId) return;
          const idx = Number(tr.dataset.idx);
          payload.push({
            die_id: Number(tr.dataset.dieId),
          });
        });
        if (payload.length === 0) return;

        const res    = await fetch("./php/handover/insert_die_handover.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const result = await res.json();
        if (result.status === "ok") {
          alert(`${result.inserted}件 登録しました。`);
          closeImportModal();
          await loadTable();
        } else {
          alert("登録に失敗しました: " + (result.message ?? ""));
        }
      }

      /* ============================================================
        初期ロード
      ============================================================ */
      window.onload = () => {
        setLang(currentLang);
        initDropZone();
        loadTable();

        const input = document.getElementById("searchDie");
        const tip   = document.getElementById("wildcardTip");
        input.addEventListener("focus", () => {
          const rect = input.getBoundingClientRect();
          tip.style.top  = (rect.bottom + 6) + "px";
          tip.style.left = rect.left + "px";
          tip.style.display = "block";
        });
        input.addEventListener("blur", () => {
          tip.style.display = "none";
        });
      };
    </script>

    <div id="wildcardTip" class="wildcard-tip" style="display:none" data-key="tip_wildcard"></div>
  </body>
</html>
