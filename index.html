<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Top Menu</title>

    <style>
      body {
        background-color: #e8f0f8;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
      }

      .lang-switch {
        text-align: right;
        padding: 10px 20px;
      }

      .lang-switch button {
        background: #2b6ca3;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        margin-left: 6px;
        cursor: pointer;
      }

      h1 {
        text-align: center;
        color: #2b6ca3;
        margin-top: 10px;
        font-weight: bold;
      }

      .menu-row {
        width: 90%;
        max-width: 900px;
        margin: 20px auto;
        display: grid;
        gap: 20px;
      }

      .row-2 {
        grid-template-columns: repeat(2, 1fr);
      }

      .row-1 {
        grid-template-columns: 1fr;
      }

      .menu-card {
        background: #ffffff;
        border: 1px solid #c5d1dd;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s;
      }

      .menu-card:hover {
        background-color: #f2f7fc;
        transform: translateY(-3px);
      }

      .menu-title {
        font-size: 1.2rem;
        font-weight: bold;
        color: #2b6ca3;
        margin-bottom: 10px;
      }

      .menu-desc {
        font-size: 0.9rem;
        color: #555;
        line-height: 1.4;
      }
    </style>
  </head>

  <body>
    <div class="lang-switch">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <h1 id="title">Top Menu</h1>

    <!-- ★ 1段目（2列） -->
    <div class="menu-row row-2">
      <div
        class="menu-card"
        onclick="location.href = 'PressBilletCharge-SelectMachine.html'"
      >
        <div class="menu-title" data-key="billet_title">ビレット投入</div>
        <div class="menu-desc" data-key="billet_desc">
          ビレット投入に関するページ
        </div>
      </div>

      <div class="menu-card" onclick="location.href = 'DieMaitenanceV3.html'">
        <div class="menu-title" data-key="maintenance_title">
          金型メンテナンス
        </div>
        <div class="menu-desc" data-key="maintenance_desc">
          金型メンテナンスに関するページ
        </div>
      </div>
    </div>

    <!-- ★ 2段目（1列） -->
    <div class="menu-row row-1">
      <div class="menu-card" onclick="location.href = 'die_progress_list.html'">
        <div class="menu-title" data-key="progress_title">金型進捗一覧</div>
        <div class="menu-desc" data-key="progress_desc">
          測定 → 診断 → 承認 → 修理 の進捗管理
        </div>
      </div>
    </div>

    <script>
      const dict = {
        ja: {
          title: "トップメニュー",
          billet_title: "ビレット投入",
          billet_desc: "ビレット投入に関するページ",
          maintenance_title: "金型メンテナンス",
          maintenance_desc: "金型メンテナンスに関するページ",
          progress_title: "金型進捗一覧",
          progress_desc: "測定 → 診断 → 承認 → 修理 の進捗管理",
        },
        vi: {
          title: "Menu Chính",
          billet_title: "Nạp Billet",
          billet_desc: "Trang liên quan đến việc nạp billet",
          maintenance_title: "Bảo trì khuôn",
          maintenance_desc: "Trang liên quan đến bảo trì khuôn",
          progress_title: "Danh sách tiến độ khuôn",
          progress_desc:
            "Quản lý tiến độ: đo → chẩn đoán → phê duyệt → sửa chữa",
        },
      };

      function setLang(lang) {
        document.getElementById("title").textContent = dict[lang].title;
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          el.textContent = dict[lang][key];
        });
        localStorage.setItem("lang", lang);
      }

      window.onload = function () {
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);
      };
    </script>
  </body>
</html>
