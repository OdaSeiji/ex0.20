<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Top Menu</title>

    <style>
      body {
        background-color: #e8f0f8;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
      }

      .lang-switch {
        text-align: right;
        padding: 10px 20px;
      }

      .lang-switch button {
        background: #2b6ca3;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        margin-left: 6px;
        cursor: pointer;
      }

      h1 {
        text-align: center;
        color: #2b6ca3;
        margin-top: 10px;
        font-weight: bold;
      }

      .menu-container {
        width: 90%;
        max-width: 900px;
        margin: 30px auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
      }

      .menu-card {
        background: #ffffff;
        border: 1px solid #c5d1dd;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s;
      }

      .menu-card:hover {
        background-color: #f2f7fc;
        transform: translateY(-3px);
      }

      .menu-title {
        font-size: 1.2rem;
        font-weight: bold;
        color: #2b6ca3;
        margin-bottom: 10px;
      }

      .menu-desc {
        font-size: 0.9rem;
        color: #555;
        line-height: 1.4;
      }
    </style>
  </head>

  <body>
    <!-- ★ 言語切替ボタン -->
    <div class="lang-switch">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <h1 id="title">Top Menu</h1>

    <div class="menu-container">
      <div
        class="menu-card"
        onclick="location.href = 'PressBilletCharge-SelectMachine.html'"
      >
        <div class="menu-title" data-key="billet_title">Billet Charge</div>
        <div class="menu-desc" data-key="billet_desc">
          ビレット投入に関するページ
        </div>
      </div>

      <div class="menu-card" onclick="location.href = 'DieMaitenanceV3.html'">
        <div class="menu-title" data-key="maintenance_title">
          Die Maintenance
        </div>
        <div class="menu-desc" data-key="maintenance_desc">
          金型メンテナンスに関するページ
        </div>
      </div>

      <div class="menu-card" onclick="location.href = 'die_issue_list.html'">
        <div class="menu-title" data-key="issue_title">
          Die Issue Management
        </div>
        <div class="menu-desc" data-key="issue_desc">
          金型修正に関するページ
        </div>
      </div>
    </div>

    <script>
      /* 翻訳辞書 */
      const dict = {
        ja: {
          title: "トップメニュー",
          billet_title: "ビレット投入",
          billet_desc: "ビレット投入に関するページ",
          maintenance_title: "金型メンテナンス",
          maintenance_desc: "金型メンテナンスに関するページ",
          issue_title: "金型修正管理",
          issue_desc: "金型修正に関するページ",
        },
        vi: {
          title: "Menu Chính",
          billet_title: "Nạp Billet",
          billet_desc: "Trang liên quan đến việc nạp billet",
          maintenance_title: "Bảo trì khuôn",
          maintenance_desc: "Trang liên quan đến bảo trì khuôn",
          issue_title: "Quản lý sửa khuôn",
          issue_desc: "Trang liên quan đến sửa chữa khuôn",
        },
      };

      function setLang(lang) {
        document.getElementById("title").textContent = dict[lang].title;

        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          el.textContent = dict[lang][key];
        });

        // ★ 選択した言語を保存（次回も同じ言語で開く）
        localStorage.setItem("lang", lang);
      }

      // ★ ページ読み込み時：デフォルトはベトナム語
      window.onload = function () {
        const saved = localStorage.getItem("lang") || "vi";
        setLang(saved);
      };
    </script>
  </body>
</html>
