<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Top Menu</title>

    <style>
      body {
        background-color: #e8f0f8;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
      }

      .lang-switch {
        text-align: right;
        padding: 10px 20px;
      }

      .lang-switch button {
        background: #2b6ca3;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        margin-left: 6px;
        cursor: pointer;
      }

      h1 {
        text-align: center;
        color: #2b6ca3;
        margin-top: 10px;
        font-weight: bold;
      }

      /* ★ 段ごとに固定レイアウト */
      .menu-row {
        width: 90%;
        max-width: 900px;
        margin: 20px auto;
        display: grid;
        gap: 20px;
      }

      /* 1段目：2列固定 */
      .row-2 {
        grid-template-columns: repeat(2, 1fr);
      }

      /* 2段目：1列固定 */
      .row-1 {
        grid-template-columns: 1fr;
      }

      /* 3段目：3列固定 */
      .row-3 {
        grid-template-columns: repeat(3, 1fr);
      }

      .menu-card {
        background: #ffffff;
        border: 1px solid #c5d1dd;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s;
      }

      .menu-card:hover {
        background-color: #f2f7fc;
        transform: translateY(-3px);
      }

      .menu-title {
        font-size: 1.2rem;
        font-weight: bold;
        color: #2b6ca3;
        margin-bottom: 10px;
      }

      .menu-desc {
        font-size: 0.9rem;
        color: #555;
        line-height: 1.4;
      }
    </style>
  </head>

  <body>
    <!-- ★ 言語切替ボタン -->
    <div class="lang-switch">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <h1 id="title">Top Menu</h1>

    <!-- ★ 1段目（2列） -->
    <div class="menu-row row-2">
      <div
        class="menu-card"
        onclick="location.href = 'PressBilletCharge-SelectMachine.html'"
      >
        <div class="menu-title" data-key="billet_title">ビレット投入</div>
        <div class="menu-desc" data-key="billet_desc">
          ビレット投入に関するページ
        </div>
      </div>

      <div class="menu-card" onclick="location.href = 'DieMaitenanceV3.html'">
        <div class="menu-title" data-key="maintenance_title">
          金型メンテナンス
        </div>
        <div class="menu-desc" data-key="maintenance_desc">
          金型メンテナンスに関するページ
        </div>
      </div>
    </div>

    <!-- ★ 2段目（1列） -->
    <div class="menu-row row-1">
      <div class="menu-card" onclick="location.href = 'die_issue_list.html'">
        <div class="menu-title" data-key="issue_title">テーマ一覧</div>
        <div class="menu-desc" data-key="issue_desc">
          金型修正テーマの一覧ページ
        </div>
      </div>
    </div>

    <!-- ★ 3段目（3列） -->
    <div class="menu-row row-3">
      <div class="menu-card" onclick="location.href = 'die_inspection.html'">
        <div class="menu-title" data-key="inspection_title">検査入力</div>
        <div class="menu-desc" data-key="inspection_desc">
          検査記録を入力するページ
        </div>
      </div>

      <div
        class="menu-card"
        onclick="location.href = 'die_inspection_list.html'"
      >
        <div class="menu-title" data-key="inspection_list_title">
          検査一覧、診断
        </div>
        <div class="menu-desc" data-key="inspection_list_desc">
          検査記録および診断記録の一覧ページ
        </div>
      </div>

      <div class="menu-card" onclick="location.href = 'diagnosis_list.html'">
        <div class="menu-title" data-key="diagnosis_list_title">診断一覧</div>
        <div class="menu-desc" data-key="diagnosis_list_desc">
          診断記録の一覧ページ
        </div>
      </div>
    </div>

    <script>
      /* 翻訳辞書 */
      const dict = {
        ja: {
          title: "トップメニュー",
          billet_title: "ビレット投入",
          billet_desc: "ビレット投入に関するページ",
          maintenance_title: "金型メンテナンス",
          maintenance_desc: "金型メンテナンスに関するページ",
          issue_title: "テーマ一覧",
          issue_desc: "金型修正テーマの一覧ページ",
          inspection_title: "検査入力",
          inspection_desc: "検査記録を入力するページ",
          inspection_list_title: "検査一覧、診断",
          inspection_list_desc: "検査記録および診断記録の一覧ページ",
          diagnosis_list_title: "診断一覧",
          diagnosis_list_desc: "診断記録の一覧ページ",
        },
        vi: {
          title: "Menu Chính",
          billet_title: "Nạp Billet",
          billet_desc: "Trang liên quan đến việc nạp billet",
          maintenance_title: "Bảo trì khuôn",
          maintenance_desc: "Trang liên quan đến bảo trì khuôn",
          issue_title: "Danh sách chủ đề",
          issue_desc: "Trang danh sách các chủ đề sửa khuôn",
          inspection_title: "Nhập kiểm tra",
          inspection_desc: "Trang nhập dữ liệu kiểm tra",
          inspection_list_title: "Danh sách kiểm tra & chẩn đoán",
          inspection_list_desc:
            "Trang danh sách các bản ghi kiểm tra và chẩn đoán",
          diagnosis_list_title: "Danh sách chẩn đoán",
          diagnosis_list_desc: "Trang danh sách các bản ghi chẩn đoán",
        },
      };

      function setLang(lang) {
        document.getElementById("title").textContent = dict[lang].title;
        document.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          el.textContent = dict[lang][key];
        });
        localStorage.setItem("lang", lang);
      }

      window.onload = function () {
        const saved = localStorage.getItem("lang") || "ja";
        setLang(saved);
      };
    </script>
  </body>
</html>
