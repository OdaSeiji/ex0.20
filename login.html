<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ログイン</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eef3f8, #ffffff);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-card {
        background: #fff;
        border-radius: 12px;
        padding: 40px 36px 36px;
        width: 340px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      }

      .login-title {
        font-size: 20px;
        font-weight: bold;
        color: #2b6ca3;
        border-left: 5px solid #2b6ca3;
        padding-left: 10px;
        margin-bottom: 28px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 18px;
      }

      label {
        font-size: 12px;
        font-weight: bold;
        color: #555;
      }

      input {
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.2s;
      }

      input:focus {
        outline: none;
        border-color: #2b6ca3;
      }

      .login-btn {
        width: 100%;
        padding: 11px;
        background: #2b6ca3;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 6px;
        transition: background 0.2s;
      }

      .login-btn:hover { background: #1a4f7a; }
      .login-btn:disabled { background: #90a4ae; cursor: default; }

      .error-msg {
        color: #c62828;
        font-size: 12px;
        margin-top: 12px;
        text-align: center;
        min-height: 18px;
      }

      .hint {
        font-size: 11px;
        color: #aaa;
        text-align: center;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-title">🔐 ログイン</div>

      <div class="form-group">
        <label for="empNum">社員番号</label>
        <input type="text" id="empNum" placeholder="例：1001" inputmode="numeric" />
      </div>

      <div class="form-group">
        <label for="pw">パスワード</label>
        <input type="password" id="pw" placeholder="パスワード" />
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">ログイン</button>
      <div class="error-msg" id="errMsg"></div>
      <div class="hint">初期パスワードは社員番号です</div>
    </div>

    <script>
      document.getElementById("pw").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      async function doLogin() {
        const empNum = document.getElementById("empNum").value.trim();
        const pw     = document.getElementById("pw").value;
        const btn    = document.getElementById("loginBtn");
        const err    = document.getElementById("errMsg");

        err.textContent = "";
        if (!empNum || !pw) {
          err.textContent = "社員番号とパスワードを入力してください";
          return;
        }

        btn.disabled = true;
        btn.textContent = "確認中...";

        try {
          const res    = await fetch("php/auth/login.php", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ emploee_number: empNum, password: pw }),
          });
          const result = await res.json();

          if (result.status === "ok") {
            location.replace("index.html");
          } else {
            err.textContent = result.message || "ログインに失敗しました";
            btn.disabled    = false;
            btn.textContent = "ログイン";
          }
        } catch (_) {
          err.textContent = "通信エラーが発生しました";
          btn.disabled    = false;
          btn.textContent = "ログイン";
        }
      }
    </script>
  </body>
</html>
