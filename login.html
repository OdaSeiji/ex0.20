<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng nhập</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eef3f8, #ffffff);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .lang-buttons {
        position: fixed;
        top: 12px;
        right: 14px;
      }
      .lang-buttons button {
        padding: 5px 11px;
        margin-left: 4px;
        border: 1px solid #2b6ca3;
        background: #fff;
        color: #2b6ca3;
        border-radius: 5px;
        font-size: 12px;
        cursor: pointer;
      }
      .lang-buttons button.active {
        background: #2b6ca3;
        color: #fff;
      }

      .login-card {
        background: #fff;
        border-radius: 12px;
        padding: 40px 36px 36px;
        width: 340px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      }

      .login-title {
        font-size: 20px;
        font-weight: bold;
        color: #2b6ca3;
        border-left: 5px solid #2b6ca3;
        padding-left: 10px;
        margin-bottom: 28px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 18px;
      }

      label {
        font-size: 12px;
        font-weight: bold;
        color: #555;
      }

      input {
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.2s;
      }

      input:focus {
        outline: none;
        border-color: #2b6ca3;
      }

      .login-btn {
        width: 100%;
        padding: 11px;
        background: #2b6ca3;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 6px;
        transition: background 0.2s;
      }

      .login-btn:hover { background: #1a4f7a; }
      .login-btn:disabled { background: #90a4ae; cursor: default; }

      .error-msg {
        color: #c62828;
        font-size: 12px;
        margin-top: 12px;
        text-align: center;
        min-height: 18px;
      }

      .hint {
        font-size: 11px;
        color: #aaa;
        text-align: center;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="lang-buttons">
      <button id="btnVi" onclick="setLang('vi')">VI</button>
      <button id="btnJa" onclick="setLang('ja')">JP</button>
    </div>

    <div class="login-card">
      <div class="login-title">🔐 <span data-key="title">Đăng nhập</span></div>

      <div class="form-group">
        <label for="empNum" data-key="label_emp">Mã nhân viên</label>
        <input type="text" id="empNum" data-key-ph="ph_emp" placeholder="Ví dụ：1001" inputmode="numeric" />
      </div>

      <div class="form-group">
        <label for="pw" data-key="label_pw">Mật khẩu</label>
        <input type="password" id="pw" data-key-ph="ph_pw" placeholder="Mật khẩu" />
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()" data-key="btn_login">Đăng nhập</button>
      <div class="error-msg" id="errMsg"></div>
      <div class="hint" data-key="hint">Mật khẩu ban đầu là mã nhân viên</div>
    </div>

    <script>
      const dict = {
        vi: {
          title:        "Đăng nhập",
          label_emp:    "Mã nhân viên",
          ph_emp:       "Ví dụ：1001",
          label_pw:     "Mật khẩu",
          ph_pw:        "Mật khẩu",
          btn_login:    "Đăng nhập",
          hint:         "Mật khẩu ban đầu là mã nhân viên",
          err_empty:    "Vui lòng nhập mã nhân viên và mật khẩu",
          btn_checking: "Đang kiểm tra...",
          err_failed:   "Đăng nhập thất bại",
          err_network:  "Lỗi kết nối",
        },
        ja: {
          title:        "ログイン",
          label_emp:    "社員番号",
          ph_emp:       "例：1001",
          label_pw:     "パスワード",
          ph_pw:        "パスワード",
          btn_login:    "ログイン",
          hint:         "初期パスワードは社員番号です",
          err_empty:    "社員番号とパスワードを入力してください",
          btn_checking: "確認中...",
          err_failed:   "ログインに失敗しました",
          err_network:  "通信エラーが発生しました",
        },
      };

      let currentLang = "vi";

      function setLang(lang) {
        currentLang = lang;
        localStorage.setItem("lang_login", lang);

        document.querySelectorAll("[data-key]").forEach((el) => {
          el.textContent = dict[lang][el.dataset.key] ?? el.textContent;
        });
        document.querySelectorAll("[data-key-ph]").forEach((el) => {
          el.placeholder = dict[lang][el.dataset.keyPh] ?? el.placeholder;
        });

        document.getElementById("btnVi").classList.toggle("active", lang === "vi");
        document.getElementById("btnJa").classList.toggle("active", lang === "ja");
        document.documentElement.lang = lang;
      }

      document.getElementById("pw").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      async function doLogin() {
        const empNum = document.getElementById("empNum").value.trim();
        const pw     = document.getElementById("pw").value;
        const btn    = document.getElementById("loginBtn");
        const err    = document.getElementById("errMsg");
        const t      = dict[currentLang];

        err.textContent = "";
        if (!empNum || !pw) {
          err.textContent = t.err_empty;
          return;
        }

        btn.disabled    = true;
        btn.textContent = t.btn_checking;

        try {
          const res    = await fetch("php/auth/login.php", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ emploee_number: empNum, password: pw }),
          });
          const result = await res.json();

          if (result.status === "ok") {
            location.replace("index.html");
          } else {
            err.textContent = result.message || t.err_failed;
            btn.disabled    = false;
            btn.textContent = t.btn_login;
          }
        } catch (_) {
          err.textContent = t.err_network;
          btn.disabled    = false;
          btn.textContent = t.btn_login;
        }
      }

      // 初期化（デフォルト：ベトナム語）
      const saved = localStorage.getItem("lang_login") || "vi";
      setLang(saved);
    </script>
  </body>
</html>
