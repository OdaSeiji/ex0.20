<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production Drawing</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: #f5f5f5; padding: 20px; height: 100vh; display: flex; flex-direction: column; }

    @media print { html, body { display: none !important; } }

    h1 { font-size: 22px; margin-bottom: 14px; border-left: 6px solid #0078d4; padding-left: 10px; flex-shrink: 0; }

    .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-shrink: 0; }
    .btn { padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; }
    .btn-back   { background: #546e7a; color: #fff; }
    .btn-upload { background: #0078d4; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .layout { display: flex; gap: 16px; flex: 1; min-height: 0; }

    /* ── Left panel ── */
    .left-panel {
      width: 320px; flex-shrink: 0;
      background: #fff; border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .panel-header { padding: 10px 12px; border-bottom: 1px solid #e0e0e0; }

    #searchInput {
      width: 100%; padding: 6px 10px;
      border: 1px solid #aac4e8; border-radius: 4px;
      font-family: "Roboto Mono", monospace; font-size: 13px;
    }
    #searchInput:focus { outline: none; border-color: #0078d4; }

    .table-wrap { flex: 1; overflow-y: auto; }

    table { border-collapse: collapse; width: 100%; }
    th {
      background: #e8f1ff; padding: 6px 10px; font-size: 11px;
      position: sticky; top: 0; z-index: 5; text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }
    td { padding: 6px 10px; border-bottom: 1px solid #e0e0e0; font-size: 12px; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #f0f8ff; }
    tbody tr.selected { background: #fff8e1; }
    tbody tr.selected:hover { background: #fff3cd; }

    td.prod-num { font-family: "Roboto Mono", monospace; font-weight: bold; }
    td.file-badge { text-align: center; width: 48px; }
    th.filter-active { background: #d0e8ff; color: #0055a5; }

    .badge-linked   { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 10px; font-size: 10px; }
    .badge-unlinked { background: #eceff1; color: #90a4ae; padding: 2px 8px; border-radius: 10px; font-size: 10px; }

    .upload-area {
      padding: 10px 12px; border-top: 1px solid #e0e0e0;
      display: flex; align-items: center; gap: 8px;
    }
    #uploadLabel {
      font-size: 12px; color: #555;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    #fileInput { display: none; }

    /* ── Right panel ── */
    .right-panel {
      flex: 1; min-width: 0;
      background: #fff; border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      overflow: hidden; position: relative;
    }

    #noFileMsg {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #90a4ae; font-size: 14px;
    }

    #pdfFrame {
      width: 100%; height: 100%; border: none; display: none;
    }
  </style>
</head>
<body>
  <h1>Production Drawing</h1>

  <div class="toolbar">
    <button class="btn btn-back" onclick="location.href='index.html'">← 戻る</button>
  </div>

  <div class="layout">
    <!-- Left -->
    <div class="left-panel">
      <div class="panel-header">
        <input id="searchInput" type="text" placeholder="Search production number…" oninput="filterTable()" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Production Number</th>
              <th id="fileFilterTh" style="text-align:center; cursor:pointer; user-select:none;"
                  onclick="toggleFileFilter()" title="未登録のみ表示">
                File <span id="fileFilterIcon" style="font-size:9px; opacity:0.6;">▽</span>
              </th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="upload-area">
        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" />
        <button class="btn btn-upload" id="uploadBtn" onclick="document.getElementById('fileInput').click()" disabled>
          📎 Upload
        </button>
        <span id="uploadLabel">—</span>
      </div>
    </div>

    <!-- Right -->
    <div class="right-panel">
      <div id="noFileMsg">Select a production number</div>
      <iframe id="pdfFrame" title="Production Drawing"></iframe>
    </div>
  </div>

  <script>
    const PHP_BASE   = '../diereport/ext0.11/exd11/php/ProductionDrawing/';
    const UPLOAD_BASE = '../diereport/upload/Production_drawing/';

    let allData         = [];
    let selectedId      = null;
    let showUnlinkedOnly = false;

    /* ── データ読み込み ── */
    async function loadList() {
      const res = await fetch(PHP_BASE + 'SelProductionNumber.php', { method: 'POST' });
      allData   = await res.json();
      renderTable(allData);
    }

    /* ── テーブル描画 ── */
    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      data.forEach(row => {
        const tr  = document.createElement('tr');
        tr.dataset.id = row.id;
        if (String(row.id) === String(selectedId)) tr.classList.add('selected');

        const badge = row.has_file
          ? '<span class="badge-linked">●</span>'
          : '<span class="badge-unlinked">—</span>';

        tr.innerHTML = `
          <td class="prod-num">${row.production_number ?? ''}</td>
          <td class="file-badge">${badge}</td>
        `;
        tr.addEventListener('click', () => selectRow(row.id));
        tbody.appendChild(tr);
      });
    }

    /* ── 絞り込み ── */
    function filterTable() {
      const q = document.getElementById('searchInput').value.trim().toUpperCase();
      let data = allData;
      if (q) data = data.filter(r => (r.production_number ?? '').toUpperCase().includes(q));
      if (showUnlinkedOnly) data = data.filter(r => !r.has_file);
      renderTable(data);
    }

    function toggleFileFilter() {
      showUnlinkedOnly = !showUnlinkedOnly;
      const th   = document.getElementById('fileFilterTh');
      const icon = document.getElementById('fileFilterIcon');
      th.classList.toggle('filter-active', showUnlinkedOnly);
      icon.textContent = showUnlinkedOnly ? '▲' : '▽';
      filterTable();
    }

    /* ── 行選択 ── */
    async function selectRow(id) {
      selectedId = id;
      document.querySelectorAll('#tableBody tr').forEach(tr =>
        tr.classList.toggle('selected', String(tr.dataset.id) === String(id))
      );
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('uploadLabel').textContent = '—';
      document.getElementById('fileInput').value = '';

      const res  = await fetch(PHP_BASE + 'SelSelFile.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'targetId=' + encodeURIComponent(id),
      });
      const data = await res.json();
      showFile(data[0]?.file_url ?? null);
    }

    /* ── PDF / 画像表示 ── */
    function showFile(filename) {
      const frame = document.getElementById('pdfFrame');
      const noMsg = document.getElementById('noFileMsg');

      if (!filename) {
        frame.style.display = 'none';
        noMsg.style.display = 'flex';
        noMsg.textContent   = 'No file registered';
        return;
      }

      const ext  = filename.split('.').pop().toLowerCase();
      const path = UPLOAD_BASE + filename;

      frame.src           = (ext === 'pdf') ? path + '#toolbar=0&navpanes=0' : path;
      frame.style.display = 'block';
      noMsg.style.display = 'none';
    }

    /* ── ファイルアップロード ── */
    document.getElementById('fileInput').addEventListener('change', async function () {
      if (!selectedId || !this.files[0]) return;
      const file     = this.files[0];
      const safeName = file.name.replace(/#/g, '');
      document.getElementById('uploadLabel').textContent = safeName;

      const formData = new FormData();
      formData.append('file', file);
      await fetch(PHP_BASE + 'FileUpload.php', { method: 'POST', body: formData });

      await fetch(PHP_BASE + 'InsFileName.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'targetId=' + encodeURIComponent(selectedId) + '&file_url=' + encodeURIComponent(safeName),
      });

      await loadList();
      showFile(safeName);
    });

    loadList();
  </script>
</body>
</html>
