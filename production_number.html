<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>品番管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Roboto Mono", "Segoe UI", monospace;
        background: #f0f2f5;
        padding: 20px;
      }

      .container { max-width: 1300px; margin: 0 auto; }

      /* ── ヘッダー ── */
      .page-header {
        background: #fff;
        border-radius: 10px;
        padding: 16px 24px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .back-btn {
        background: #2b6ca3; color: #fff;
        padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer;
        white-space: nowrap;
      }
      h1 { font-size: 20px; border-left: 6px solid #0078d4; padding-left: 10px; }
      .lang-wrap { margin-left: auto; display: flex; gap: 6px; }
      .lang-btn {
        padding: 6px 12px; border: 1px solid #0078d4;
        background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px;
      }
      .new-btn {
        background: #2e7d32; color: #fff;
        padding: 8px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;
      }

      /* ── フォームカード ── */
      .form-card {
        background: #fff;
        border-radius: 10px;
        padding: 22px 28px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        margin-bottom: 20px;
        display: none;
      }
      .form-card.open { display: block; }

      .form-title {
        font-size: 15px; font-weight: bold; color: #1565c0;
        margin-bottom: 18px; border-bottom: 2px solid #e8f1ff; padding-bottom: 8px;
      }
      .form-title.edit { color: #e65100; }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px 20px;
        margin-bottom: 20px;
      }
      .form-group { display: flex; flex-direction: column; gap: 4px; }
      .form-group.span2 { grid-column: span 2; }

      label.f-label { font-size: 12px; font-weight: bold; color: #555; }

      input[type="text"],
      select.f-select {
        padding: 7px 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 13px;
        font-family: inherit;
      }

      /* ── カテゴリ選択 ── */
      .cat-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 20px;
      }
      .cat-card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; max-height: 220px; display: flex; flex-direction: column; }
      .cat-title { background: #e8f1ff; padding: 8px 12px; font-size: 13px; font-weight: bold; color: #333; flex-shrink: 0; }
      .cat-scroll { overflow-y: auto; flex: 1; }
      .cat-table { width: 100%; border-collapse: collapse; }
      .cat-table td { padding: 7px 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
      .cat-table tr:hover td { background: #f7f9ff; }
      .cat-table tr.selected td { background: #e8f1ff; font-weight: bold; color: #1565c0; }
      .cat-hint { font-size: 11px; color: #c62828; padding: 4px 12px; display: none; flex-shrink: 0; }
      .cat-hint.show { display: block; }

      /* ── 必須バッジ ── */
      .f-label.req::after,
      .cat-title.req::after {
        content: "必須";
        display: inline-block;
        margin-left: 6px;
        background: #c62828;
        color: #fff;
        font-size: 10px;
        font-weight: bold;
        padding: 1px 6px;
        border-radius: 3px;
        vertical-align: middle;
        letter-spacing: 0.03em;
      }

      /* ── フォームボタン ── */
      .form-actions {
        display: flex; justify-content: flex-end; gap: 10px;
        padding-top: 16px; border-top: 1px solid #eee;
      }
      .btn-cancel { padding: 8px 18px; background: #9e9e9e; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
      .btn-save   { padding: 8px 22px; background: #1565c0; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
      .btn-delete { padding: 8px 18px; background: #c62828; color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-right: auto; }

      /* ── 一覧カード ── */
      .list-card {
        background: #fff;
        border-radius: 10px;
        padding: 20px 24px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      }
      .list-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
      .list-header h2 { font-size: 15px; color: #333; }
      .count-label { font-size: 12px; color: #888; }
      .search-input {
        padding: 6px 12px; border: 1px solid #ccc; border-radius: 5px;
        font-size: 13px; width: 220px; margin-left: auto;
      }

      .table-wrap { overflow-y: auto; max-height: 60vh; }

      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { padding: 9px 12px; border-bottom: 1px solid #eee; text-align: left; }
      th {
        position: sticky; top: 0; z-index: 2;
        background: #e8f1ff; font-weight: bold; color: #333;
        white-space: nowrap; user-select: none;
      }
      th.sortable { cursor: pointer; }
      th.sortable:hover { background: #d0e4ff; }
      .sort-icon { font-size: 10px; margin-left: 3px; color: #999; }
      tr:hover { background: #f7f9ff; }

      /* カラム幅 */
      .col-cat1, .col-cat2 { width: 110px; max-width: 110px; }
      .col-pn   { min-width: 130px; }
      .col-mat, .col-age { width: 70px; }
      .col-num  { width: 110px; }
      .col-act  { width: 72px; }

      .edit-btn {
        padding: 4px 12px; background: #1565c0; color: #fff;
        border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
      }

      /* ── Toast ── */
      #toast {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        background: #323232; color: #fff; padding: 10px 24px;
        border-radius: 6px; font-size: 13px; opacity: 0;
        transition: opacity 0.3s; pointer-events: none; z-index: 1100;
      }
      #toast.show { opacity: 1; }

      /* ── カテゴリ管理モーダル ── */
      .modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.5); z-index: 1000;
        align-items: center; justify-content: center;
      }
      .modal-overlay.open { display: flex; }
      .modal-box {
        background: #fff; border-radius: 10px; padding: 24px;
        width: 760px; max-width: 96vw; max-height: 88vh;
        overflow-y: auto; box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      }
      .modal-header {
        display: flex; align-items: center; margin-bottom: 18px;
      }
      .modal-header h3 { font-size: 16px; color: #1565c0; flex: 1; }
      .modal-close {
        background: none; border: none; font-size: 22px;
        cursor: pointer; color: #888; line-height: 1;
      }
      .modal-close:hover { color: #c62828; }

      .cat-mgr-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .cat-mgr-panel { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
      .cat-mgr-head {
        background: #e8f1ff; padding: 8px 12px;
        display: flex; align-items: center; gap: 8px;
      }
      .cat-mgr-head span { font-size: 13px; font-weight: bold; color: #333; flex: 1; }
      .cat-mgr-add {
        background: #2e7d32; color: #fff; border: none;
        border-radius: 4px; padding: 3px 10px; cursor: pointer; font-size: 12px;
      }
      .cat-mgr-list { overflow-y: auto; max-height: 320px; }
      .cat-mgr-item {
        display: flex; align-items: center; padding: 8px 12px;
        border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 13px;
      }
      .cat-mgr-item:hover { background: #f7f9ff; }
      .cat-mgr-item.selected { background: #e8f1ff; font-weight: bold; }
      .cat-mgr-item > span { flex: 1; }
      .cat-mgr-edit {
        background: none; border: 1px solid #bbb; border-radius: 3px;
        padding: 2px 8px; cursor: pointer; font-size: 11px; margin-left: 6px;
        flex-shrink: 0;
      }
      .cat-mgr-edit:hover { background: #f0f0f0; }
      .cat-mgr-empty { padding: 16px 12px; font-size: 12px; color: #aaa; text-align: center; }
      .count-badge {
        font-size: 11px; background: #e8f1ff; color: #1565c0;
        border-radius: 10px; padding: 1px 7px; margin-left: 4px; flex-shrink: 0;
      }
      .count-badge.zero { background: #f5f5f5; color: #bbb; }
      .cat-mgr-del {
        background: none; border: 1px solid #e57373; color: #c62828;
        border-radius: 3px; padding: 2px 7px; cursor: pointer;
        font-size: 11px; margin-left: 4px; flex-shrink: 0;
      }
      .cat-mgr-del:hover { background: #ffebee; }

      /* 品番一覧セクション */
      .pn-section { margin-top: 14px; border: 1px solid #ffe0b2; border-radius: 8px; overflow: hidden; }
      .pn-section-head {
        background: #fff3e0; padding: 8px 14px;
        font-size: 13px; display: flex; align-items: center; gap: 8px;
      }
      .pn-section-head span { color: #555; }
      .pn-section-head strong { color: #e65100; }
      .pn-section-list { overflow-y: auto; max-height: 160px; }
      .pn-section-item {
        padding: 6px 14px; border-bottom: 1px solid #fff3e0;
        font-size: 13px; display: flex; align-items: center; gap: 10px;
      }
      .pn-section-item:last-child { border-bottom: none; }
      .pn-section-item:hover { background: #fff8f0; }
      .pn-no { font-weight: bold; color: #333; flex: 1; }

      .cat-inline-form {
        padding: 10px 12px; background: #f5f8ff;
        border-bottom: 2px solid #1565c0; display: none;
      }
      .cat-inline-form.open { display: block; }
      .cat-inline-label {
        font-size: 11px; font-weight: bold; color: #555; margin-bottom: 4px;
      }
      .cat-inline-form input[type="text"] {
        width: 100%; padding: 6px 8px; border: 1px solid #ccc;
        border-radius: 4px; font-size: 13px; margin-bottom: 8px;
        font-family: inherit;
      }
      .cat-inline-btns { display: flex; gap: 6px; justify-content: flex-end; }
      .cat-inline-save {
        background: #1565c0; color: #fff; border: none;
        border-radius: 4px; padding: 5px 14px; cursor: pointer; font-size: 12px;
      }
      .cat-inline-cancel {
        background: #9e9e9e; color: #fff; border: none;
        border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 12px;
      }
      .cat-mgr-btn {
        background: #546e7a; color: #fff;
        padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- ヘッダー -->
      <div class="page-header">
        <button class="back-btn" onclick="location.href='index.html'">← メニューへ戻る</button>
        <h1 data-key="title">品番管理</h1>
        <div class="lang-wrap">
          <button class="lang-btn" onclick="setLang('ja')">日本語</button>
          <button class="lang-btn" onclick="setLang('vi')">Tiếng Việt</button>
        </div>
        <button class="cat-mgr-btn" onclick="openCatMgr()" data-key="btn_cat_mgr">🗂 カテゴリ管理</button>
        <button class="new-btn" onclick="openNewForm()" data-key="btn_new">＋ 新規登録</button>
      </div>

      <!-- フォームカード -->
      <div class="form-card" id="formCard">
        <div class="form-title" id="formTitle">✚ 新規登録</div>
        <input type="hidden" id="fId" />

        <div class="form-grid">
          <div class="form-group">
            <label class="f-label req" data-key="lbl_pn">品番</label>
            <input type="text" id="fPn" placeholder="例: ABC-001" oninput="this.value = this.value.toUpperCase()" />
          </div>
          <div class="form-group">
            <label class="f-label" data-key="lbl_dept">図面部門</label>
            <select class="f-select" id="fDept">
              <option value="0">—</option>
              <option value="1">Dev. 1</option>
              <option value="2">Dev. 2</option>
              <option value="3">Dev. 3</option>
              <option value="4">Dev. 4</option>
              <option value="5">Dev. 5</option>
              <option value="6">Dev. 6</option>
              <option value="7">Dev. 7</option>
              <option value="8">Dev. 8</option>
              <option value="9">Dev. 9</option>
              <option value="11">Dev. 11</option>
            </select>
          </div>
          <div class="form-group">
            <label class="f-label req" data-key="lbl_material">材質</label>
            <select class="f-select" id="fMaterial">
              <option value="0">—</option>
              <option value="1">A6061</option>
              <option value="2">A6063</option>
              <option value="3">A6N01A</option>
              <option value="4">A6N01</option>
            </select>
          </div>
          <div class="form-group">
            <label class="f-label" data-key="lbl_aging">時効処理</label>
            <select class="f-select" id="fAging">
              <option value="0">—</option>
              <option value="1">O</option>
              <option value="2">T5</option>
              <option value="3">T6</option>
            </select>
          </div>
          <div class="form-group">
            <label class="f-label req" data-key="lbl_length">製品長 (m)</label>
            <input type="text" id="fLength" />
          </div>
          <div class="form-group">
            <label class="f-label" data-key="lbl_circle">外接円 (mm)</label>
            <input type="text" id="fCircle" />
          </div>
          <div class="form-group">
            <label class="f-label" data-key="lbl_weight">比重 (kg/m)</label>
            <input type="text" id="fWeight" />
          </div>
          <div class="form-group">
            <label class="f-label req" data-key="lbl_area">断面積 (mm²)</label>
            <input type="text" id="fArea" />
          </div>
          <div class="form-group">
            <label class="f-label" data-key="lbl_pack_qty">梱包数 (個)</label>
            <input type="text" id="fPackQty" />
          </div>
          <div class="form-group">
            <label class="f-label" data-key="lbl_pack_row">梱包 行</label>
            <input type="text" id="fPackRow" />
          </div>
          <div class="form-group">
            <label class="f-label" data-key="lbl_pack_col">梱包 列</label>
            <input type="text" id="fPackCol" />
          </div>
          <div class="form-group">
            <label class="f-label" data-key="lbl_hardness">硬さ (HRF)</label>
            <input type="text" id="fHardness" />
          </div>
          <div class="form-group span2">
            <label class="f-label" data-key="lbl_hardness_note">硬さ備考</label>
            <input type="text" id="fHardnessNote" />
          </div>
        </div>

        <!-- カテゴリ選択 -->
        <div class="cat-wrap">
          <div class="cat-card">
            <div class="cat-title req" data-key="lbl_cat1">カテゴリ1</div>
            <div class="cat-scroll">
              <table class="cat-table"><tbody id="cat1Tbody"></tbody></table>
            </div>
            <div class="cat-hint" id="cat1Hint" data-key="hint_cat">選択してください</div>
          </div>
          <div class="cat-card">
            <div class="cat-title req" data-key="lbl_cat2">カテゴリ2</div>
            <div class="cat-scroll">
              <table class="cat-table"><tbody id="cat2Tbody"></tbody></table>
            </div>
            <div class="cat-hint" id="cat2Hint" data-key="hint_cat">選択してください</div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-delete" id="deleteBtn" style="display:none;" onclick="deleteRecord()" data-key="btn_delete">削除</button>
          <button class="btn-cancel" onclick="closeForm()" data-key="btn_cancel">キャンセル</button>
          <button class="btn-save"   id="saveBtn"   onclick="saveForm()"   data-key="btn_save">登録する</button>
        </div>
      </div>

      <!-- 一覧 -->
      <div class="list-card">
        <div class="list-header">
          <h2 data-key="list_title">品番一覧</h2>
          <span class="count-label" id="countLabel"></span>
          <input type="text" class="search-input" id="searchInput"
            placeholder="品番で絞り込み..." oninput="filterTable(this.value)" />
        </div>
        <div class="table-wrap">
        <table id="mainTable">
          <thead>
            <tr>
              <th class="sortable col-cat1" onclick="sortBy('category1_jp')" data-key="col_cat1">カテゴリ1<span class="sort-icon" data-sortkey="category1_jp">↕</span></th>
              <th class="sortable col-cat2" onclick="sortBy('category2_jp')" data-key="col_cat2">カテゴリ2<span class="sort-icon" data-sortkey="category2_jp">↕</span></th>
              <th class="sortable col-pn"   onclick="sortBy('production_number')" data-key="col_pn">品番<span class="sort-icon" data-sortkey="production_number">↕</span></th>
              <th class="col-mat" data-key="col_material">材質</th>
              <th class="col-age" data-key="col_aging">時効</th>
              <th class="col-num" data-key="col_area">断面積 (mm²)</th>
              <th class="col-num" data-key="col_weight">比重 (kg/m)</th>
              <th class="col-num" data-key="col_length">製品長 (m)</th>
              <th class="col-act" data-key="col_action">操作</th>
            </tr>
          </thead>
          <tbody id="mainTbody"></tbody>
        </table>
        </div>
      </div>
    </div>

    <!-- カテゴリ管理モーダル -->
    <div id="catMgrModal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <h3>🗂 カテゴリ管理</h3>
          <button class="modal-close" onclick="closeCatMgr()">✕</button>
        </div>
        <div class="cat-mgr-wrap">

          <!-- カテゴリ1 -->
          <div class="cat-mgr-panel">
            <div class="cat-mgr-head">
              <span>カテゴリ1</span>
              <button class="cat-mgr-add" onclick="showCatInlineForm('cat1', null)">＋ 追加</button>
            </div>
            <div class="cat-inline-form" id="cat1InlineForm">
              <div class="cat-inline-label" id="cat1InlineLabel">新規追加</div>
              <input type="text" id="cat1InlineName" placeholder="カテゴリ1名を入力" />
              <input type="hidden" id="cat1InlineId" />
              <div class="cat-inline-btns">
                <button class="cat-inline-cancel" onclick="hideCatInlineForm('cat1')">キャンセル</button>
                <button class="cat-inline-save" onclick="saveCatInline('cat1')">保存</button>
              </div>
            </div>
            <div class="cat-mgr-list" id="cat1MgrList">
              <div class="cat-mgr-empty">読み込み中...</div>
            </div>
          </div>

          <!-- カテゴリ2 -->
          <div class="cat-mgr-panel">
            <div class="cat-mgr-head">
              <span>カテゴリ2 <small id="cat2MgrSub" style="font-weight:normal;color:#666"></small></span>
              <button class="cat-mgr-add" onclick="showCatInlineForm('cat2', null)">＋ 追加</button>
            </div>
            <div class="cat-inline-form" id="cat2InlineForm">
              <div class="cat-inline-label" id="cat2InlineLabel">新規追加</div>
              <input type="text" id="cat2InlineName" placeholder="カテゴリ2名を入力" />
              <input type="hidden" id="cat2InlineId" />
              <div class="cat-inline-btns">
                <button class="cat-inline-cancel" onclick="hideCatInlineForm('cat2')">キャンセル</button>
                <button class="cat-inline-save" onclick="saveCatInline('cat2')">保存</button>
              </div>
            </div>
            <div class="cat-mgr-list" id="cat2MgrList">
              <div class="cat-mgr-empty">← カテゴリ1を選択してください</div>
            </div>
          </div>

        </div>

        <!-- 品番一覧（cat2選択時に表示） -->
        <div id="pnSection" class="pn-section" style="display:none">
          <div class="pn-section-head">
            <span>紐づき品番：</span>
            <strong id="pnSectionCat2Name"></strong>
            <span id="pnSectionCount" style="margin-left:auto;font-size:12px;color:#888"></span>
          </div>
          <div class="pn-section-list" id="pnSectionList"></div>
        </div>

      </div>
    </div>

    <div id="toast"></div>

    <script>
      /* ── 多言語辞書 ── */
      const dict = {
        ja: {
          title: "品番管理",
          btn_new: "＋ 新規登録",
          btn_cat_mgr: "🗂 カテゴリ管理",
          btn_save: "登録する",
          btn_update: "更新する",
          btn_cancel: "キャンセル",
          btn_delete: "削除",
          list_title: "品番一覧",
          lbl_pn: "品番",
          lbl_dept: "図面部門",
          lbl_material: "材質",
          lbl_aging: "時効処理",
          lbl_length: "製品長 (m)",
          lbl_circle: "外接円 (mm)",
          lbl_weight: "比重 (kg/m)",
          lbl_area: "断面積 (mm²)",
          lbl_pack_qty: "梱包数 (個)",
          lbl_pack_row: "梱包 行",
          lbl_pack_col: "梱包 列",
          lbl_hardness: "硬さ (HRF)",
          lbl_hardness_note: "硬さ備考",
          lbl_cat1: "カテゴリ1",
          lbl_cat2: "カテゴリ2",
          hint_cat: "選択してください",
          col_cat1: "カテゴリ1",

        const t = document.getElementById("toast");

      /* ── POST helper ── */
      async function postForm(url, params) {
        const res = await fetch(url, {
          method:  "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body:    new URLSearchParams(params).toString(),
        });
        return res.json();
      }

      /* ════════════════════════════

      async function loadList() {
        allData = await postForm("./php/ProductionNumber/SelSummaryV3.php", { dummy: "dummy" });
        renderTable(allData);
      }

      function renderTable(data) {
        document.getElementById("countLabel").textContent = `${data.length} 件`;
        const tbody = document.getElementById("mainTbody");
        tbody.innerHTML = "";

        if (!data.length) {
          tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;color:#aaa;padding:24px">データがありません</td></tr>`;
          return;
        }

        data.forEach((row) => {
          const cat1 = row.category1_jp    ?? "—";
          const cat2 = row.category2_jp    ?? "—";
          const mat  = row.billet_material ?? "—";
          const agi  = row.aging_type      ?? "—";

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${cat1}</td>
            <td>${cat2}</td>
            <td><strong>${row.production_number ?? ""}</strong></td>
            <td>${mat}</td>
            <td>${agi}</td>
            <td>${row.cross_section_area ?? "—"}</td>
            <td>${row.specific_weight    ?? "—"}</td>
            <td>${row.production_length  ?? "—"}</td>
            <td><button class="edit-btn" onclick="openEditForm(${row.id})">✏ 編集</button></td>
          `;
          tbody.appendChild(tr);
        });
      }

      /* 絞り込み */
      function filterTable(q) {
        q = q.toUpperCase();
        renderTable(allData.filter((r) =>
          String(r.production_number ?? "").toUpperCase().includes(q)
        ));
      }

      /* ソート */
      function sortBy(key) {
        if (sortKey === key) sortAsc = !sortAsc;
        else { sortKey = key; sortAsc = true; }

        document.querySelectorAll(".sort-icon").forEach((el) => el.textContent = "↕");
        const icon = document.querySelector(`.sort-icon[data-sortkey="${key}"]`);
        if (icon) icon.textContent = sortAsc ? "↑" : "↓";

        const sorted = [...allData].sort((a, b) => {
          let va = a[key] ?? "", vb = b[key] ?? "";
          const n = Number(va) - Number(vb);
          const result = (!isNaN(va) && !isNaN(vb) && va !== "")
            ? n
            : String(va).localeCompare(String(vb), "ja");
          return sortAsc ? result : -result;
        });
        renderTable(sorted);
      }

        const r    = data[0];

      async function restoreCategories(targetId, cat2Id) {
        const d1 = await postForm("./php/ProductionNumber/SelCate2_1.php", { targetId });
        if (!d1.length) return;

        const cat1Id = d1[0].category1_id;
        const cat1Rows = document.querySelectorAll("#cat1Tbody tr");
        let cat1Tr = null;
        cat1Rows.forEach((tr) => { if (String(tr.dataset.id) === String(cat1Id)) cat1Tr = tr; });
        if (cat1Tr) await onCat1Click(cat1Id, cat1Tr);

        if (cat2Id) {
          const cat2Rows = document.querySelectorAll("#cat2Tbody tr");
          cat2Rows.forEach((tr) => {
            if (String(tr.dataset.id) === String(cat2Id)) onCat2Click(cat2Id, tr);
          });
        }
      }

      async function saveForm() {
        const pn = document.getElementById("fPn").value.trim().toUpperCase();
        if (!pn) { showToast("品番を入力してください", false); return; }

        const length = document.getElementById("fLength").value.trim();
        if (!length) { showToast("製品長を入力してください", false); return; }

        const area = document.getElementById("fArea").value.trim();
        if (!area) { showToast("断面積を入力してください", false); return; }

        const material = document.getElementById("fMaterial").value;
        if (!material || material === "0") { showToast("材質を選択してください", false); return; }

        if (!selectedCat2Id) {
          document.getElementById("cat1Hint").classList.toggle("show", !selectedCat1Id);
          document.getElementById("cat2Hint").classList.add("show");
          showToast("カテゴリを選択してください", false);
          return;
        }

        const today = new Date().toISOString().slice(0, 10);
        const params = {
          production_number:       pn,
          drawn_department:        document.getElementById("fDept").value,
          billet_material_id:      document.getElementById("fMaterial").value,
          aging_type_id:           document.getElementById("fAging").value,
          production_length:       document.getElementById("fLength").value,
          circumscribed_circle:    document.getElementById("fCircle").value,
          specific_weight:         document.getElementById("fWeight").value,
          cross_section_area:      document.getElementById("fArea").value,
          packing_quantity:        document.getElementById("fPackQty").value,
          packing_row:             document.getElementById("fPackRow").value,
          packing_column:          document.getElementById("fPackCol").value,
          hardness:                document.getElementById("fHardness").value,
          hardness_note:           document.getElementById("fHardnessNote").value,
          production_category2_id: selectedCat2Id,
          targetId:                editingId ?? "",
          updated_at:              today,
        };

        const url = editingId
          ? "./php/ProductionNumber/UpdateSummaryV3.php"
          : "./php/ProductionNumber/InsInputData3.php";

        await postForm(url, params);
        showToast(editingId ? "更新しました" : "登録しました");
        closeForm();
        loadList();
      }

          list.innerHTML = '<div class="cat-mgr-empty">データがありません</div>';

          const name  = row.name_jp ?? "";

          const div = document.createElement("div");
          div.className  = "cat-mgr-item";
          div.dataset.id = id;

          const nameSpan = document.createElement("span");
          nameSpan.textContent = name;

          div.appendChild(badge);

      function showCatInlineForm(type, id, name = "") {
        hideCatInlineForm("cat1");
        hideCatInlineForm("cat2");
        const isEdit = !!id;
        document.getElementById(`${type}InlineLabel`).textContent = isEdit ? "✎ 編集中" : "新規追加";
        document.getElementById(`${type}InlineName`).value = name;
        document.getElementById(`${type}InlineId`).value   = id ?? "";
        document.getElementById(`${type}InlineForm`).classList.add("open");
        document.getElementById(`${type}InlineName`).focus();
      }

      function hideCatInlineForm(type) {
        document.getElementById(`${type}InlineForm`).classList.remove("open");
        document.getElementById(`${type}InlineName`).value = "";
        document.getElementById(`${type}InlineId`).value   = "";
      }

      async function saveCatInline(type) {
        const name = document.getElementById(`${type}InlineName`).value.trim();
        if (!name) { showToast("名称を入力してください", false); return; }

        const id     = document.getElementById(`${type}InlineId`).value;
        const isEdit = !!id;

        let url, params;
        if (type === "cat1") {
          url    = isEdit ? "./php/ProductionNumber/UpdateCategory1.php" : "./php/ProductionNumber/InsCategory1.php";
          params = isEdit ? { id, name_jp: name } : { name_jp: name };
        } else {
          if (!mgrCat1Id) { showToast("カテゴリ1を選択してください", false); return; }
          url    = isEdit ? "./php/ProductionNumber/UpdateCategory2.php" : "./php/ProductionNumber/InsCategory2.php";
          params = isEdit ? { id, name_jp: name } : { name_jp: name, category1_id: mgrCat1Id };
        }

        const result = await postForm(url, params);
        if (result.status === "ok") {
          showToast(isEdit ? "更新しました" : "追加しました");
          hideCatInlineForm(type);
          if (type === "cat1") {
            await loadCat1Mgr();
          } else {
            await loadCat2Mgr(mgrCat1Id);
          }
        } else {
          showToast(result.message || "エラーが発生しました", false);
        }
      }
