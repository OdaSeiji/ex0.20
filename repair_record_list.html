<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Repair Record List</title>

    <style>
      body {
        background-color: #e8f0f8;
        font-family: sans-serif;
      }

      h2 {
        color: #2b6ca3;
        font-weight: bold;
      }

      .container {
        width: 90%;
        margin: 20px auto;
      }

      .card {
        background: #ffffff;
        border: 1px solid #c5d1dd;
        border-radius: 6px;
        padding: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      th,
      td {
        border: 1px solid #c5d1dd;
        padding: 8px 10px;
      }

      .table-header {
        background-color: #dce8f5;
        color: #2b6ca3;
        font-weight: bold;
      }

      .btn-new {
        background-color: #2b6ca3;
        color: white;
        padding: 8px 14px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
      }

      .btn-new:hover {
        background-color: #1f527d;
      }

      .btn-back {
        background-color: #6c8ebf;
        color: white;
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
      }

      .btn-back:hover {
        background-color: #56729a;
      }

      .text-right {
        text-align: right;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Repair Record List</h2>

      <div class="text-right" style="margin-bottom: 10px">
        <button class="btn-back" onclick="history.back()">← Back</button>
      </div>

      <div class="text-right" style="margin-bottom: 10px">
        <button class="btn-new" id="newBtn">＋ New Repair Record</button>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr class="table-header">
              <th>ID</th>
              <th>Repair Date</th>
              <th>Memo</th>
              <th>Repaired By</th>
              <th>Attachments</th>
            </tr>
          </thead>
          <tbody id="repairTableBody"></tbody>
        </table>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const issueId = urlParams.get("issue_id");

      if (!issueId) {
        alert("Issue ID missing.");
        location.href = "die_issue_list.html";
      }

      // 新規追加ボタン
      document.getElementById("newBtn").onclick = () => {
        location.href = `die_issue_repair.html?issue_id=${issueId}`;
      };

      // 修理記録一覧取得
      fetch(
        `./php/die_issue_php/get_repair_record_list.php?issue_id=${issueId}`,
      )
        .then((res) => res.json())
        .then((data) => {
          const tbody = document.getElementById("repairTableBody");
          tbody.innerHTML = "";

          data.forEach((rec) => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                    <td>${rec.id}</td>
                    <td>${rec.record_date}</td>
                    <td>${rec.memo}</td>
                    <td>${rec.repaired_by_name}</td>
                    <td>${rec.attachment_count}</td>
                `;

            tbody.appendChild(tr);
          });
        })
        .catch((err) => {
          console.error("Error:", err);
        });
    </script>
  </body>
</html>
