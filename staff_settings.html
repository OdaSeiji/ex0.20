<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>スタッフ設定</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        border-radius: 10px;
        padding: 24px 28px 32px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .top-bar {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }

      .back-btn {
        background: #2b6ca3;
        color: #fff;
        padding: 8px 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        white-space: nowrap;
      }

      h1 {
        font-size: 20px;
        border-left: 6px solid #0078d4;
        padding-left: 10px;
      }

      /* Filter bar */
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        font-size: 13px;
      }
      .filter-bar label { color: #555; }
      .filter-bar select {
        padding: 5px 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 13px;
      }

      /* Table */
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 10px 12px;
        border-bottom: 1px solid #e8e8e8;
        font-size: 13px;
        text-align: left;
      }
      th {
        background: #e8f1ff;
        font-weight: bold;
        color: #333;
        position: sticky;
        top: 0;
        z-index: 5;
      }
      tr:hover { background: #f7f9ff; }
      tr.inactive { opacity: 0.45; }

      .emp-num {
        font-family: "Roboto Mono", monospace;
        font-size: 13px;
        letter-spacing: 0.03em;
      }

      /* Role select */
      .role-select {
        padding: 5px 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 12px;
        width: 160px;
      }

      /* Badges */
      .badge {
        display: inline-block;
        padding: 3px 9px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: bold;
        color: #fff;
      }
      .pw-set   { background: #2e7d32; }
      .pw-unset { background: #c62828; }
      .active   { background: #1565c0; }
      .inactive-badge { background: #9e9e9e; }

      /* Buttons */
      .reset-btn {
        padding: 5px 12px;
        background: #e65100;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      .reset-btn:hover { background: #bf360c; }

      .save-role-btn {
        padding: 5px 12px;
        background: #1565c0;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      .save-role-btn:hover { background: #0d47a1; }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #323232;
        color: #fff;
        padding: 10px 24px;
        border-radius: 6px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 999;
      }
      #toast.show { opacity: 1; }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="top-bar">
        <button class="back-btn" onclick="location.href='index.html'">← メニューへ戻る</button>
        <h1>スタッフ設定</h1>
      </div>

      <div class="filter-bar">
        <label>表示：</label>
        <select id="filterSelect" onchange="applyFilter()">
          <option value="active">在籍中のみ</option>
          <option value="all">全員</option>
        </select>
        <span id="countLabel" style="color:#888;"></span>
      </div>

      <table id="staffTable">
        <thead>
          <tr>
            <th>社員番号</th>
            <th>氏名</th>
            <th>ロール</th>
            <th>保存</th>
            <th>PW状態</th>
            <th>PW リセット</th>
            <th>状態</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="toast"></div>

    <script>
      const ROLES = [
        { value: "",            label: "— 未設定 —" },
        { value: "admin",       label: "admin（全権限）" },
        { value: "operator",    label: "operator（押出）" },
        { value: "inspector",   label: "inspector（測定・診断）" },
        { value: "maintenance", label: "maintenance（修理）" },
        { value: "die_setup",   label: "die_setup（金型段取り）" },
        { value: "die_engineer", label: "die_engineer（金型エンジニア）" },
      ];

      let allData = [];

      function showToast(msg, ok = true) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.style.background = ok ? "#323232" : "#c62828";
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2200);
      }

      function applyFilter() {
        const mode  = document.getElementById("filterSelect").value;
        const tbody = document.querySelector("#staffTable tbody");
        tbody.innerHTML = "";

        const filtered = mode === "all"
          ? allData
          : allData.filter((r) => !r.leave_at);

        document.getElementById("countLabel").textContent =
          `${filtered.length} 名`;

        filtered.forEach((row) => renderRow(row, tbody));
      }

      function renderRow(row, tbody) {
        const isActive = !row.leave_at;
        const tr = document.createElement("tr");
        if (!isActive) tr.classList.add("inactive");
        tr.dataset.id           = row.id;
        tr.dataset.empNum       = row.emploee_number ?? "";

        /* Role select options */
        const options = ROLES.map((r) =>
          `<option value="${r.value}" ${row.role === r.value ? "selected" : ""}>${r.label}</option>`
        ).join("");

        /* PW badge */
        const pwBadge = Number(row.has_password)
          ? `<span class="badge pw-set">設定済</span>`
          : `<span class="badge pw-unset">未設定</span>`;

        /* Status badge */
        const statusBadge = isActive
          ? `<span class="badge active">在籍</span>`
          : `<span class="badge inactive-badge">退職</span>`;

        tr.innerHTML = `
          <td class="emp-num">${row.emploee_number ?? "—"}</td>
          <td>${row.staff_name ?? "—"}</td>
          <td>
            <select class="role-select">
              ${options}
            </select>
          </td>
          <td>
            <button class="save-role-btn" onclick="saveRole(this)">保存</button>
          </td>
          <td class="pw-cell">${pwBadge}</td>
          <td>
            <button class="reset-btn" onclick="resetPassword(this)">リセット</button>
          </td>
          <td>${statusBadge}</td>
        `;

        tbody.appendChild(tr);
      }

      async function saveRole(btn) {
        const tr   = btn.closest("tr");
        const id   = tr.dataset.id;
        const role = tr.querySelector(".role-select").value || null;

        const res    = await fetch("./php/staff/update_staff.php", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ action: "update_role", id, role }),
        });
        const result = await res.json();

        if (result.status === "ok") {
          showToast("ロールを保存しました");
          /* sync allData */
          const entry = allData.find((r) => String(r.id) === String(id));
          if (entry) entry.role = role;
        } else {
          showToast("保存に失敗しました", false);
        }
      }

      async function resetPassword(btn) {
        const tr     = btn.closest("tr");
        const id     = tr.dataset.id;
        const empNum = tr.dataset.empNum;

        if (!confirm(`社員番号「${empNum}」をパスワードにリセットします。よろしいですか？`)) return;

        const res    = await fetch("./php/staff/update_staff.php", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            action:          "reset_password",
            id,
            emploee_number:  empNum,
          }),
        });
        const result = await res.json();

        if (result.status === "ok") {
          showToast("パスワードをリセットしました（初期値：社員番号）");
          /* update badge */
          tr.querySelector(".pw-cell").innerHTML =
            `<span class="badge pw-set">設定済</span>`;
          /* sync allData */
          const entry = allData.find((r) => String(r.id) === String(id));
          if (entry) entry.has_password = "1";
        } else {
          showToast("リセットに失敗しました", false);
        }
      }

      /* Load */
      fetch("./php/staff/get_staff_list.php")
        .then((r) => r.json())
        .then((data) => {
          allData = data;
          applyFilter();
        })
        .catch(() => showToast("データ取得に失敗しました", false));
    </script>
  </body>
</html>
